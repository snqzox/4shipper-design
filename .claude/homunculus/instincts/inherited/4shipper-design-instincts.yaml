# 4shipper Design Workflow Sync Design System From Figma

## Action

Follow the sync-design-system-from-figma workflow:
1. Run sync script to pull latest data from Figma
2. Update dashboard/index.html with new data
3. Update data/components.json, data/latest.json, data/pages.json, data/styles.json, data/tokens.json, data/variables.json
4. Add new data/snapshots/<timestamp>.json
5. Optionally update docs/design-system/changelog.md if changes detected

## Evidence

- Workflow detected from commit patterns
- Frequency: ~10x per month
- Files: dashboard/index.html, data/components.json, data/latest.json

