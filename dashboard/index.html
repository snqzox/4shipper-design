t":2},{"name":"_Popover/Header","nodeId":null,"resolved":false,"viaVariant":null,"count":1}],"usedBy":[],"needsAttention":true},{"kind":"set","name":"Popover Item","description":"What it is: A single action or navigation row inside a popover or context menu.\nWhen to use: Composed automatically inside Popover containers — not placed standalone.\nVariants: Default, hover, destructive; with leading icon; disabled.\nAvoid: Don't place Popover Items outside a Popover frame.","nodeId":"5803:43489","page":"⚛️ Popover","variants":4,"variantNames":["State=Hover, Selected=True","State=Hover, Selected=False","State=Default, Selected=False","State=Default, Selected=True"],"properties":[{"axis":"State","values":["Hover","Default"]},{"axis":"Selected","values":["True","False"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/popover-item.md","docContent":"# Popover Item\n\n**Component set key:** `73c5795f0f8d8c4d2cc75712a81bc2e74900cc52`\n**Figma page:** `⚛️ Popover`\n**Variants in set:** 4\n\n## Description\n\nPopover Item is a single row within a `Popover` overlay panel. It functions similarly to `Dropdown Item` but is used inside a popover rather than a standard dropdown menu — typically for contextual action menus, filter panels, or more complex selection surfaces where the popover has additional chrome around the list.\n\n## Variants / Properties\n\n### State axis\n| State | Description |\n|---|---|\n| `Default` | Resting state — visible and interactive. |\n| `Hover` | Cursor is over the row — highlighted background. |\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | Item is not the active selection. |\n| `True` | Item is the current selection — renders a checked or highlighted state. |\n\n## Related components\n\n- `Dropdown Item` — equivalent row component inside a `Dropdown` menu.\n- `Popover` — the container that houses multiple `Popover Item` rows.\n\n## Usage rules\n\n- Use `Popover Item` only inside a `Popover` container; use `Dropdown Item` inside a `Dropdown`.\n- Follow the same single/multi-select logic as `Dropdown Item`.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5803-43489","thumb":"thumbs/5803-43489.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":8}],"usedBy":[{"name":"Popover","nodeId":"5803:43124","count":6}],"needsAttention":false}]},{"page":"⚛️ Breadcrumbs","items":[{"kind":"set","name":"Breadcrumb Item","description":"What it is: A single step in a breadcrumb trail, either a clickable ancestor link or the current (non-linked) page label.\nWhen to use: Multi-level page hierarchies where users need to navigate back (e.g., Shipments > #12345 > Documents).\nVariants: Link state, current/active state, with separator.\nAvoid: Don't show breadcrumbs on top-level pages that have no parent.","nodeId":"129:12914","page":"⚛️ Breadcrumbs","variants":2,"variantNames":["LastChild=False","LastChild=True"],"properties":[{"axis":"LastChild","values":["False","True"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/breadcrumb-item.md","docContent":"# Breadcrumb Item\n\n**Component set key:** `1a1c02db3c3004ebb53e9fa294c079592ed8043e`\n**Figma page:** `⚛️ Breadcrumbs`\n**Variants in set:** 2\n\n## Description\n\nBreadcrumb Item is a single node in the breadcrumb trail navigation component. Multiple Breadcrumb Items are composed in sequence to show the user's location within the app hierarchy and provide a way to navigate back to parent levels. The last item in the trail represents the current page and is rendered without a navigation link.\n\n## Variants / Properties\n\n### LastChild axis\n| Value | Description |\n|---|---|\n| `False` | Item is an ancestor page — renders as a link with a separator after it. |\n| `True` | Item is the current page — renders as plain text without a link, no separator. |\n\n## Usage rules\n\n- Always set `LastChild=True` on the final breadcrumb item representing the current page.\n- Keep breadcrumb labels short — match the page or section title exactly.\n- Do not show breadcrumbs on top-level pages that have no parent.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=129-12914","thumb":"thumbs/129-12914.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":1}],"usedBy":[{"name":"Breadcrumbs","nodeId":"129:12955","count":3}],"needsAttention":false},{"kind":"component","name":"Breadcrumbs","description":"","nodeId":"129:12955","page":"⚛️ Breadcrumbs","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=129-12955","thumb":"thumbs/129-12955.png","nested":[{"name":"Breadcrumb Item","nodeId":"129:12914","resolved":true,"viaVariant":"LastChild=False","count":3}],"usedBy":[{"name":"Content Header","nodeId":"6984:1254074","count":1}],"needsAttention":true}]},{"page":"📦 Page","items":[{"kind":"component","name":"Page","description":"","nodeId":"6987:87353","page":"📦 Page","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6987-87353","thumb":"thumbs/6987-87353.png","nested":[{"name":"Content Box","nodeId":"6985:1377167","resolved":true,"viaVariant":"Style=Boxed, Size=MD","count":11},{"name":"Notification (Alert)","nodeId":"32:1770","resolved":true,"viaVariant":"Property 1=Danger Subtle","count":2},{"name":"Content Header","nodeId":"6984:1254074","resolved":true,"viaVariant":null,"count":1},{"name":"Page/Footer","nodeId":"129:13709","resolved":true,"viaVariant":null,"count":1},{"name":"Page/Header/Shipper","nodeId":"106:7070","resolved":true,"viaVariant":"Layout=Desktop, Expanded=False","count":1},{"name":"Tabs","nodeId":"36:1862","resolved":true,"viaVariant":"Orientation=Vertical","count":1}],"usedBy":[],"needsAttention":true},{"kind":"component","name":"Page/Main Content Container","description":"","nodeId":"6987:65811","page":"📦 Page","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6987-65811","thumb":"thumbs/6987-65811.png","nested":[{"name":"Content Box","nodeId":"6985:1377167","resolved":true,"viaVariant":"Style=Boxed, Size=MD","count":11},{"name":"Notification (Alert)","nodeId":"32:1770","resolved":true,"viaVariant":"Property 1=Danger Subtle","count":2},{"name":"Tabs","nodeId":"36:1862","resolved":true,"viaVariant":"Orientation=Vertical","count":1}],"usedBy":[],"needsAttention":true}]},{"page":"⚛️ Attachment","items":[{"kind":"set","name":"Attachment entry","description":"What it is: A single uploaded-file row showing filename, file size, and an optional remove action.\nWhen to use: Inside file upload confirmation areas or message threads where users need to review or delete attached files.\nVariants: Default, with remove button (closeable).\nAvoid: Don't use for file-picker triggers — use the Fileupload component instead.","nodeId":"5239:152707","page":"⚛️ Attachment","variants":2,"variantNames":["State=Hover","State=Default"],"properties":[{"axis":"State","values":["Hover","Default"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/attachment-entry.md","docContent":"# Attachment entry\n\n**Component set key:** `14d219a03dddd8ef66cdaf9d708890d40b99fa92`\n**Figma page:** `⚛️ Attachment`\n**Variants in set:** 2\n\n## Description\n\nAttachment entry is a single file row within the `Attachment` list component. It displays a file name, file type indicator, and action controls (download, delete). Use it to represent an uploaded or attached document — for example, cargo manifests, compliance certificates, or transport confirmation PDFs — in tender and transport detail views.\n\n## Variants / Properties\n\n### State axis\n| State | Description |\n|---|---|\n| `Default` | Standard resting state for the attachment row. |\n| `Hover` | Cursor is over the row — action controls become more prominent. |\n\n## Usage rules\n\n- Always show the file name and a file-type badge or icon so the user can identify the attachment type.\n- Provide a download action on every attachment entry; provide a delete action only when the user has permission to remove the file.\n- Do not use `Attachment entry` for images displayed inline — use it for document-type attachments only.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5239-152707","thumb":"thumbs/5239-152707.png","nested":[{"name":"Button","nodeId":"15:105","resolved":true,"viaVariant":"Variant=Link, State=Default","count":4},{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":2}],"usedBy":[],"needsAttention":false}]},{"page":"⚛️ Button","items":[{"kind":"set","name":"Button","description":"Button triggers user actions — submit, confirm, navigate, delete, etc... \n\nRules:\nNever place two Primary buttons side by side.\nGap between buttons should be set layout-gap variable. At least to \"layout-gap-xs\"\nUse properties and appearance to modify button\nUse Danger / Danger Subtle for any action that is destructive or hard to reverse.\nButton sizes are handled by variable modes in collection \"input-sizes\" values xs ,sm, md, lg.","nodeId":"15:105","page":"⚛️ Button","variants":27,"variantNames":["Variant=Body, State=Default","Variant=Link, State=Default","Variant=Secondary, State=Default","Variant=Danger Subtle, State=Hover","Variant=Danger, State=Hover","Variant=Danger, State=Disabled","Variant=Danger Subtle, State=Disabled","Variant=Danger, State=Default","Variant=Ghost, State=Default","Variant=Secondary, State=Disabled","Variant=Inverted, State=Hover","Variant=Link, State=Disabled","Variant=Primary, State=Disabled","Variant=Body, State=Hover","Variant=Inverted, State=Disabled","Variant=Ghost, State=Disabled","Variant=Danger Subtle, State=Default","Variant=Primary Subtle, State=Default","Variant=Primary Subtle, State=Disabled","Variant=Link, State=Hover","Variant=Body, State=Disabled","Variant=Ghost, State=Hover","Variant=Primary Subtle, State=Hover","Variant=Secondary, State=Hover","Variant=Inverted, State=Default","Variant=Primary, State=Default","Variant=Primary, State=Hover"],"properties":[{"axis":"Variant","values":["Body","Link","Secondary","Danger Subtle","Danger","Ghost","Inverted","Primary","Primary Subtle"]},{"axis":"State","values":["Default","Hover","Disabled"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":true,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/button.md","docContent":"# Button\n\n**Component set key:** `20ca3f58e52ca60646e8a283cd2b3218285c1d4a` (node `15:105`)\n**Figma page:** `⚛️ Button`\n**Variants in set:** 27\n\n## Description\n\nButton is the primary interactive trigger for actions in the 4Shipper / Transportly UI. Use it whenever the user needs to submit a form, confirm a dialog, navigate to a next step, or trigger any immediate action. Choose the variant that conveys the appropriate weight and intent of the action.\n\n## Variants / Properties\n\n### Variant axis\n| Variant | When to use |\n|---|---|\n| `Primary` | The single most important action on a surface — confirm, submit, proceed. |\n| `Primary Subtle` | A softer alternative to Primary; use when a full-weight Primary would compete with other elements. |\n| `Secondary` | Supporting or alternative actions alongside a Primary button. |\n| `Ghost` | Low-emphasis actions or toolbar-style controls that should not draw attention. |\n| `Body` | Neutral, body-weight action that sits inline with content. |\n| `Link` | In-context hyperlink-style action; lowest visual weight. |\n| `Danger` | Destructive actions (delete, cancel, reject). Filled, high attention. |\n| `Danger Subtle` | Destructive actions where a softer treatment is preferred (e.g., inline removes). |\n| `Inverted` | Use on dark or coloured backgrounds where the standard palette would not contrast. |\n\n### State axis\n| State | Description |\n|---|---|\n| `Default` | Resting, ready for interaction. |\n| `Hover` | Cursor is over the button. |\n| `Disabled` | Action is not currently available; non-interactive. |\n\n### Component properties (non-variant)\n| Property | Type | Default | Effect |\n|---|---|---|---|\n| `hasLeftIcon` | boolean | `true` | Leading (left) icon slot. |\n| `hasRightIcon` | boolean | `false` | Trailing (right) icon slot. |\n| `hasText` | boolean | `true` | Shows the label; set `false` for an icon-only button. |\n| `hasBadge` | boolean | `false` | Trailing count badge. |\n| `isDropdown` | boolean | `false` | Adds a chevron for menu / dropdown triggers. |\n| `text` | text | `\"Button\"` | The button label. |\n\n### Size (not a property)\nSize is **not** a variant or component property — it is driven by the **`input-sizes` variable mode** on the\nenclosing frame: `xs 28 / sm 34 / md 42 / lg 48` px (variable `button/size`). The collection's default mode is\n`xs`; the component bakes `md` onto each instance. To render another size, set the frame's `input-sizes` mode\nand clear the instance's baked override (see `design-system-manager` → *Writing to Figma* for the pattern).\n\nA live in-Figma showcase of all of the above (properties, variant×state in light/dark, sizes) lives on the\n**`📖 Docs / Button`** page in the UI Kit file.\n\n## Usage rules\n\n- Never place two `Primary` buttons side by side on the same surface.\n- Use `Danger` / `Danger Subtle` for any action that is destructive or hard to reverse.\n- `Link` buttons should only appear inline with text or in dense toolbars — do not use them as standalone page-level CTAs.\n- Always pair a `Danger` confirmation with an `Alert Dialog` before executing.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=15-105","thumb":"thumbs/15-105.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":81},{"name":"Badge","nodeId":"18:968","resolved":true,"viaVariant":"Variant=Body","count":27}],"usedBy":[{"name":"Content Header","nodeId":"6984:1254074","count":24},{"name":"Route Entry","nodeId":"707:368801","count":24},{"name":"Pagination","nodeId":"6803:72493","count":19},{"name":"Notification (Alert)","nodeId":"32:1770","count":10},{"name":"Page/Header/Carrier","nodeId":"7713:17336","count":10},{"name":"Page/Header/Shipper","nodeId":"106:7070","count":10},{"name":"Route Entry 2","nodeId":"8617:6114","count":8},{"name":"Step Progress Tabs","nodeId":"6955:1232404","count":6},{"name":"Attachment entry","nodeId":"5239:152707","count":4},{"name":"Content Box","nodeId":"6985:1377167","count":4},{"name":"Item","nodeId":"6826:331","count":3},{"name":"Dialog","nodeId":"5250:197334","count":1},{"name":"Fileupload","nodeId":"5184:85248","count":1},{"name":"Form Control","nodeId":"26:1580","count":1},{"name":"Form Header","nodeId":"8680:8274","count":1}],"needsAttention":false}]},{"page":"⚛️ Badge","items":[{"kind":"set","name":"Badge","description":"What it is: A small inline label used to surface counts, statuses, or categorical tags.\nWhen to use: Navigation counts (unread messages), table cell tags, card metadata.\nVariants: Solid and subtle fills; neutral, primary, success, warning, danger, purple; with and without icon; multiple sizes.\nAvoid: Don't use for long phrases — keep badge text to 1–3 words or a number.","nodeId":"18:968","page":"⚛️ Badge","variants":7,"variantNames":["Variant=Body","Variant=Warning","Variant=Danger","Variant=Variant7","Variant=Secondary","Variant=Body Inverted","Variant=Primary"],"properties":[{"axis":"Variant","values":["Body","Warning","Danger","Variant7","Secondary","Body Inverted","Primary"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":true,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/badge.md","docContent":"# Badge\n\n**Component set key:** `22ac6b48fd8d58b488643fa29de41607956ec4dc` (node `18:968`)\n**Figma page:** `⚛️ Badge`\n**Variants in set:** 7\n\n## Description\n\nBadge is a compact inline label used to classify, tag, or count items. It appears alongside text, inside table cells, or on top of other elements to communicate a categorical attribute or a numeric count. Badges do not trigger actions — they are purely informational.\n\n## Variants / Properties\n\n### Variant axis\n\nDefault variant: `Body Inverted`.\n\n| Variant | When to use |\n|---|---|\n| `Body Inverted` | Default. Neutral badge for dark surfaces / high-contrast contexts. |\n| `Body` | Minimal badge that blends with body text on light surfaces. |\n| `Primary` | Highlighted or featured classification using the brand primary colour. |\n| `Secondary` | Neutral classification — common default for general tags. |\n| `Danger` | Critical or failed classification (e.g., rejected, overdue). |\n| `Warning` | Needs attention but not critical (e.g., pending, near expiry). |\n| `Success` | Positive / completed classification (e.g., delivered, approved). |\n\n### Component properties (non-variant)\n\n| Property | Type | Default | Effect |\n|---|---|---|---|\n| `dismissible` | boolean | `false` | Adds a trailing `×` remove control (e.g. removable filter chips). |\n| `hasIcon` | boolean | `true` | Leading icon slot; set `false` for a text-only badge. |\n| `text` | text | `\"Badge\"` | The badge label. Keep it to one or two words. |\n\n### Size (not a property)\n\nSize is **not** a variant or component property — it is driven by the **`badge` variable mode** on the\nenclosing frame: `sm 20 / md 24` px (variable `badge/size`). To render another size, set the frame's `badge`\nmode and clear the instance's baked override (see `design-system-manager` → *Writing to Figma*).\n\nA live in-Figma showcase of all of the above (properties, variants in light/dark, sizes) lives on the\n**`📖 Docs / Badge`** page in the UI Kit file.\n\n## Usage rules\n\n- Use `Warning`, `Danger`, and `Success` variants only for genuinely meaningful status information, not for decoration.\n- Do not use a Badge as a button or to trigger navigation.\n- For lifecycle statuses (tender, transport, contract) use the dedicated `Status/*` components instead of Badge.\n- Keep badge text short — one or two words maximum.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=18-968","thumb":"thumbs/18-968.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":14}],"usedBy":[{"name":"Button","nodeId":"15:105","count":27},{"name":"Input","nodeId":"26:1063","count":4}],"needsAttention":false}]},{"page":"⚛️ Separator","items":[{"kind":"set","name":"Separator","description":"What it is: A thin visual dividing line (horizontal or vertical) that segments content areas.\nWhen to use: Between list sections, inside cards to divide header from body, between toolbar actions.\nVariants: Horizontal and vertical; solid and dashed; with optional centred label.\nAvoid: Don't use Separators as padding substitutes — use auto-layout gap instead.","nodeId":"6985:1269630","page":"⚛️ Separator","variants":8,"variantNames":["Orientation=Vertical, Spacing=MD","Orientation=Vertical, Spacing=SM","Orientation=Vertical, Spacing=LG","Orientation=Vertical, Spacing=0","Orientation=Horizontal, Spacing=LG","Orientation=Horizontal, Spacing=0","Orientation=Horizontal, Spacing=SM","Orientation=Horizontal, Spacing=MD"],"properties":[{"axis":"Orientation","values":["Vertical","Horizontal"]},{"axis":"Spacing","values":["MD","SM","LG","0"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/separator.md","docContent":"# Separator\n\n**Component set key:** `a3fb12818666b571f7258308e28c363caac57ee1`\n**Figma page:** `⚛️ Separator`\n**Variants in set:** 8\n\n## Description\n\nSeparator is a visual dividing line used to group related content and create clear section boundaries within a layout. It supports both horizontal and vertical orientations and four spacing sizes to accommodate different layout densities.\n\n## Variants / Properties\n\n### Orientation axis\n| Orientation | Description |\n|---|---|\n| `Horizontal` | Horizontal rule — divides stacked content vertically on the page. |\n| `Vertical` | Vertical rule — divides side-by-side content within a row. |\n\n### Spacing axis\n| Spacing | Description |\n|---|---|\n| `0` | No margin around the separator — flush against adjacent content. |\n| `SM` | Small margin. |\n| `MD` | Default/medium margin. |\n| `LG` | Large margin — use when more breathing room is needed between sections. |\n\n## Usage rules\n\n- Use `MD` spacing as the default unless the layout has explicit density requirements.\n- Do not use a Separator purely for decoration — it should mark a meaningful logical boundary.\n- Prefer `Vertical` separators inside horizontal flex rows (e.g., toolbar button groups).\n- Prefer `Horizontal` separators between stacked card sections or form groups.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6985-1269630","thumb":"thumbs/6985-1269630.png","nested":[{"name":"_Separator/Line","nodeId":null,"resolved":false,"viaVariant":null,"count":8}],"usedBy":[{"name":"Content Header","nodeId":"6984:1254074","count":6},{"name":"Content Box","nodeId":"6985:1377167","count":4},{"name":"Content/Section Title","nodeId":"6986:12807","count":2},{"name":"Form Header","nodeId":"8680:8274","count":1}],"needsAttention":false}]},{"page":"⚛️ Stepper","items":[{"kind":"set","name":"Stepper","description":"What it is: A vertical step-by-step progress indicator showing completed, current, and upcoming steps in a multi-stage workflow.\nWhen to use: Multi-step forms (shipment creation wizard, onboarding), side-panel step guidance.\nVariants: Numbered and icon steps; completed, active, upcoming, error states; with and without step description.\nAvoid: Don't use for page-level tab navigation — use Tabs or Step Progress Tabs instead.","nodeId":"8808:80287","page":"⚛️ Stepper","variants":4,"variantNames":["Step=1","Step=4","Step=2","Step=3"],"properties":[{"axis":"Step","values":["1","4","2","3"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/stepper.md","docContent":"# Stepper\n\n**Component set key:** `6ee31571c705f9b4da0520dfef197b341c7c7b7b`\n**Figma page:** `Tenders - Shipper`\n**Variants in set:** 4\n\n## Description\n\nStepper is the multi-step progress indicator used in wizard-style flows, most prominently in the New Tender creation form. It renders a numbered sequence of steps and visually communicates which step is currently active. Use it at the top of any multi-page form or guided workflow to orient the user within the process.\n\n## Variants / Properties\n\n### Step axis\n| Step | Description |\n|---|---|\n| `1` | First step is active; all subsequent steps are upcoming. |\n| `2` | Second step is active; step 1 is completed. |\n| `3` | Third step is active; steps 1–2 are completed. |\n| `4` | Fourth step is active; steps 1–3 are completed. |\n\n## Related components\n\n- `Step Progress Tabs` — tab-based variant of step navigation used on the tender detail page.\n\n## Usage rules\n\n- Always show all steps in the sequence upfront so the user understands the full scope of the form.\n- Completed steps should be visually distinct from the active step and upcoming steps.\n- Do not allow the user to jump to a future step that has unsatisfied prerequisites.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8808-80287","thumb":"thumbs/8808-80287.png","nested":[],"usedBy":[],"needsAttention":false}]},{"page":"⚛️ Location Pointer","items":[{"kind":"set","name":"Location Pointer","description":"What it is: A map-pin-style marker showing a location label on a route or map context.\nWhen to use: Route visualisation, shipment origin/destination callouts, map overlays.\nVariants: Origin, waypoint, destination; active and default.\nAvoid: Don't use as a navigation breadcrumb — use Breadcrumb Item instead.","nodeId":"36:2903","page":"⚛️ Location Pointer","variants":2,"variantNames":["Property 1=Default","Property 1=Variant2"],"properties":[{"axis":"Property 1","values":["Default","Variant2"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/location-pointer.md","docContent":"# Location Pointer\n\n**Component set key:** `930af1ca0440b03a904cc6ea7d486d615f5e4477`\n**Figma page:** `⚛️ Location Pointer`\n**Variants in set:** 2\n\n## Description\n\nLocation Pointer is a map-pin marker component used on embedded map views to indicate a specific geographic location — for example, a pickup point, delivery address, or warehouse. Use it wherever a map surface is rendered to mark waypoints, depots, or positions of interest.\n\n## Variants / Properties\n\n### Property 1 axis\n| Variant | Description |\n|---|---|\n| `Default` | Standard pin marker — single location, no additional state. |\n| `Variant2` | Alternative pin style — check Figma for the specific treatment (e.g., selected or active state). |\n\n## Usage rules\n\n- Use Location Pointer only on map surfaces, not in list or card contexts.\n- For route sequences, pair multiple Location Pointer instances with connecting lines to form a complete route visualisation.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=36-2903","thumb":"thumbs/36-2903.png","nested":[],"usedBy":[],"needsAttention":false}]},{"page":"⚛️ Pagination","items":[{"kind":"set","name":"Pagination","description":"What it is: Page navigation controls for moving through multi-page data sets — previous/next arrows and optional page number buttons.\nWhen to use: Tables and lists where the full dataset is split across pages.\nVariants: Compact (prev/next only) and full (with page numbers); with and without per-page selector.\nAvoid: Don't paginate sets under 10 items — show all rows instead.","nodeId":"6803:72493","page":"⚛️ Pagination","variants":2,"variantNames":["Variant=Middle","Variant=First"],"properties":[{"axis":"Variant","values":["Middle","First"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/pagination.md","docContent":"# Pagination\n\n**Component set key:** `5030aa01c62a20539f842271f707c4c1cb0e05c6`\n**Figma page:** `⚛️ Pagination`\n**Variants in set:** 2\n\n## Description\n\nPagination provides the navigation controls for moving through multi-page datasets such as tender lists, transport tables, and contract records. It renders page number buttons, previous/next arrows, and optionally an ellipsis for large page counts. Place it at the bottom of any table or list that may produce more results than fit on a single screen.\n\n## Variants / Properties\n\n### Variant axis\n| Variant | Description |\n|---|---|\n| `First` | The pagination bar as it appears on the first page — previous arrow is inactive. |\n| `Middle` | The pagination bar on any page that is neither first nor last — both arrows active. |\n\n## Usage rules\n\n- Always pair Pagination with a page-size selector if the dataset is large.\n- Do not use Pagination for content that should load continuously — use infinite scroll instead.\n- The `First` variant is used to initialise the pagination state; switch to `Middle` as soon as page 2 or beyond is active.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6803-72493","thumb":"thumbs/6803-72493.png","nested":[{"name":"Button","nodeId":"15:105","resolved":true,"viaVariant":"Variant=Body, State=Default","count":19},{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":3}],"usedBy":[],"needsAttention":false}]},{"page":"⚛️ Tabs","items":[{"kind":"set","name":"Tabs","description":"What it is: A horizontal tab bar for switching between peer content views within the same page context.\nWhen to use: Segmenting a page into related views (e.g. Overview / Documents / History tabs inside a shipment detail).\nVariants: Default and pill styles; with/without count badge; active, hover, disabled tab states.\nAvoid: Don't use Tabs for primary page navigation — use the Page Header nav instead.","nodeId":"36:1862","page":"⚛️ Tabs","variants":2,"variantNames":["Orientation=Vertical","Orientation=Horizontal"],"properties":[{"axis":"Orientation","values":["Vertical","Horizontal"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/tabs.md","docContent":"# Tabs\n\n**Component set key:** `050ff2281cbe78462fd4e7a8ae63524c66e1c457`\n**Figma page:** `⚛️ Tabs`\n**Variants in set:** 2\n\n## Description\n\nTabs is the general-purpose tab navigation component for switching between related content panels within the same page context. It does not imply a workflow order — use it for flat content grouping such as \"Details / Documents / History\" views. For ordered multi-step flows, use `Stepper` or `Step Progress Tabs` instead.\n\n## Variants / Properties\n\n### Orientation axis\n| Orientation | Description |\n|---|---|\n| `Horizontal` | Tab bar runs left-to-right across the top of the content area — the standard layout. |\n| `Vertical` | Tab bar runs top-to-bottom on the left side of the content area — use in sidebar-style layouts with many tabs. |\n\n## Usage rules\n\n- Keep tab labels short (1–3 words); do not use sentences.\n- Highlight the active tab clearly so it is distinguishable at a glance.\n- Use `Horizontal` orientation by default; switch to `Vertical` only when more than ~6 tabs are needed or when a sidebar panel calls for it.\n- Do not use Tabs for primary app navigation — use the sidebar or page header for that.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=36-1862","thumb":"thumbs/36-1862.png","nested":[{"name":"_Tabs/Tab","nodeId":null,"resolved":false,"viaVariant":null,"count":16}],"usedBy":[{"name":"Content Header","nodeId":"6984:1254074","count":1},{"name":"Page","nodeId":"6987:87353","count":1},{"name":"Page/Main Content Container","nodeId":"6987:65811","count":1}],"needsAttention":false}]},{"page":"📦 Content Box","items":[{"kind":"set","name":"Content Box","description":"What it is: A bordered card container that groups related content within a page section.\nWhen to use: Wrapping form sections, summary panels, or detail blocks inside a page layout.\nVariants: Default, with header, with footer actions; light and dark surface.\nAvoid: Don't nest Content Boxes more than one level deep.","nodeId":"6985:1377167","page":"📦 Content Box","variants":4,"variantNames":["Style=Boxed, Size=LG","Style=Simple, Size=MD","Style=Simple, Size=LG","Style=Boxed, Size=MD"],"properties":[{"axis":"Style","values":["Boxed","Simple"]},{"axis":"Size","values":["LG","MD"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/content-box.md","docContent":"# Content Box\n\n**Component set key:** `6ccd09b5a1a4a49c2e203f991100b08b43aaf75f`\n**Figma page:** `📦 Content Box`\n**Variants in set:** 4\n\n## Description\n\nContent Box is a layout container that groups related content into a visually distinct section. It comes in a `Boxed` style (with a border/card treatment) and a `Simple` style (without the card border), and in two sizes to accommodate different amounts of content. Use it to divide a page or panel into clear content regions.\n\n## Variants / Properties\n\n### Style axis\n| Style | Description |\n|---|---|\n| `Boxed` | Renders with a visible card border — creates strong visual separation between sections. |\n| `Simple` | No border — creates softer grouping suitable for sections already within a parent card. |\n\n### Size axis\n| Size | Description |\n|---|---|\n| `LG` | Larger internal padding — use for prominent content areas or primary page sections. |\n| `MD` | Standard padding — use for secondary sections or when vertical space is limited. |\n\n## Usage rules\n\n- Use `Boxed` for top-level page sections; use `Simple` for sub-sections within an already-boxed area.\n- Do not nest `Boxed` Content Boxes — this creates visual noise and confuses the hierarchy.\n- Choose `LG` for sections that contain forms or complex content; choose `MD` for compact display sections.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6985-1377167","thumb":"thumbs/6985-1377167.png","nested":[{"name":"Button","nodeId":"15:105","resolved":true,"viaVariant":"Variant=Primary, State=Default","count":4},{"name":"Separator","nodeId":"6985:1269630","resolved":true,"viaVariant":"Orientation=Horizontal, Spacing=0","count":4}],"usedBy":[{"name":"Page","nodeId":"6987:87353","count":11},{"name":"Page/Main Content Container","nodeId":"6987:65811","count":11}],"needsAttention":false}]},{"page":"⚛️ Dialog","items":[{"kind":"set","name":"Dialog","description":"What it is: A modal overlay for focused tasks or confirmations that require user input before continuing.\nWhen to use: Multi-field forms (create/edit flows), complex confirmations needing explanation.\nVariants: Small, medium, large; with and without footer actions.\nAvoid: Don't use Dialog for simple yes/no confirmations — use Alert Dialog instead.","nodeId":"5250:197334","page":"⚛️ Dialog","variants":1,"variantNames":["Headline=True"],"properties":[{"axis":"Headline","values":["True"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/dialog.md","docContent":"# Dialog\n\n**Component set key:** `177928463ea079f89dd74ed1a32fb705303401c7`\n**Figma page:** `⚛️ Dialog`\n**Variants in set:** 1\n\n## Description\n\nDialog is the modal overlay used for focused interactions that require the user's full attention before returning to the main workflow. It blocks the background content and forces a decision or input before it can be dismissed. Use Dialog for multi-field forms, confirmations with context, or any interaction where navigating away would lose important state.\n\nFor simple yes/no destructive confirmations use `Alert Dialog` instead.\n\n## Variants / Properties\n\n### Headline property\n| Value | Meaning |\n|---|---|\n| `True` | Dialog renders with a title headline at the top of the panel. |\n\n## Related components\n\n- **Alert Dialog** — lightweight confirmation overlay for destructive or irreversible actions.\n- **Button** — always used inside Dialog for primary and secondary actions.\n- **Input / Textarea** — placed inside Dialog for inline form interactions.\n\n## Usage rules\n\n- Always provide a clear, action-oriented headline (e.g., \"Edit shipment details\", not \"Dialog\").\n- Every Dialog must have at least one explicit close action (a cancel button or a close icon).\n- Do not nest dialogs — open a new Dialog only after the previous one has been dismissed.\n- Keep Dialog content focused; if content requires scrolling, consider a dedicated page or panel instead.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5250-197334","thumb":"thumbs/5250-197334.png","nested":[{"name":"_Dialog/Footer","nodeId":null,"resolved":false,"viaVariant":null,"count":1},{"name":"_Dialog/Header","nodeId":null,"resolved":false,"viaVariant":null,"count":1},{"name":"Button","nodeId":"15:105","resolved":true,"viaVariant":"Variant=Ghost, State=Default","count":1}],"usedBy":[],"needsAttention":false}]},{"page":"⚛️ Notification (Alert)","items":[{"kind":"set","name":"Notification (Alert)","description":"What it is: An inline alert banner communicating important system feedback — info, success, warning, or error.\nWhen to use: Form validation summaries, API error messages, success confirmations, policy notices placed within page content.\nVariants: Info, success, warning, danger; with and without dismiss button; with and without action link.\nAvoid: Don't use for toast-style transient messages — those use a separate notification pattern outside this component.","nodeId":"32:1770","page":"⚛️ Notification (Alert)","variants":5,"variantNames":["Property 1=Success Subtle","Property 1=Danger Subtle","Property 1=Default","Property 1=Warning","Property 1=Primary"],"properties":[{"axis":"Property 1","values":["Success Subtle","Danger Subtle","Default","Warning","Primary"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/notification-alert.md","docContent":"# Notification (Alert)\n\n**Component set key:** `7e4c36aa161d270b0960cd4dbbb89995c2588486`\n**Figma page:** `⚛️ Notification (Alert)`\n**Variants in set:** 5\n\n## Description\n\nNotification (Alert) is an inline banner used to communicate system-level feedback, warnings, or informational messages directly within a page or form context. Unlike a toast, it is persistent and positioned near the relevant content rather than floating at the edge of the viewport.\n\n## Variants / Properties\n\n### Property 1 axis\n| Variant | When to use |\n|---|---|\n| `Default` | Neutral informational message with no urgency. |\n| `Primary` | Branded informational message or tip aligned with a key action. |\n| `Warning` | Cautionary message — action may have consequences or something needs attention. |\n| `Danger Subtle` | Soft error or failure state where the message is important but not alarming. |\n| `Success Subtle` | Confirmation that an action completed successfully. |\n\n## Usage rules\n\n- Place the Notification above or below the content it relates to, not at random positions.\n- Do not stack multiple Notifications of the same type — consolidate messages.\n- Use `Danger Subtle` for form-level validation summaries; use inline error states for field-level errors.\n- Provide a dismiss action unless the message is critical and must persist until resolved.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=32-1770","thumb":"thumbs/32-1770.png","nested":[{"name":"Button","nodeId":"15:105","resolved":true,"viaVariant":"Variant=Body, State=Default","count":10},{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":5}],"usedBy":[{"name":"Page","nodeId":"6987:87353","count":2},{"name":"Page/Main Content Container","nodeId":"6987:65811","count":2},{"name":"Content Header","nodeId":"6984:1254074","count":1},{"name":"Form Control","nodeId":"26:1580","count":1}],"needsAttention":false}]},{"page":"⚛️ Tooltip","items":[{"kind":"set","name":"Tooltip","description":"What it is: A non-interactive floating label that reveals supplementary text on hover or focus of a trigger element.\nWhen to use: Icon-only buttons needing accessible labels, truncated text cells, contextual help for unfamiliar terms.\nVariants: Top, right, bottom, left placement; dark (default) and light theme.\nAvoid: Don't put interactive content (links, buttons) inside a Tooltip — use a Popover instead.","nodeId":"6277:69164","page":"⚛️ Tooltip","variants":4,"variantNames":["Position=Top","Position=Right","Position=Bottom","Position=Left"],"properties":[{"axis":"Position","values":["Top","Right","Bottom","Left"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/tooltip.md","docContent":"# Tooltip\n\n**Component set key:** `3dcd8657ba5313b9f1a603a8d61c4418348b8768`\n**Figma page:** `⚛️ Tooltip`\n**Variants in set:** 4\n\n## Description\n\nTooltip is a non-interactive contextual hint that appears on hover (or focus for accessibility) to clarify the purpose of an element — typically an icon button, a truncated label, or a form field that needs extra explanation. It disappears when the user moves focus away.\n\n## Variants / Properties\n\n### Position axis\n| Position | Description |\n|---|---|\n| `Top` | Tooltip appears above the trigger element. Default preference. |\n| `Bottom` | Tooltip appears below the trigger element. |\n| `Left` | Tooltip appears to the left of the trigger element. |\n| `Right` | Tooltip appears to the right of the trigger element. |\n\n## Usage rules\n\n- Use Tooltip only for supplementary information — never for information essential to completing a task.\n- Keep tooltip text concise (one short sentence maximum).\n- Choose the `Position` that keeps the tooltip within the viewport and does not obscure nearby interactive elements.\n- Do not put interactive elements (links, buttons) inside a Tooltip.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6277-69164","thumb":"thumbs/6277-69164.png","nested":[{"name":"_Tooltip/Arrow","nodeId":null,"resolved":false,"viaVariant":null,"count":4},{"name":"_Tooltip/Text Container","nodeId":null,"resolved":false,"viaVariant":null,"count":4}],"usedBy":[],"needsAttention":false}]},{"page":"⚛️ Item","items":[{"kind":"set","name":"Item","description":"What it is: A compact key-value row for displaying a single labelled data point in a summary or detail list.\nWhen to use: Detail panels, shipment summaries, invoice line items.\nVariants: Horizontal and vertical label/value layout; with and without icon.\nAvoid: Don't use Item for interactive selections — use List Entry or Dropdown Item.","nodeId":"6826:331","page":"⚛️ Item","variants":3,"variantNames":["Align=Vertical","Align=Horizontal","Align=Horizontal - Right"],"properties":[{"axis":"Align","values":["Vertical","Horizontal","Horizontal - Right"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/item.md","docContent":"# Item\n\n**Component set key:** `a70fbb845175f1d6672331775b949ae7bfd8fdb7`\n**Figma page:** `⚛️ Item`\n**Variants in set:** 3\n\n## Description\n\nItem is a general-purpose label–value display row used to present a single piece of structured information — for example, a shipment attribute, a tender detail field, or a contract property. It supports horizontal and vertical layout modes to fit different densities and reading directions.\n\n## Variants / Properties\n\n### Align axis\n| Align | Description |\n|---|---|\n| `Horizontal` | Label on the left, value on the right — suitable for compact lists and sidebars. |\n| `Vertical` | Label above, value below — suitable for wider panels with more visual space. |\n| `Horizontal - Right` | Label on the left, value right-aligned — use when numeric values need to align across multiple rows. |\n\n## Usage rules\n\n- Use `Horizontal` for compact attribute lists (4–8 items in a card or panel).\n- Use `Vertical` when each field needs more emphasis or when values are long strings.\n- Use `Horizontal - Right` for price or quantity displays where numeric alignment matters.\n- Do not use `Item` for editable fields — use `Input` + `Form Control` wrapper instead.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6826-331","thumb":"thumbs/6826-331.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":6},{"name":"Button","nodeId":"15:105","resolved":true,"viaVariant":"Variant=Primary Subtle, State=Default","count":3}],"usedBy":[],"needsAttention":false}]},{"p ","tm","dg","sg","cc","mu","mr","cy","va","ca","as","lc","eac","asean","st","bf","sa","mt","gm","cf","gp","us","ug","gb-eng","ie","li","bd","id","hm","al","bi","qa","se","om","mq","so","xx","je","kz","gq","td","mw","ad","cx","hk","ph","et","gb-wls","vi","gr","cm","sv","vu","im","un","mg","az","bz","ae","be","sh-hl","mc","mz","yt","cp","vn","gb","tk","cu","gf","do","am","jm","es","gg","tv","nf","sh-ta","bg","by","cv","ky","lu","ma","gh","mh","pf","tz","ro","bv","kp","sh-ac","cg","bo","tn","vc","il","ax","kh","mk","pm","pc","cn","tr","ai","my","au","ni","fi","sn","tt","rs","es-ga","sm","ye","ag","me","bh","nr","sb","bm","bq","ws","aw","bb","tl","jo","ht","sj","gi","ve","dz","arab","np","ms","ne","ec","fk","ir","gt","sk","ch","gn","ba","mx","ga","xk","ps","th","gu","cz","sl","io","ic","eh","la","uz","ua","ao","ci","kw","ck","sh","er","hu","sy","bn","pe","uy","re","sz","eg","sc","iq","si","in","pr","tj","lb","nu","cefta","hr","hn","nl","tg","gb-nir","to","ru","nz","cl","it","tf","pl","is","bt","sr","ar","es-pv","kr","pt","fm","bl","kn","co","br","de","cd","md","gl","ge","gs","lv","bs","bw","na","py","pg","tc","fo","gb-sct","lk","mf","af","ee","tw","zw","jp","cr","ml","fr","aq","es-ct","gy","ss","mn","gw"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/flag.md","docContent":"# Flag\n\n**Component set key:** `d4a537d0af5bb4431e52feb087e1a7daa998ae69`\n**Figma page:** `🧩 Assets`\n**Variants in set:** 271\n\n## Description\n\nFlag is a collection of country and territory flag icons keyed by ISO 3166-1 alpha-2 code (e.g., `pl`, `de`, `fr`). Additionally, a small number of regional/supranational flags are included (`eu`, `un`, `arab`, `asean`, `cefta`, `eac`). Use Flag to visually represent nationality, origin/destination country, or carrier country of registration.\n\n## Variants / Properties\n\n### Property 1 axis\n\nThe single property axis holds the ISO 316 e body content.\n\n## Variants / Properties\n\n### Property 1 axis\n| Variant | Suggested context |\n|---|---|\n| `Cargo` | Cargo-related empty states (no shipments, no items). |\n| `Container` | Container/logistics empty states. |\n| `Truck` | Transport or carrier-related screens. |\n| `Rocket` | Launch, onboarding, or success moments. |\n| `Time` | Waiting, processing, or deadline-related states. |\n| `Warning` | Caution or error screens. |\n| `No Entry` | Access denied or restricted screens. |\n| `Rabbit` | Speed or express service contexts. |\n| `Zebra` | Distinctive decorative use — verify context in Figma. |\n| `Arrows` | Bidirectional flow or exchange concepts. |\n| `Left Top Arrow Sign` | Navigation or direction metaphors. |\n| `Medail` | Achievement, rating, or award moments. |\n\n## Usage rules\n\n- Use Illustration for empty states and key moments only — not as generic decoration on every screen.\n- Each screen should use at most one Illustration.\n- Do not crop, recolour, or modify Illustration components — use them as provided in the library.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8779-66010","thumb":"thumbs/8779-66010.png","nested":[],"usedBy":[],"needsAttention":false},{"kind":"component","name":"Logo","description":"","nodeId":"105:4737","page":"🧩 Assets","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=105-4737","thumb":"thumbs/105-4737.png","nested":[],"usedBy":[{"name":"Page/Header/Carrier","nodeId":"7713:17336","count":3},{"name":"Page/Header/Shipper","nodeId":"106:7070","count":3}],"needsAttention":true},{"kind":"component","name":"Logo Small","description":"","nodeId":"87:9555","page":"🧩 Assets","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=87-9555","thu <script>
const M = JSON.parse(document.getElementById('model').textContent);
const esc = (s) => String(s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// Flat component list + derived facets for the Components table/cards views.
const COMP_MAIN = (M.components.groups||[]).flatMap(g => g.items);
const COMP_ASSETS = M.components.assets || [];
// COMP_ALL indexes both so the detail drawer (keyed by _i) works for components and assets alike.
const COMP_ALL = COMP_MAIN.concat(COMP_ASSETS);
COMP_ALL.forEach((it,i)=>{ it._i=i; });
const COMP_PAGES = [...new Set(COMP_MAIN.map(it => it.page || 'Other'))].sort((a,b)=>a.localeCompare(b));
const compState = { view:'table', q:'', page:'all', kind:'all', attn:false, sort:'name', dir:1 };
const assetState = { q:'' };

document.getElementById('brandsub').textContent = (M.uiKit.name || 'design system');
document.getElementById('topline').textContent =
  (M.uiKit.name || 'UI Kit') + '  ·  v' + (M.uiKit.version || '?');
document.getElementById('foot').innerHTML =
  'Synced ' + new Date(M.generatedAt).toLocaleString() + '<br>via Figma REST API';

// ---- Sections ----
const SECTIONS = [
  { id:'overview',   title:'Overview',   sub:'Current state of the 4Shipper design system.', count:null, render:overview },
  { id:'actions',    title:'Actions',    sub:'Refresh data and publish — no terminal needed.', count:null, render:actions },
  { id:'components', title:'Components',  sub:M.components.meaningful+' components ('+M.components.sets+' sets · '+M.components.standalone+' standalone), grouped by Figma page.', count:M.counts.meaningful, render:components },
  { id:'assets',     title:'Assets',      sub:M.counts.assets+' icons, logos, flags & illustrations from the '+(M.components.assetsPage||'Assets')+' page.', count:M.counts.assets, render:assetsView },
  { id:'typography', title:'Typography',  sub:M.counts.typography+' text styles with live previews.', count:M.counts.typography, render:typography },
  { id:'shadows',    title:'Shadows',     sub:M.counts.shadows+' effect styles.', count:M.counts.shadows, render:shadows },
  { id:'colors',     title:'Colors',      sub:M.counts.colors+' color tokens.', count:M.counts.colors, render:colors },
  { id:'variables',  title:'Variables',   sub:M.counts.variables+' design tokens (color, spacing, sizing, typography).', count:M.counts.variables, render:variables },
  { id:'pages',      title:'Pages',       sub:M.counts.pages+' pages · '+M.counts.screens+' screens in the design file.', count:M.counts.pages, render:pages },
  { id:'changelog',  title:'Changelog',   sub:'Recorded library changes over time.', count:null, render:changelog },
];

document.getElementById('nav').innerHTML = SECTIONS.map((s,i) =>
  '<button data-i="'+i+'" class="'+(i===0?'active':'')+'">'+esc(s.title)+
  (s.count!=null?'<span class="cnt">'+s.count+'</span>':'')+'</button>').join('');
document.querySelectorAll('#nav button').forEach(b => b.onclick = () => show(+b.dataset.i));

function show(i){
  document.querySelectorAll('#nav button').forEach((b,j)=>b.classList.toggle('active',i===j));
  const s = SECTIONS[i];
  document.getElementById('vtitle').textContent = s.title;
  document.getElementById('vsub').textContent = s.sub;
  document.getElementById('view').innerHTML = s.render();
  bindGroups();
  if (s.id==='components') initComponents();
  if (s.id==='assets') initAssets();
  if (s.id==='pages') initPages();
  if (s.id==='actions') initActions();
  if (location.hash !== '#'+s.id) history.replaceState(null,'','#'+s.id);
}

function statCards(list){
  return '<div class="stats">'+list.map(([n,l,h])=>
    '<div class="stat"><div class="n">'+n+'</div><div class="l">'+esc(l)+'</div>'+
    (h?'<div class="hint">'+esc(h)+'</div>':'')+'</div>').join('')+'</div>';
}

function overview(){
  const c=M.counts;
  let html = statCards([
    [c.meaningful,'Components', c.sets+' sets · '+c.standalone+' standalone'],
    [c.assets,'Assets','icons · logos · illustrations'],
    [c.variants,'Total variants','published in library'],
    [c.typography+c.shadows+c.colors,'Style tokens', c.typography+' type · '+c.shadows+' shadow'],
    [c.variables||'—','Variables', c.variables?'':'Enterprise-gated'],
    [c.pages,'Design pages', c.screens+' screens'],
  ]);
  // latest changelog entry preview
  const m = M.changelog.match(/##\s.+?(?=\n##\s|$)/s);
  html += '<div class="card"><h3>Latest change</h3>'+(m?mdToHtml(m[0]):'<span class="muted">No changes recorded yet.</span>')+'</div>';
  return html;
}

const LINKS = {
  uiKit:'https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO',
  design:'https://www.figma.com/design/Xol48qmGXL8hIqA42jbHno',
  repo:'https://github.com/snqzox/4shipper-design',
  live:'https://snqzox.github.io/4shipper-design/'
};
function isLocal(){ return ['localhost','127.0.0.1'].includes(location.hostname); }

function actions(){
  const links='<div class="card"><h3>Links</h3><div class="links">'+
    '<a href="'+LINKS.uiKit+'" target="_blank">UI Kit ↗</a>'+
    '<a href="'+LINKS.design+'" target="_blank">4Shipper Design ↗</a>'+
    '<a href="'+LINKS.repo+'" target="_blank">GitHub repo ↗</a>'+
    '<a href="'+LINKS.live+'" target="_blank">Live dashboard ↗</a></div></div>';
  if(!isLocal()){
    return '<div class="empty"><h4>Open the control panel locally to use actions</h4>'+
      '<p class="muted">This is the published, read-only dashboard. To refresh data and publish with buttons:</p>'+
      '<ol><li>Double-click <code>4shipper-design.command</code> in the project folder (or run <code>npm run serve</code>).</li>'+
      '<li>Your browser opens <code>http://localhost:4178</code> with these actions enabled.</li></ol></div>'+links;
  }
  const btn=(a,l,d,c)=>'<button class="actbtn '+(c||'')+'" onclick="runAction(\''+a+'\',this)"><span class="al">'+l+'</span><span class="ad">'+d+'</span></button>';
  return '<div id="actstatus" class="card actstatus">Loading status…</div>'+
    '<div class="actgrid">'+
      btn('sync','↻ Refresh all','Pull components, styles & pages, then rebuild')+
      btn('variables','🎨 Refresh variables','From Figma desktop (Dev Mode MCP must be on)')+
      btn('dashboard','⟳ Rebuild dashboard','Regenerate from current data')+
      btn('publish','▲ Publish to GitHub','Commit & push → updates the live site','primary')+
    '</div>'+
    '<div class="card"><h3>Output</h3><pre id="actlog" class="actlog">Idle. Pick an action above.</pre></div>'+
    links;
}

async function initActions(){
  const el=document.getElementById('actstatus'); if(!el) return;
  try{
    const s=await (await fetch('/api/status',{headers:{'x-ds-control':'1'}})).json();
    const when=s.generatedAt?new Date(s.generatedAt).toLocaleString():'—';
    const refreshed=s.refreshedAt?new Date(s.refreshedAt).toLocaleString():'—';
    const dirty=s.git&&s.git.dirty;
    el.innerHTML=
      '<div class="srow"><span>Last change</span><b>'+esc(when)+'</b></div>'+
      '<div class="srow"><span>Last refreshed</span><b>'+esc(refreshed)+'</b></div>'+
      '<div class="srow"><span>Components · Variables · Colors</span><b>'+s.components+' · '+s.variables+' · '+s.colors+'</b></div>'+
      '<div class="srow"><span>Uncommitted changes</span><b class="'+(dirty?'warn':'ok')+'">'+(dirty?(s.git.changes+' files — Publish to deploy'):'none — up to date')+'</b></div>';
  }catch(e){ el.textContent='Status unavailable ('+e.message+'). Is the control panel running (npm run serve)?'; }
}

async function runAction(action,btn){
  const log=document.getElementById('actlog');
  document.querySelectorAll('.actbtn').forEach(b=>{ b.disabled=true; });
  btn.classList.add('running');
  log.textContent='▶ '+action+' — running…\n';
  try{
    const r=await fetch('/api/run',{method:'POST',headers:{'content-type':'application/json','x-ds-control':'1'},body:JSON.stringify({action})});
    const j=await r.json();
    log.textContent=(j.output||'(no output)').trim();
    if(j.ok){
      log.textContent+='\n\n✓ Done.';
      if(action!=='publish'){ log.textContent+=' Reloading with fresh data…'; setTimeout(()=>location.reload(),1400); return; }
    } else { log.textContent+='\n\n✗ Failed — see output above.'; }
  }catch(e){ log.textContent='✗ '+e.message; }
  document.querySelectorAll('.actbtn').forEach(b=>{ b.disabled=false; });
  btn.classList.remove('running');
  initActions();
}

function ccard(it){
  const pill=(on,label)=>'<span class="hp '+(on?'on':'off')+'">'+label+'</span>';
  const thumb = it.thumb
    ? '<div class="cthumb"><img loading="lazy" src="'+esc(it.thumb)+'" alt=""></div>'
    : '<div class="cthumb"><span class="cph">'+esc((it.name[0]||'?').toUpperCase())+'</span></div>';

// ---- Components table/cards: filtering, sorting, rendering ----
function filteredComponents(){
  const s=compState, q=s.q.toLowerCase();
  return COMP_MAIN.filter(it=>{
    if(q && !((it.name+' '+(it.description||'')).toLowerCase().includes(q))) return false;
    if(s.page!=='all' && (it.page||'Other')!==s.page) return false;
    if(s.kind!=='all' && it.kind!==s.kind) return false;
    if(s.attn && !it.needsAttention) return false;
    return true;
  });
}
const COMP_SORT={
  name:it=>it.name.toLowerCase(),
  page:it=>(it.page||'').toLowerCase(),
  kind:it=>it.kind,
  variants:it=>it.kind==='set'?(it.variants||0):-1,
  desc:it=>it.hasDescription?1:0,
  doc:it=>it.hasDoc?1:0,
  showcase:it=>it.hasShowcase?1:0,
  stale:it=>it.stale?1:0,
};
function sortComponents(items){
  const f=COMP_SORT[compState.sort]||COMP_SORT.name, d=compState.dir;
  return items.slice().sort((a,b)=>{
    const va=f(a),vb=f(b);
    if(va<vb)return -d; if(va>vb)return d;
    return a.name.localeCompare(b.name);
  });
}
const COMP_COLS=[
  {k:'name',label:'Component',tip:'Component or component-set name. Click a row for full detail'},
  {k:'page',label:'Page',tip:'Figma page the component lives on'},
  {k:'kind',label:'Kind',tip:'Set = has variants · comp = standalone component'},
  {k:'variants',label:'Variants',tip:'Number of variants in the set'},
  {k:'desc',label:'Desc',tip:'Has a component description written in Figma'},
  {k:'doc',label:'Doc',tip:'Has a Markdown doc in the repo (docs/design-system/components)'},
  {k:'showcase',label:'Showcase',tip:'Has a 📖 Docs showcase page in the Figma UI Kit'},
  {k:'stale',label:'Stale',tip:'Doc may be out of date — flagged by the last sync'},
];
function compTable(items){
  const s=compState, yes='<span class="tick">✓</span>', no='<span class="cross">✗</span>';
  const head='<tr><th class="nosort" title="Component preview"></th>'+COMP_COLS.map(c=>
    '<th data-k="'+c.k+'" title="'+esc(c.tip)+' · Click to sort">'+esc(c.label)+(s.sort===c.k?'<span class="sar">'+(s.dir>0?'▲':'▼')+'</span>':'')+'</th>'
  ).join('')+'<th class="nosort" title="Open in Figma · Doc on GitHub">Links</th></tr>';
  const rows=items.map(it=>{
    const thumb=it.thumb
      ? '<div class="tthumb"><img loading="lazy" src="'+esc(it.thumb)+'" alt=""></div>'
      : '<div class="tthumb"><span class="cph">'+esc((it.name[0]||'?').toUpperCase())+'</span></div>';
    const links=(it.figmaUrl?'<a href="'+esc(it.figmaUrl)+'" target="_blank">Figma ↗</a>':'')+
      (it.docUrl?'<a href="'+esc(it.docUrl)+'" target="_blank">Doc ↗</a>':'');
    return '<tr data-id="'+it._i+'">'+
      '<td>'+thumb+'</td>'+
      '<td><div class="tnm">'+esc(it.name)+'</div>'+(it.description?'<div class="tdesc">'+esc(it.description)+'</div>':'')+'</td>'+
      '<td class="muted">'+esc(it.page||'—')+'</td>'+
      '<td>'+(it.kind==='set'?'<span class="tag set">set</span>':'<span class="tag comp">comp</span>')+'</td>'+
      '<td class="muted">'+(it.kind==='set'?it.variants:'—')+'</td>'+
      '<td>'+(it.hasDescription?yes:no)+'</td>'+
      '<td>'+(it.hasDoc?yes:no)+'</td>'+
      '<td>'+(it.hasShowcase?yes:no)+'</td>'+
      '<td>'+(it.stale?'<span class="hp warn">stale</span>':no)+'</td>'+
      '<td class="tlinks">'+(links||'<span class="faint">—</span>')+'</td>'+

function compCards(items){
  if(!items.length) return '<div class="empty">No components match.</div>';
  const groups={};
  for(const it of items){ (groups[it.page||'Other'] ||= []).push(it); }
  const list=Object.entries(groups).map(([page,its])=>({page,its})).sort((a,b)=>b.its.length-a.its.length);
  const openAll=items.length<=40;
  return list.map((g,gi)=>groupBlock(g.page, g.its.length, openAll||gi<2,
    '<div class="cgrid">'+g.its.map(ccard).join('')+'</div>'
  )).join('');
}
function renderComponents(){
  const items=sortComponents(filteredComponents());
  const cnt=document.getElementById('compcount');
  if(cnt) cnt.textContent=items.length+' / '+COMP_MAIN.length;
  const body=document.getElementById('compbody'); if(!body) return;
  body.innerHTML = compState.view==='table' ? compTable(items) : compCards(items);
  if(compState.view==='table'){
    body.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{
      const k=th.dataset.k;
      if(compState.sort===k){ compState.dir*=-1; }
      else { compState.sort=k; compState.dir=['name','page','kind'].includes(k)?1:-1; }
      renderComponents();

    body.querySelectorAll('.group .ghead').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('open'));

// Minimal Markdown → HTML for the doc preview (headings, lists, tables, bold, inline code).
function dsplitRow(ln){ return ln.trim().replace(/^\||\|$/g,'').split('|').map(s=>s.trim()); }
function dinline(s){ return esc(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }
function mdDoc(md){
  const lines=String(md).split('\n'); const out=[]; let i=0; let inList=false;
  const closeList=()=>{ if(inList){ out.push('</ul>'); inList=false; } };
  while(i<lines.length){
    const ln=lines[i];
    if(/^\s*\|/.test(ln) && i+1<lines.length && /^[\s|:-]*-[\s|:-]*$/.test(lines[i+1])){
      closeList();
      const header=dsplitRow(ln); i+=2; const rows=[];
      while(i<lines.length && /^\s*\|/.test(lines[i])){ rows.push(dsplitRow(lines[i])); i++; }
      out.push('<table class="dtable"><thead><tr>'+header.map(h=>'<th>'+dinline(h)+'</th>').join('')+
        '</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+dinline(c)+'</td>').join('')+'</tr>').join('')+'</tbody></table>');
      continue;
    }
    if(/^###\s/.test(ln)){ closeList(); out.push('<h4>'+dinline(ln.replace(/^###\s/,''))+'</h4>'); i++; continue; }
    if(/^##\s/.test(ln)){ closeList(); out.push('<h3>'+dinline(ln.replace(/^##\s/,''))+'</h3>'); i++; continue; }
    if(/^#\s/.test(ln)){ i++; continue; }
    if(/^[-*]\s/.test(ln)){ if(!inList){ out.push('<ul>'); inList=true; } out.push('<li>'+dinline(ln.replace(/^[-*]\s/,''))+'</li>'); i++; continue; }
    if(!ln.trim()){ closeList(); i++; continue; }
    closeList(); out.push('<p>'+dinline(ln)+'</p>'); i++;
  }
  closeList();
  return out.join('');
}

    return '<div class="typ"><div class="prev" style="'+style+'">'+esc(t.name)+'</div>'+

function pages(){
  if(!PAGE_LIST.length) return '<div class="empty">No pages found.</div>';
  const totalScreens = PAGE_LIST.reduce((n,p)=>n+p.total,0);
  const withScreens = PAGE_LIST.filter(p=>p.total>0).length;
  let html = statCards([
    [PAGE_LIST.length,'Pages', withScreens+' with screens'],
    [totalScreens,'Screens','top-level frames'],
    [PAGE_LIST.reduce((n,p)=>n+p.frames,0),'Frames','type = FRAME'],
    [PAGE_LIST.reduce((n,p)=>n+p.components,0),'Components','on design pages'],
  ]);
  html += '<div class="ctoolbar">'+
    '<input class="search" id="pagesearch" placeholder="Filter by page or screen name…">'+
    '<a class="fsel" style="text-decoration:none" href="'+esc('https://www.figma.com/design/'+DESIGN_KEY)+'" target="_blank">Open design file ↗</a>'+
    '<span class="ccount" id="pagecount"></span>'+
  '</div>'+
  '<div id="pagebody"></div>';
  return html;
}
function filteredPages(){
  const q = pageState.q.toLowerCase();
  if(!q) return PAGE_LIST;
  return PAGE_LIST.filter(p => p.name.toLowerCase().includes(q) ||
    (p.screens||[]).some(s=>s.name.toLowerCase().includes(q)));
}
function pageTable(items){
  const head = '<tr><th class="nosort" title="First screen preview"></th><th>Page</th>'+
    '<th>Screens</th><th>Frames</th><th>Comp.</th><th>Sections</th><th class="nosort">Figma</th></tr>';
  const rows = items.map(p =>
    '<tr data-pi="'+p._i+'">'+
      '<td>'+pageThumbCell(p)+'</td>'+
      '<td><div class="tnm">'+esc(p.name)+'</div></td>'+
      '<td class="muted">'+p.total+'</td>'+
      '<td class="muted">'+(p.frames||'—')+'</td>'+
      '<td class="muted">'+(p.components||'—')+'</td>'+
      '<td class="muted">'+(p.sections||'—')+'</td>'+
      '<td class="tlinks"><a href="'+esc(figNode(p.id))+'" target="_blank">Figma ↗</a></td>'+
    '</tr>').join('');
  return '<div class="twrap"><table class="ctable"><thead>'+head+'</thead><tbody>'+
    (rows||'<tr><td colspan="7" class="muted" style="padding:24px;text-align:center">No pages match.</td></tr>')+
    '</tbody></table></div>';
}
function renderPages(){
  const items = filteredPages();
  const body = document.getElementById('pagebody'); if(!body) return;
  body.innerHTML = pageTable(items);
  const cnt = document.getElementById('pagecount'); if(cnt) cnt.textContent = items.length+' / '+PAGE_LIST.length;
  body.querySelectorAll('[data-pi]').forEach(el=>el.onclick=ev=>{
    if(ev.target.closest('a')) return;
    openPageDetail(+el.dataset.pi);
  });
}
function initPages(){
  const q = document.getElementById('pagesearch'); if(!q) return;
  q.value = pageState.q; q.oninput = ()=>{ pageState.q=q.value; renderPages(); };
  renderPages();
}

// ---- Page detail drawer (reuses the shared #drawer infrastructure) ----
function screenRow(s){
  const thumb = PAGE_THUMBS[s.id]
    ? '<div class="fthumb"><img loading="lazy" src="'+esc(PAGE_THUMBS[s.id])+'" alt=""></div>'
    : '<div class="fthumb"><span class="cph">'+esc((s.name[0]||'?').toUpperCase())+'</span></div>';
  const dim = (s.w&&s.h) ? '<span class="fdim">'+s.w+'×'+s.h+'</span>' : '';
  const kids = s.children||[];
  const kidsHtml = kids.length
    ? '<div class="fkids">'+kids.map(c=>'<span class="kchip">'+typeTag(c.type)+'<span class="kn">'+esc(c.name)+'</span></span>').join('')+
        (s.childCount>kids.length?'<span class="kchip more">+'+(s.childCount-kids.length)+' more</span>':'')+'</div>'
    : '<div class="fkids empty">No child layers.</div>';
  return '<div class="frame" data-fn="'+esc(s.name.toLowerCase())+'">'+
    '<div class="fhead">'+thumb+
      '<div class="fmeta">'+
        '<div class="ftop"><span class="fname">'+esc(s.name)+'</span>'+typeTag(s.type)+'</div>'+
        '<div class="fsub">'+dim+'<span class="fcount">'+s.childCount+' layer'+(s.childCount===1?'':'s')+'</span>'+
          '<a class="ffig" href="'+esc(figNode(s.id))+'" target="_blank">Figma ↗</a></div>'+
      '</div>'+
      '<button class="fexp" aria-label="Toggle structure">▶</button>'+
    '</div>'+kidsHtml+'</div>';
}
function pageDetailPanel(p){
  const pill=(n,label)=> n?'<span class="hp on">'+n+' '+label+'</span>':'';
  const head = '<div class="dhead"><button class="dclose" aria-label="Close">×</button>'+
    '<div class="dpage">'+esc(M.design.name||'Design file')+'</div>'+
    '<h2>'+esc(p.name)+'</h2>'+
    '<div class="cpills">'+pill(p.total,'screens')+pill(p.frames,'frames')+
      pill(p.components,'components')+pill(p.sections,'sections')+'</div></div>';
  const byChips = Object.entries(p.by).sort((a,b)=>b[1]-a[1])
    .map(([t,n])=>'<span class="achip">'+typeTag(t)+' ×'+n+'</span>').join('');
  const screens = p.screens||[];
  let body = '<div class="dsec"><h4>Composition</h4><div class="av">'+
    (byChips||'<span class="ddesc none">Empty page.</span>')+'</div></div>';
  body += '<div class="dsec"><h4>Screens &amp; structure ('+screens.length+')</h4>'+
    (screens.length>6?'<input class="search dfilter" id="framefilter" placeholder="Filter screens…">':'')+
    '<div class="flist">'+(screens.map(screenRow).join('')||'<div class="ddesc none">No top-level frames.</div>')+
    '</div></div>';
  body += '<div class="dsec"><h4>Links</h4><div class="dlinks">'+
    '<a href="'+esc(figNode(p.id))+'" target="_blank">Open page in Figma ↗</a></div></div>';
  return head+'<div class="dbody">'+body+'</div>';
}
function openPageDetail(i){
  const p = PAGE_LIST[i]; if(!p) return;
  const panel = document.getElementById('drawerpanel');
  panel.innerHTML = pageDetailPanel(p);
  const dr = document.getElementById('drawer');
  dr.classList.add('open'); dr.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden'; panel.scrollTop=0;
  panel.querySelector('.dclose').onclick = closeDetail;
  // Expand a screen to reveal its immediate child layers (the structure preview).
  panel.querySelectorAll('.frame .fhead').forEach(h=>h.onclick=ev=>{
    if(ev.target.closest('a')) return;
    h.parentElement.classList.toggle('open');
  });
  const ff = panel.querySelector('#framefilter');
  if(ff) ff.oninput = ()=>{ const q=ff.value.toLowerCase();
    panel.querySelectorAll('.frame').forEach(f=>{ f.style.display=f.dataset.fn.includes(q)?'':'none'; }); };
  document.querySelectorAll('.ctable tbody tr.sel').forEach(r=>r.classList.remove('sel'));
  const row = document.querySelector('.ctable tbody tr[data-pi="'+i+'"]'); if(row) row.classList.add('sel');
}

function changelog(){ return '<div class="changelog card">'+mdToHtml(M.changelog)+'</div>'; }

// ---- helpers ----
function groupBlock(name, count, open, bodyHtml){
  return '<div class="group'+(open?' open':'')+'"><button class="ghead"><span class="chev">▶</span>'+
    '<span class="gname">'+esc(name)+'</span><span class="gcount">'+count+'</span></button>'+
    '<div class="gbody">'+bodyHtml+'</div></div>';
}
function bindGroups(){
  document.querySelectorAll('.group .ghead').forEach(h=> h.onclick=()=>h.parentElement.classList.toggle('open'));
  const cs=document.getElementById('csearch'); if(cs) cs.oninput=()=>filter(cs,'.citem');
  const ps=document.getElementById('psearch'); if(ps) ps.oninput=()=>filter(ps,'.sitem');
  const vs=document.getElementById('vsearch'); if(vs) vs.oninput=()=>filter(vs,'.vitem');
  const attn=document.getElementById('attnonly'); if(attn&&cs) attn.onchange=()=>filter(cs,'.citem');
}
function filter(input, sel){
  const q=(input?input.value:'').toLowerCase();
  const attnOnly=!!(document.getElementById('attnonly')&&document.getElementById('attnonly').checked);
  document.querySelectorAll('.group').forEach(g=>{
    let any=false;
    g.querySelectorAll(sel).forEach(r=>{
      const hit=r.dataset.n.includes(q) && (!attnOnly || r.dataset.attn==='1');
      r.style.display=hit?'':'none'; if(hit)any=true;
    });
    if(g.querySelector(sel)){ g.style.display=any?'':'none'; if((q||attnOnly)&&any) g.classList.add('open'); }
  });
}
function mdToHtml(md){
  const lines=md.split('\n'); let out=[]; let inList=false;
  for(let ln of lines){
    if(/^##\s/.test(ln)){ if(inList){out.push('</ul>');inList=false;} out.push('<h2>'+esc(ln.replace(/^##\s/,''))+'</h2>'); }
    else if(/^#\s/.test(ln)){ /* skip top title */ }
    else if(/^[-*]\s/.test(ln)){ if(!inList){out.push('<ul>');inList=true;} out.push('<li>'+inline(ln.replace(/^[-*]\s/,''))+'</li>'); }
    else { if(inList){out.push('</ul>');inList=false;} if(ln.trim()) out.push('<p class="muted">'+inline(ln)+'</p>'); }
  }
  if(inList)out.push('</ul>');
  return out.join('');
}
function inline(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }

// init from hash
const start = SECTIONS.findIndex(s=>'#'+s.id===location.hash);
show(start>=0?start:0);
</script>
