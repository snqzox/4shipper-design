<style>

  .shadows { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }

  /* Variable rows */
  .vchip { width:16px; height:16px; border-radius:4px; border:1px solid var(--line2); flex:0 0 auto; }
  .vval { margin-left:auto; font-size:12px; color:var(--muted); white-space:nowrap; }

  .changelog li { margin:2px 0; }

  .srow { display:flex; justify-content:space-between; gap:16px; font-size:13px; }
  .srow span { color:var(--muted); }
  .srow b.ok { color:var(--ok); } .srow b.warn { color:var(--warn); }
  .actgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin-bottom:14px; }
  .actbtn { all:unset; cursor:pointer; display:flex; flex-direction:column; gap:3px; background:var(--panel);
    border:1px solid var(--line2); border-radius:var(--radius); padding:15px 17px; transition:border-color .15s, background .15s; }
  .actbtn:hover { border-color:var(--accent); background:#161d2a; }
  .actbtn.primary { border-color:#2b3d63; background:#13203a; }
  .actbtn.primary:hover { border-color:var(--accent); }
  .actbtn[disabled] { opacity:.45; cursor:not-allowed; }

  @keyframes pulse { 50% { opacity:.6; } }

  .ctoolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px; }
  .ctoolbar .search { flex:1; min-width:200px; margin-bottom:0; }

  .seg button { all:unset; cursor:pointer; padding:9px 14px; font-size:13px; color:var(--muted); }
  .seg button:hover { color:var(--fg); background:#161c28; }
  .seg button.active { background:#18202e; color:var(--fg); }
  .fsel { padding:10px 12px; background:var(--panel); border:1px solid var(--line2); border-radius:9px;

  /* Components table */

81","name":"⚛️ Route Entry"},{"id":"8808:80242","name":"Stepper"},{"id":"8810:80309","name":"bc"},{"id":"8815:992","name":"📖 Docs / Button"},{"id":"8848:107957","name":"📖 Docs / Badge"}]},"counts":{"meaningful":62,"sets":38,"standalone":24,"assets":150,"variants":662,"typography":28,"shadows":2,"colors":175,"variables":350,"pages":17,"screens":91},"components":{"raw":662,"sets":38,"standalone":24,"meaningful":62,"health":{"total":62,"documented":39,"described":2,"showcased":2,"stale":0,"needsAttention":60},"groups":[{"page":"⚛️ Price","items":[{"kind":"set","name":"Price","description":"","nodeId":"8804:49176","page":"⚛️ Price","variants":4,"variantNames":["Align=Left, Style=Single Line","Align=Right, Style=Multi Lines","Align=Right, Style=Single Line","Align=Left, Style=Multi Lines"],"properties":[{"axis":"Align","values":["Left","Right"]},{"axis":"Style","values":["Single Line","Multi Lines"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/price.md","docContent":"# Price\n\n**Component set key:** `14e12140269f44a27078b9892555ccb2539c7720`\n**Figma page:** `⚛️ Price`\n**Variants in set:** 1\n\n## Description\n\nPrice is the composite price display component used when additional context is needed alongside the monetary value — for example, showing a base price together with a per-kilometre rate or currency breakdown. Use `Price/Basic` for simple value display; use `Price` when the full contextual price block is required.\n\n## Variants / Properties\n\n### Property 1 axis\n| Variant | Description |\n|---|---|\n| `Default` | Standard full-context price block. |\n\n## Related components\n\n- `Price/Basic` — simplified size-variant price label for standalone value display.\n\n## Usage rules\n\n- Use `Price` in carrier offer cards and tender price summaries where multiple price dimensions need to be shown together.\n- Use `Price/Basic` for single-value price display in table cells or compact UI.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8804-49176","thumb":"thumbs/8804-49176.png","needsAttention":true},{"kind":"set","name":"Price/Basic","description":"","nodeId":"8784:67597","page":"⚛️ Price","variants":4,"variantNames":["Property 1=XS","Property 1=LG","Property 1=MD","Property 1=SM"],"properties":[{"axis":"Property 1","values":["XS","LG","MD","SM"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/price-basic.md","docContent":"# Price/Basic\n\n**Component set key:** `d2333632e60796c68093f6afc645c7280656bd3c`\n**Figma page:** `⚛️ Price`\n**Variants in set:** 4\n\n## Description\n\nPrice/Basic is a typographic display component for rendering a monetary value. It comes in four sizes to fit different layout contexts — from a prominent headline price to a compact inline value. Always use this component for price display to ensure consistent number formatting and currency presentation across the product.\n\n## Variants / Properties\n\n### Property 1 axis (size)\n| Size | When to use |\n|---|---|\n| `XS` | Smallest — inline within dense table cells or metadata rows. |\n| `SM` | Small — secondary price display alongside a primary price. |\n| `MD` | Medium/default — standard card or summary use. |\n| `LG` | Large — prominent hero price, e.g., the winning offer price on a tender. |\n\n## Related components\n\n- `Price` — the full price component with currency and per-unit breakdown.\n\n## Usage rules\n\n- Always include the currency symbol or code alongside the numeric value.\n- Use `LG` for the primary price on a screen; use `SM` or `XS` for supplementary or comparative prices.\n- Do not use plain text for price values — always use this component for correct formatting.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8784-67597","thumb":"thumbs/8784-67597.png","needsAttention":true},{"kind":"component","name":"Price/Original","description":"","nodeId":"8784:67541","page":"⚛️ Price","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8784-67541","thumb":"thumbs/8784-67541.png","needsAttention":true},{"kind":"component","name":"Price/Original/Per Kilometer","description":"","nodeId":"8785:67714","page":"⚛️ Price","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8785-67714","thumb":"thumbs/8785-67714.png","needsAttention":true},{"kind":"component","name":"Price/Per Kilometer","description":"","nodeId":"8784:67542","page":"⚛️ Price","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8784-67542","thumb":"thumbs/8784-67542.png","needsAttention":true}]},{"page":"⚛️ Status","items":[{"kind":"set","name":"Status","description":"","nodeId":"3555:106557","page":"⚛️ Status","variants":8,"variantNames":["Status=Canceled","Status=Collecting offers","Status=Active","Status=Status8","Status=Expired","Status=Draft","Status=Evaluation","Status=Finished"],"properties":[{"axis":"Status","values":["Canceled","Collecting offers","Active","Status8","Expired","Draft","Evaluation","Finished"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/status.md","docContent":"# Status\n\n**Component set key:** `9b4e31abdd930c8f349ecc2b409663d79a468ddb`\n**Figma page:** `⚛️ Status`\n**Variants in set:** 8\n\n## Description\n\nStatus is the generic status badge for entities that do not have a dedicated domain-specific status component. Use it for states that cut across domains or for new entity types before a domain-specific set is established. Where a domain-specific set exists (`Status/Tender`, `Status/Transports`, `Status/Requests`, `Status/Contract`), prefer that component instead.\n\n## Variants / Properties\n\n### Status axis\n| Status | Meaning |\n|---|---|\n| `Active` | Entity is currently active and valid. |\n| `Draft` | Entity has been created but not yet published or submitted. |\n| `Collecting offers` | Open for submissions or bids. |\n| `Evaluation` | Submissions received; under review. |\n| `Expired` | Passed its validity period. |\n| `Finished` | Process completed successfully. |\n| `Canceled` | Process terminated before completion. |\n| `Status8` | Placeholder — check Figma for the intended value before using. |\n\n## Usage rules\n\n- Prefer domain-specific `Status/*` components over this generic set when the entity domain is known.\n- Do not use `Status8` in production screens until it carries a defined meaning.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=3555-106557","thumb":"thumbs/3555-106557.png","needsAttention":true},{"kind":"set","name":"Status/Contract","description":"","nodeId":"8754:49262","page":"⚛️ Status","variants":4,"variantNames":["Status=Status8","Status=Expired","Status=Canceled","Status=Active"],"properties":[{"axis":"Status","values":["Status8","Expired","Canceled","Active"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/status-contract.md","docContent":"# Status/Contract\n\n**Component set key:** `a5e9a696b4b111dd1ffe19398e4e69fad893c995`\n**Figma page:** `⚛️ Status`\n**Variants in set:** 4\n\n## Description\n\nStatus/Contract is the status badge for contract lifecycle states. Use it in contract list rows, contract detail headers, and any view that surfaces the current standing of a freight contract.\n\n## Variants / Properties\n\n### Status axis\n| Status | Meaning |\n|---|---|\n| `Active` | Contract is in force and valid. |\n| `Expired` | Contract end date has passed. |\n| `Canceled` | Contract was terminated before its end date. |\n| `Status8` | Placeholder variant — check Figma for the intended status value before using in designs. |\n\n## Related components\n\n- `Shipper/Contract/List Entry` — list row component that embeds this status.\n- `Status/Tender`, `Status/Requests`, `Status/Transports` — parallel status sets for other domains.\n\n## Usage rules\n\n- Do not use `Status8` in production designs until it has a defined semantic meaning.\n- Always use the domain-specific `Status/Contract` component rather than generic `Badge` for contract states.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8754-49262","thumb":"thumbs/8754-49262.png","needsAttention":true},{"kind":"set","name":"Status/Requests","description":"","nodeId":"8754:49327","page":"⚛️ Status","variants":6,"variantNames":["Status=Active","Status=Confirmed","Status=Canceled","Status=Bidding completed","Status=Merged","Status=Draft"],"properties":[{"axis":"Status","values":["Active","Confirmed","Canceled","Bidding completed","Merged","Draft"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/status-requests.md","docContent":"# Status/Requests\n\n**Component set key:** `4b790686479e200cc09bc9c4b3295e70e576246b`\n**Figma page:** `⚛️ Status`\n**Variants in set:** 4\n\n## Description\n\nStatus/Requests is a specialised status badge for transport request lifecycle states. Use it in any view that lists or details transport requests to communicate the current processing stage at a glance.\n\n## Variants / Properties\n\n### Status axis\n| Status | Meaning |\n|---|---|\n| `Active` | Request is open and being processed. |\n| `Bidding completed` | The bidding window has closed; a winner may be selected. |\n| `Expired` | Request passed its deadline without completion. |\n| `Rejected by carrier` | The carrier declined the request. Note: variant name contains a typo (`carrrier`) in Figma — use the component as-is. |\n\n## Related components\n\n- `Status/Transports` — status labels for transport executions.\n- `Status/Tender` — status labels for tender lifecycle.\n- `Status/Contract` — status labels for contract states.\n- `Status` (generic) — broader status set used when a domain-specific set does not apply.\n\n## Usage rules\n\n- Do not substitute a `Badge` for a `Status/Requests` chip — status components carry domain-specific colour semantics.\n- Always use the exact status value that maps to the backend state; do not invent intermediate states.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8754-49327","thumb":"thumbs/8754-49327.png","needsAttention":true},{"kind":"set","name":"Status/Tender","description":"","nodeId":"8754:49197","page":"⚛️ Status","variants":5,"variantNames":["Status=Canceled","Status=Finished","Status=Evaluation","Status=Draft","Status=Collecting offers"],"properties":[{"axis":"Status","values":["Canceled","Finished","Evaluation","Draft","Collecting offers"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/status-tender.md","docContent":"# Status/Tender\n\n**Component set key:** `78fa65f4c6a21fc2b1d4005f485c1758e6c65295`\n**Figma page:** `⚛️ Status`\n**Variants in set:** 5\n\n## Description\n\nStatus/Tender is the status badge for tender lifecycle states. Use it in tender list rows, tender detail headers, and anywhere the stage of a tender process needs to be communicated visually.\n\n## Variants / Properties\n\n### Status axis\n| Status | Meaning |\n|---|---|\n| `Draft` | Tender has been created but not yet published. |\n| `Collecting offers` | Tender is live — carriers can submit price offers. |\n| `Evaluation` | Offer collection has ended; shipper is reviewing submissions. |\n| `Finished` | Tender completed — a carrier was selected. |\n| `Canceled` | Tender was cancelled and is no longer active. |\n\n## Related components\n\n- `Status/Requests` — request-level status.\n- `Status/Transports` — transport execution status.\n- `Status/Contract` — contract status.\n- `Shipper/Tender/List Entry` — list row that embeds this status.\n\n## Usage rules\n\n- Mirror the exact backend tender state in the status component — do not approximate or merge states.\n- The `Draft` status should only be visible to the shipper who created the tender, not to carriers.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8754-49197","thumb":"thumbs/8754-49197.png","needsAttention":true},{"kind":"set","name":"Status/Transports","description":"","nodeId":"8754:49370","page":"⚛️ Status","variants":5,"variantNames":["Status=Canceled by support","Status=Canceled by carrier","Status=Canceled","Status=Bidding completed","Status=Processing"],"properties":[{"axis":"Status","values":["Canceled by support","Canceled by carrier","Canceled","Bidding completed","Processing"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/status-transports.md","docContent":"# Status/Transports\n\n**Component set key:** `5c14a532c94f1d0a37b4b51d0d7a8124efaab4d6`\n**Figma page:** `⚛️ Status`\n**Variants in set:** 4\n\n## Description\n\nStatus/Transports is the status badge for transport execution lifecycle states. Place it in transport list rows, transport detail headers, and any summary view where the execution status of a transport needs to be visible at a glance.\n\n## Variants / Properties\n\n### Status axis\n| Status | Meaning |\n|---|---|\n| `In progress` | Transport is currently being executed (en route). |\n| `Processing` | Transport has been confirmed and is being prepared. |\n| `Bidding completed` | Bidding phase is over; transport is awaiting assignment. |\n| `Canceled` | Transport was cancelled before or during execution. |\n\n## Related components\n\n- `Status/Requests` — for transport request states.\n- `Status/Tender` — for tender lifecycle states.\n- `Status/Contract` — for contract states.\n\n## Usage rules\n\n- Use this component exclusively for transport execution states — not for tender or contract states.\n- Do not substitute a generic `Badge` or `Status` component when a domain-specific `Status/Transports` variant exists.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8754-49370","thumb":"thumbs/8754-49370.png","needsAttention":true}]},{"page":"⚛️ Route Entry","items":[{"kind":"set","name":"Route Entry","description":"","nodeId":"131:12752","page":"⚛️ Route Entry","variants":11,"variantNames":["Order=Last","Order=Middle","Order=First","Selected=False, Expanded=False, Selectable=True","Selected=True, Expanded=True, Selectable=False","Selected=True, Expanded=False, Selectable=False","Selected=True, Expanded=True, Selectable=True","Selected=True, Expanded=False, Selectable=True","Selected=False, Expanded=True, Selectable=True","Selected=False, Expanded=False, Selectable=False","Selected=False, Expanded=True, Selectable=False"],"properties":[{"axis":"Order","values":["Last","Middle","First"]},{"axis":"Selected","values":["False","True"]},{"axis":"Expanded","values":["False","True"]},{"axis":"Selectable","values":["True","False"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/route-entry.md","docContent":"# Route Entry\n\n**Component set key:** `0435debb38ad77e167b74da63766b0fe81d0e45f`\n**Figma page:** `⚛️ Route Entry`\n**Variants in set:** 11\n\n## Description\n\nRoute Entry is a single waypoint row in a read-only or interactive route display. It renders stop information (location, date/time) with a visual connector indicating its position in the sequence (First, Middle, Last). It supports both selectable (for carrier route browsing) and non-selectable (for shipper summary display) modes.\n\n## Variants / Properties\n\n### Order axis\n| Order | Description |\n|---|---|\n| `First` | First stop in the route — renders the start node of the route connector. |\n| `Middle` | An intermediate stop — renders a mid-connector node. |\n| `Last` | Final stop in the route — renders the end node. |\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | Stop is not highlighted. |\n| `True` | Stop is selected/active — highlighted state. |\n\n### Expanded axis\n| Value | Description |\n|---|---|\n| `False` | Compact view — shows location and date only. |\n| `True` | Expanded view — reveals additional stop details. |\n\n### Selectable axis\n| Value | Description |\n|---|---|\n| `False` | Row is display-only — no selection interaction. |\n| `True` | Row can be selected by the user. |\n\n## Related components\n\n- `Route Entry 2` — alternative/supplementary route entry style.\n- `Waypoint Entry` — the editable counterpart used in form creation flows.\n\n## Usage rules\n\n- Use `First` and `Last` only once per route; all intermediate stops use `Middle`.\n- Use `Selectable=False` in read-only tender/transport detail views.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=131-12752","thumb":"thumbs/131-12752.png","needsAttention":true},{"kind":"set","name":"Route Entry","description":"Sample component description","nodeId":"707:368801","page":"⚛️ Route Entry","variants":11,"variantNames":["Order=Last","Order=Middle","Order=First","Selected=False, Expanded=False, Selectable=True","Selected=True, Expanded=True, Selectable=False","Selected=True, Expanded=False, Selectable=False","Selected=True, Expanded=True, Selectable=True","Selected=True, Expanded=False, Selectable=True","Selected=False, Expanded=True, Selectable=True","Selected=False, Expanded=False, Selectable=False","Selected=False, Expanded=True, Selectable=False"],"properties":[{"axis":"Order","values":["Last","Middle","First"]},{"axis":"Selected","values":["False","True"]},{"axis":"Expanded","values":["False","True"]},{"axis":"Selectable","values":["True","False"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/route-entry.md","docContent":"# Route Entry\n\n**Component set key:** `0435debb38ad77e167b74da63766b0fe81d0e45f`\n**Figma page:** `⚛️ Route Entry`\n**Variants in set:** 11\n\n## Description\n\nRoute Entry is a single waypoint row in a read-only or interactive route display. It renders stop information (location, date/time) with a visual connector indicating its position in the sequence (First, Middle, Last). It supports both selectable (for carrier route browsing) and non-selectable (for shipper summary display) modes.\n\n## Variants / Properties\n\n### Order axis\n| Order | Description |\n|---|---|\n| `First` | First stop in the route — renders the start node of the route connector. |\n| `Middle` | An intermediate stop — renders a mid-connector node. |\n| `Last` | Final stop in the route — renders the end node. |\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | Stop is not highlighted. |\n| `True` | Stop is selected/active — highlighted state. |\n\n### Expanded axis\n| Value | Description |\n|---|---|\n| `False` | Compact view — shows location and date only. |\n| `True` | Expanded view — reveals additional stop details. |\n\n### Selectable axis\n| Value | Description |\n|---|---|\n| `False` | Row is display-only — no selection interaction. |\n| `True` | Row can be selected by the user. |\n\n## Related components\n\n- `Route Entry 2` — alternative/supplementary route entry style.\n- `Waypoint Entry` — the editable counterpart used in form creation flows.\n\n## Usage rules\n\n- Use `First` and `Last` only once per route; all intermediate stops use `Middle`.\n- Use `Selectable=False` in read-only tender/transport detail views.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=707-368801","thumb":"thumbs/707-368801.png","needsAttention":false},{"kind":"set","name":"Route Entry 2","description":"","nodeId":"8617:6114","page":"⚛️ Route Entry","variants":4,"variantNames":["Order=Small Dot","Order=Default","Order=Smaller","Order=Order4"],"properties":[{"axis":"Order","values":["Small Dot","Default","Smaller","Order4"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/route-entry-2.md","docContent":"# Route Entry 2\n\n**Component set key:** `aacbd9b391644aefb73977cb333cb600e9d4fd4f`\n**Figma page:** `⚛️ Route Entry`\n**Variants in set:** 4\n\n## Description\n\nRoute Entry 2 is a supplementary route waypoint component that provides additional size/density variants not covered by the primary `Route Entry`. It is used in contexts where the route visualisation requires a more compact node indicator, such as nested route summaries or auxiliary route displays.\n\n## Variants / Properties\n\n### Order axis\n| Order | Description |\n|---|---|\n| `Default` | Standard node size. |\n| `Smaller` | Reduced node size for denser layouts. |\n| `Small Dot` | Minimal dot indicator — used for very compact route lines. |\n| `Order4` | Additional variant — verify in Figma for the current visual treatment. |\n\n## Related components\n\n- `Route Entry` — primary route entry component with full interaction support.\n\n## Usage rules\n\n- Use `Route Entry 2` only when `Route Entry` does not fit the required density or node style.\n- Maintain visual consistency within a single route display — do not mix `Route Entry` and `Route Entry 2` node styles arbitrarily.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8617-6114","thumb":"thumbs/8617-6114.png","needsAttention":true},{"kind":"component","name":"Waypoint","description":"","nodeId":"8622:85326","page":"⚛️ Route Entry","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8622-85326","thumb":"thumbs/8622-85326.png","needsAttention":true}]},{"page":"⚛️ Table","items":[{"kind":"component","name":"Table","description":"","nodeId":"7191:94525","page":"⚛️ Table","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7191-94525","thumb":"thumbs/7191-94525.png","needsAttention":true},{"kind":"set","name":"Table Cell","description":"","nodeId":"7191:91598","page":"⚛️ Table","variants":6,"variantNames":["Align=Left, Variant=Cell","Align=Center, Variant=Head","Align=Right, Variant=Cell","Align=Center, Variant=Cell","Align=Left, Variant=Head","Align=Right, Variant=Head"],"properties":[{"axis":"Align","values":["Left","Center","Right"]},{"axis":"Variant","values":["Cell","Head"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/table-cell.md","docContent":"# Table Cell\n\n**Component set key:** `cf0997e6ec79e032395dfa682fbaeff7a93a58a3`\n**Figma page:** `⚛️ Table`\n**Variants in set:** 6\n\n## Description\n\nTable Cell is the atomic building block of data tables in 4Shipper / Transportly. It exists in two roles — `Head` (column header) and `Cell` (data row) — and supports three horizontal alignments. Compose Table Cell instances into rows within the `Table` layout component.\n\n## Variants / Properties\n\n### Variant axis\n| Variant | Description |\n|---|---|\n| `Head` | Column header cell — renders label text with sorting affordance if needed. |\n| `Cell` | Data row cell — renders the row value. |\n\n### Align axis\n| Align | When to use |\n|---|---|\n| `Left` | Default for text content (labels, names, descriptions). |\n| `Center` | Short categorical values (flags, icons, status indicators). |\n| `Right` | Numeric values (prices, quantities, percentages) so decimal points align. |\n\n## Usage rules\n\n- Always right-align numeric columns; always left-align text columns.\n- Use `Head` cells only in the first (header) row of a table.\n- Do not mix alignments within a column — the `Head` and all `Cell` entries for the same column must share the same `Align` value.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7191-91598","thumb":"thumbs/7191-91598.png","needsAttention":true},{"kind":"component","name":"Table Column","description":"","nodeId":"7191:92194","page":"⚛️ Table","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7191-92194","thumb":"thumbs/7191-92194.png","needsAttention":true}]},{"page":"⚛️ Progress Bar","items":[{"kind":"set","name":"Progress Bar/Bar","description":"","nodeId":"7215:102951","page":"⚛️ Progress Bar","variants":2,"variantNames":["Size=Default","Size=SM"],"properties":[{"axis":"Size","values":["Default","SM"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/progress-bar.md","docContent":"# Progress Bar/Bar\n\n**Component set key:** `d6b611082102b96edbde92ca153d7b3e4c1d4288`\n**Figma page:** `⚛️ Progress Bar`\n**Variants in set:** 2\n\n## Description\n\nProgress Bar is a horizontal track-and-fill indicator that communicates the completion percentage of a process or the current value within a range. Use it for tasks with a measurable, determinate progress value — for example, upload completion, onboarding step progress, or cargo fill level.\n\n## Variants / Properties\n\n### Size axis\n| Size | Description |\n|---|---|\n| `Default` | Standard height — use in most contexts. |\n| `SM` | Smaller height — use inside compact cards or table cells where vertical space is limited. |\n\n## Usage rules\n\n- Only use Progress Bar for determinate progress (a known percentage). For indeterminate loading states, use a spinner or skeleton instead.\n- Always accompany the bar with a numeric label or descriptive text so the value is accessible.\n- Use `SM` size only in dense layouts where `Default` would dominate too much vertical space.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7215-102951","thumb":"thumbs/7215-102951.png","needsAttention":true},{"kind":"component","name":"Progress Bar/Label Description","description":"","nodeId":"7215:102922","page":"⚛️ Progress Bar","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7215-102922","thumb":"thumbs/7215-102922.png","needsAttention":true},{"kind":"component","name":"Progress Group","description":"","nodeId":"7215:102950","page":"⚛️ Progress Bar","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7215-102950","thumb":"thumbs/7215-102950.png","needsAttention":true}]},{"page":"⚛️ Checkbox, Radio, Switch (Toggle)","items":[{"kind":"set","name":"Check, Radio, Switch Item","description":"","nodeId":"31:1784","page":"⚛️ Checkbox, Radio, Switch (Toggle)","variants":12,"variantNames":["Checked=True, Variant=Card Left, Disabled=True","Checked=False, Variant=Card Right, Disabled=False","Checked=False, Variant=Default, Disabled=False","Checked=True, Variant=Card Left, Disabled=False","Checked=False, Variant=Card Left, Disabled=False","Checked=True, Variant=Card Right, Disabled=False","Checked=False, Variant=Default, Disabled=True","Checked=True, Variant=Default, Disabled=False","Checked=False, Variant=Card Left, Disabled=True","Checked=True, Variant=Default, Disabled=True","Checked=True, Variant=Card Right, Disabled=True","Checked=False, Variant=Card Right, Disabled=True"],"properties":[{"axis":"Checked","values":["True","False"]},{"axis":"Variant","values":["Card Left","Card Right","Default"]},{"axis":"Disabled","values":["True","False"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/check-radio-switch-item.md","docContent":"# Check, Radio, Switch Item\n\n**Component set key:** `69832ee12634e155386b695a6529f1b4e89456ac`\n**Figma page:** `⚛️ Checkbox, Radio, Switch (Toggle)`\n**Variants in set:** 12\n\n## Description\n\nCheck, Radio, Switch Item is the atomic selection control — a single checkbox, radio button, or toggle used directly on a form field. It supports a default inline layout as well as card-based variants that present the control inside a visual card container, suitable for option selection with more visual weight.\n\n## Variants / Properties\n\n### Variant axis\n| Variant | Description |\n|---|---|\n| `Default` | Standard inline control — checkbox or radio with a label beside it. |\n| `Card Left` | Control rendered inside a card; indicator on the left side of the card. |\n| `Card Right` | Control rendered inside a card; indicator on the right side of the card. |\n\n### Checked axis\n| Value | Description |\n|---|---|\n| `False` | Control is unchecked / not selected. |\n| `True` | Control is checked / selected. |\n\n### Disabled axis\n| Value | Description |\n|---|---|\n| `False` | Interactive — user can toggle. |\n| `True` | Non-interactive — visually dimmed. |\n\n## Related components\n\n- `Switch Item` — dedicated toggle switch control (on/off, not check/radio).\n- `List Entry` — selectable list row that embeds a selection control.\n- `List Entry Group` — collapsible group of `List Entry` rows.\n\n## Usage rules\n\n- Use `Default` variant for standard form fields.\n- Use `Card` variants when options need visual separation and more surface area (e.g., service type selection).\n- Radio controls must always be presented in groups — never use a single radio button.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=31-1784","thumb":"thumbs/31-1784.png","needsAttention":true},{"kind":"set","name":"List Entry","description":"","nodeId":"5978:70626","page":"⚛️ Checkbox, Radio, Switch (Toggle)","variants":4,"variantNames":["Selected=True, Disabled=False","Selected=True, Disabled=True","Selected=False, Disabled=True","Selected=False, Disabled=False"],"properties":[{"axis":"Selected","values":["True","False"]},{"axis":"Disabled","values":["False","True"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/list-entry.md","docContent":"# List Entry\n\n**Component set key:** `070db0d59c67aa5cd819a056c70df1fc82445cd4`\n**Figma page:** `⚛️ Checkbox, Radio, Switch (Toggle)`\n**Variants in set:** 4\n\n## Description\n\nList Entry is a selectable row used within flat, non-grouped selection lists — for example, a list of available cargo types, service levels, or filter options. It embeds a selection indicator (checkbox or radio) and a label. Group multiple List Entry rows to form a selection list; for collapsible groups, use `List Entry Group`.\n\n## Variants / Properties\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | Row is not selected. |\n| `True` | Row is selected. |\n\n### Disabled axis\n| Value | Description |\n|---|---|\n| `False` | Interactive — user can select. |\n| `True` | Non-interactive — visually dimmed. |\n\n## Related components\n\n- `List Entry Group` — collapsible container for grouped `List Entry` rows.\n- `Check, Radio, Switch Item` — the embedded selection control.\n\n## Usage rules\n\n- Use for flat lists without nesting; use `List Entry Group` when rows need to be collapsed into categories.\n- Disabled rows should still be visible so the user understands the full option set.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5978-70626","thumb":"thumbs/5978-70626.png","needsAttention":true},{"kind":"set","name":"List Entry Group","description":"","nodeId":"5978:71425","page":"⚛️ Checkbox, Radio, Switch (Toggle)","variants":6,"variantNames":["Expanded=True, Selected=True, Selectable=True","Expanded=False, Selected=False, Selectable=True","Expanded=False, Selected=False, Selectable=False","Expanded=True, Selected=False, Selectable=True","Expanded=False, Selected=True, Selectable=True","Expanded=True, Selected=False, Selectable=False"],"properties":[{"axis":"Expanded","values":["True","False"]},{"axis":"Selected","values":["True","False"]},{"axis":"Selectable","values":["True","False"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/list-entry-group.md","docContent":"# List Entry Group\n\n**Component set key:** `0d5fa8714c77d8b442233f27f1a7dee4e3330267`\n**Figma page:** `⚛️ Checkbox, Radio, Switch (Toggle)`\n**Variants in set:** 6\n\n## Description\n\nList Entry Group is a collapsible category header that wraps a set of `List Entry` rows. It allows long selection lists to be organised into named groups that can be expanded or collapsed to reduce cognitive load. Use it when a selection list contains more than ~8 options that naturally fall into categories.\n\n## Variants / Properties\n\n### Expanded axis\n| Value | Description |\n|---|---|\n| `False` | Group is collapsed — child entries are hidden; only the group header is visible. |\n| `True` | Group is expanded — all child `List Entry` rows are visible. |\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | No child entry in this group is selected. |\n| `True` | At least one child entry is selected — the group header shows an indeterminate or selected indicator. |\n\n### Selectable axis\n| Value | Description |\n|---|---|\n| `True` | The group header itself acts as a select-all control for its children. |\n| `False` | Group header is a label only — individual rows must be selected independently. |\n\n## Related components\n\n- `List Entry` — the individual selectable rows inside the group.\n\n## Usage rules\n\n- Use `Selectable=True` on the group header when select-all behaviour is appropriate for the use case.\n- Always start groups in the `Expanded=True` state on first load unless the list is very long (>20 total options).\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5978-71425","thumb":"thumbs/5978-71425.png","needsAttention":true}]},{"page":"⚛️ Input & Form Control","items":[{"kind":"component","name":"Form Control","description":"","nodeId":"26:1580","page":"⚛️ Input & Form Control","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=26-1580","thumb":"thumbs/26-1580.png","needsAttention":true},{"kind":"set","name":"Input","description":"","nodeId":"26:1063","page":"⚛️ Input & Form Control","variants":24,"variantNames":["Empty=True, Type=Combo, Disabled=False","Empty=False, Type=Tags, Disabled=True","Empty=False, Type=Combo, Disabled=True","Empty=False, Type=Select, Disabled=True","Empty=True, Type=Text, Disabled=True","Empty=False, Type=Combo, Disabled=False","Empty=True, Type=Tags, Disabled=False","Empty=True, Type=Text, Disabled=False","Empty=False, Type=Location, Disabled=True","Empty=False, Type=Tags, Disabled=False","Empty=True, Type=Date, Disabled=True","Empty=True, Type=Location, Disabled=False","Empty=False, Type=Date, Disabled=True","Empty=False, Type=Select, Disabled=False","Empty=False, Type=Date, Disabled=False","Empty=True, Type=Date, Disabled=False","Empty=False, Type=Text, Disabled=False","Empty=True, Type=Tags, Disabled=True","Empty=True, Type=Location, Disabled=True","Empty=False, Type=Location, Disabled=False","Empty=True, Type=Combo, Disabled=True","Empty=True, Type=Select, Disabled=False","Empty=True, Type=Select, Disabled=True","Empty=False, Type=Text, Disabled=True"],"properties":[{"axis":"Empty","values":["True","False"]},{"axis":"Type","values":["Combo","Tags","Select","Text","Location","Date"]},{"axis":"Disabled","values":["False","True"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/input.md","docContent":"# Input\n\n**Component set key:** `099f28920bd6afafaf67b52308c4e72e89d6d351`\n**Figma page:** `⚛️ Input & Form Control`\n**Variants in set:** 24\n\n## Description\n\nInput is the single-line data-entry field used across all forms in the 4Shipper / Transportly product. It handles free text, structured date values, location lookups, combo-box selections, multi-value tag entry, and dropdown-style select controls. Each type presents an appropriately specialised affordance while sharing the same visual shell.\n\n## Variants / Properties\n\n### Type axis\n| Type | When to use |\n|---|---|\n| `Text` | Free-form single-line text (names, notes, references). |\n| `Date` | Date entry; renders a calendar picker affordance. |\n| `Location` | Address or place lookup with geographic autocomplete. |\n| `Combo` | Combobox — searchable dropdown with free-text fallback. |\n| `Select` | Dropdown-only selection; user cannot type a custom value. |\n| `Tags` | Multi-value input; each confirmed value becomes a removable tag chip. |\n\n### Empty axis\n| Value | Meaning |\n|---|---|\n| `True` | Field has no value — shows placeholder text. |\n| `False` | Field is populated — shows entered value. |\n\n### Disabled axis\n| Value | Meaning |\n|---|---|\n| `False` | Interactive — user can focus and edit. |\n| `True` | Non-interactive — value is read-only; field is visually dimmed. |\n\n## Usage rules\n\n- Always pair an Input with a `Form Control` wrapper to get the label, helper text, and error state.\n- Use `Location` type for any address or waypoint field so the geographic autocomplete is available.\n- Use `Tags` when the user may supply multiple values for a single field (e.g., commodity types).\n- Never disable an Input that the user has not seen in an enabled state first — prefer hiding the field or providing context about why it is locked.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=26-1063","thumb":"thumbs/26-1063.png","needsAttention":true},{"kind":"set","name":"Textarea","description":"","nodeId":"6905:1228093","page":"⚛️ Input & Form Control","variants":4,"variantNames":["Empty=True, Disabled=False","Empty=False, Disabled=True","Empty=False, Disabled=False","Empty=True, Disabled=True"],"properties":[{"axis":"Empty","values":["True","False"]},{"axis":"Disabled","values":["False","True"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/textarea.md","docContent":"# Textarea\n\n**Component set key:** `070099fb216768417ef71472d9c1089d92df8516`\n**Figma page:** `⚛️ Input & Form Control`\n**Variants in set:** 4\n\n## Description\n\nTextarea is the multi-line text-entry field. Use it in place of `Input` (Text type) whenever the expected content is longer than a single line — for example, shipment notes, Q&A answers, rejection reasons, or any free-form remarks field. It shares the same visual language as the Input component.\n\n## Variants / Properties\n\n### Empty axis\n| Value | Meaning |\n|---|---|\n| `True` | No value entered — placeholder text is visible. |\n| `False` | Content has been entered. |\n\n### Disabled axis\n| Value | Meaning |\n|---|---|\n| `False` | Editable — user can type into the field. |\n| `True` | Read-only — field is visually dimmed and non-interactive. |\n\n## Usage rules\n\n- Pair with a `Form Control` wrapper for the label, helper text, and error state — the same as `Input`.\n- Use when the expected input is more than ~80 characters or when line breaks are meaningful.\n- Do not use Textarea for structured data that has a dedicated input type (dates, addresses, tags).\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6905-1228093","thumb":"thumbs/6905-1228093.png","needsAttention":true}]},{"page":"⚛️ Dropdown","items":[{"kind":"set","name":"Dropdown Item","description":"","nodeId":"707:402598","page":"⚛️ Dropdown","variants":5,"variantNames":["State=Hover, Selected=False","State=Disabled, Selected=False","State=Default, Selected=True","State=Hover, Selected=True","State=Default, Selected=False"],"properties":[{"axis":"State","values":["Hover","Disabled","Default"]},{"axis":"Selected","values":["False","True"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/dropdown-item.md","docContent":"# Dropdown Item\n\n**Component set key:** `009a129716b7d5afcb79fd41409095b5e63b84fe`\n**Figma page:** `⚛️ Dropdown`\n**Variants in set:** 5\n\n## Description\n\nDropdown Item is a single option row inside a dropdown menu or select popover. It renders a label and optionally a leading icon or trailing check mark. Multiple Dropdown Item instances are stacked vertically inside the `Dropdown` container. Use this component whenever the user needs to pick one value from a list of discrete options.\n\n## Variants / Properties\n\n### State axis\n| State | Description |\n|---|---|\n| `Default` | Resting state — item is visible and interactive. |\n| `Hover` | Cursor is over the item — highlighted background. |\n| `Disabled` | Item cannot be selected in the current context — visually dimmed. |\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | Item is not the active selection. |\n| `True` | Item represents the current selection — renders a check mark or similar indicator. |\n\n## Usage rules\n\n- Use `Disabled` only when the option exists but is contextually unavailable — not to hide options.\n- Only one item in a single-select dropdown should have `Selected=True` at any time.\n- In a multi-select context, multiple items may carry `Selected=True` simultaneously.\n- Keep item labels short (ideally under 40 characters) to prevent truncation in narrow dropdowns.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=707-402598","thumb":"thumbs/707-402598.png","needsAttention":true},{"kind":"component","name":"Dropdown Menu","description":"","nodeId":"5803:40223","page":"⚛️ Dropdown","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5803-40223","thumb":"thumbs/5803-40223.png","needsAttention":true}]},{"page":"⚛️ Carrier Selection","items":[{"kind":"set","name":"Carrier Selection","description":"","nodeId":"147:67475","page":"⚛️ Carrier Selection","variants":4,"variantNames":["Expanded=True, Selected=False","Expanded=False, Selected=True","Expanded=False, Selected=False","Expanded=True, Selected=True"],"properties":[{"axis":"Expanded","values":["True","False"]},{"axis":"Selected","values":["False","True"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/carrier-selection.md","docContent":"# Carrier Selection\n\n**Component set key:** `4479bdc9b089fadf0bee634a33095f60b535e67e`\n**Figma page:** `⚛️ Carrier Selection`\n**Variants in set:** 4\n\n## Description\n\nCarrier Selection is the card-style selector used when a shipper chooses one or more carriers to invite to a tender. It renders a carrier identity block and supports collapsed and expanded states for showing contact details or additional carrier information. Use it in tender creation flows and in any context where carriers are selected from a list.\n\n## Variants / Properties\n\n### Expanded axis\n| Value | Description |\n|---|---|\n| `False` | Carrier card is collapsed — shows name and primary identifier only. |\n| `True` | Carrier card is expanded — reveals additional details such as contact information. |\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | Carrier is not selected. |\n| `True` | Carrier is selected — visually highlighted with a checked state. |\n\n## Related components\n\n- `Carrier Selection/Entry` — the individual contact or carrier row rendered inside the expanded state.\n\n## Usage rules\n\n- Allow multi-select when inviting multiple carriers to a single tender.\n- The expanded state is typically triggered on hover or tap to preview carrier details before confirming.\n- Always show at least the carrier name and a primary identifier in the collapsed state.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=147-67475","thumb":"thumbs/147-67475.png","needsAttention":true},{"kind":"set","name":"Carrier Selection/Entry","description":"","nodeId":"147:66956","page":"⚛️ Carrier Selection","variants":2,"variantNames":["Variant=Contact","Variant=Carrier"],"properties":[{"axis":"Variant","values":["Contact","Carrier"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/carrier-selection-entry.md","docContent":"# Carrier Selection/Entry\n\n**Component set key:** `e8d1dfea80a29c770096bc233953b8ebad396ad2`\n**Figma page:** `⚛️ Carrier Selection`\n**Variants in set:** 2\n\n## Description\n\nCarrier Selection/Entry is the individual row rendered inside an expanded `Carrier Selection` card. It represents either a named carrier company or a specific contact person at that carrier. Two variants cover these two identities.\n\n## Variants / Properties\n\n### Variant axis\n| Variant | Description |\n|---|---|\n| `Carrier` | Row represents a carrier company — shows carrier name and relevant company identifiers. |\n| `Contact` | Row represents a named contact person at the carrier — shows name and role or contact detail. |\n\n## Related components\n\n- `Carrier Selection` — the parent card that contains these entry rows.\n\n## Usage rules\n\n- Use `Carrier` entries to identify the organisation; use `Contact` entries to identify the individual.\n- A single expanded `Carrier Selection` card may contain multiple `Contact` entries under a `Carrier` entry.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=147-66956","thumb":"thumbs/147-66956.png","needsAttention":true}]},{"page":"⚛️ Popover","items":[{"kind":"component","name":"Popover","description":"","nodeId":"5803:43124","page":"⚛️ Popover","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5803-43124","thumb":"thumbs/5803-43124.png","needsAttention":true},{"kind":"set","name":"Popover Item","description":"","nodeId":"5803:43489","page":"⚛️ Popover","variants":4,"variantNames":["State=Hover, Selected=True","State=Hover, Selected=False","State=Default, Selected=False","State=Default, Selected=True"],"properties":[{"axis":"State","values":["Hover","Default"]},{"axis":"Selected","values":["True","False"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/popover-item.md","docContent":"# Popover Item\n\n**Component set key:** `73c5795f0f8d8c4d2cc75712a81bc2e74900cc52`\n**Figma page:** `⚛️ Popover`\n**Variants in set:** 4\n\n## Description\n\nPopover Item is a single row within a `Popover` overlay panel. It functions similarly to `Dropdown Item` but is used inside a popover rather than a standard dropdown menu — typically for contextual action menus, filter panels, or more complex selection surfaces where the popover has additional chrome around the list.\n\n## Variants / Properties\n\n### State axis\n| State | Description |\n|---|---|\n| `Default` | Resting state — visible and interactive. |\n| `Hover` | Cursor is over the row — highlighted background. |\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | Item is not the active selection. |\n| `True` | Item is the current selection — renders a checked or highlighted state. |\n\n## Related components\n\n- `Dropdown Item` — equivalent row component inside a `Dropdown` menu.\n- `Popover` — the container that houses multiple `Popover Item` rows.\n\n## Usage rules\n\n- Use `Popover Item` only inside a `Popover` container; use `Dropdown Item` inside a `Dropdown`.\n- Follow the same single/multi-select logic as `Dropdown Item`.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5803-43489","thumb":"thumbs/5803-43489.png","needsAttention":true}]},{"page":"📦 Page Header","items":[{"kind":"set","name":"Page/Header/Carrier","description":"","nodeId":"7713:17336","page":"📦 Page Header","variants":3,"variantNames":["Layout=Desktop, Expanded=False","Layout=Mobile, Expanded=False","Layout=Mobile, Expanded=True"],"properties":[{"axis":"Layout","values":["Desktop","Mobile"]},{"axis":"Expanded","values":["False","True"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/page-header-carrier.md","docContent":"# Page/Header/Carrier\n\n**Component set key:** `24b9005e375704fe2e3ce6151c2439fe0a01e2e6`\n**Figma page:** `📦 Page Header`\n**Variants in set:** 3\n\n## Description\n\nPage/Header/Carrier is the global top navigation bar for the carrier-role view of the Transportly / 4Shipper application. It mirrors the structure of `Page/Header/Shipper` but is configured for the carrier context — different navigation links, role-appropriate account controls, and carrier-specific notifications.\n\n## Variants / Properties\n\n### Layout axis\n| Value | Description |\n|---|---|\n| `Desktop` | Full-width desktop layout with navigation links visible. |\n| `Mobile` | Compact mobile layout. |\n\n### Expanded axis\n| Value | Description |\n|---|---|\n| `False` | Default collapsed state. |\n| `True` | Expanded state — mobile drawer or dropdown is open. |\n\n## Related components\n\n- `Page/Header/Shipper` — equivalent header for the shipper role.\n\n## Usage rules\n\n- Use only on carrier-facing screens; use `Page/Header/Shipper` in shipper-facing screens.\n- Do not customise navigation items within this component in the design file — update the library component.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7713-17336","thumb":"thumbs/7713-17336.png","needsAttention":true},{"kind":"set","name":"Page/Header/Shipper","description":"","nodeId":"106:7070","page":"📦 Page Header","variants":3,"variantNames":["Layout=Mobile, Expanded=True","Layout=Mobile, Expanded=False","Layout=Desktop, Expanded=False"],"properties":[{"axis":"Layout","values":["Mobile","Desktop"]},{"axis":"Expanded","values":["True","False"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/page-header-shipper.md","docContent":"# Page/Header/Shipper\n\n**Component set key:** `ff99e69b29386c223a3667ba286f6be3f8f9c8d7`\n**Figma page:** `📦 Page Header`\n**Variants in set:** 3\n\n## Description\n\nPage/Header/Shipper is the global top navigation bar for the shipper-role view of the Transportly / 4Shipper application. It contains the logo, primary navigation links, user account controls, and notifications. Use it on every page in the shipper flow.\n\n## Variants / Properties\n\n### Layout axis\n| Value | Description |\n|---|---|\n| `Desktop` | Full-width desktop layout with navigation links visible. |\n| `Mobile` | Compact mobile layout — navigation may be hidden behind a hamburger or drawer. |\n\n### Expanded axis\n| Value | Description |\n|---|---|\n| `False` | Default collapsed state. |\n| `True` | Expanded state — typically a mobile drawer or dropdown is open. |\n\n## Related components\n\n- `Page/Header/Carrier` — equivalent header for the carrier role.\n\n## Usage rules\n\n- Use only the shipper header variant in shipper-facing screens; use `Page/Header/Carrier` in carrier-facing screens.\n- Do not customise navigation items within this component — changes to navigation structure must be made in the Figma library.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=106-7070","thumb":"thumbs/106-7070.png","needsAttention":true}]},{"page":"⚛️ Breadcrumbs","items":[{"kind":"set","name":"Breadcrumb Item","description":"","nodeId":"129:12914","page":"⚛️ Breadcrumbs","variants":2,"variantNames":["LastChild=False","LastChild=True"],"properties":[{"axis":"LastChild","values":["False","True"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/breadcrumb-item.md","docContent":"# Breadcrumb Item\n\n**Component set key:** `1a1c02db3c3004ebb53e9fa294c079592ed8043e`\n**Figma page:** `⚛️ Breadcrumbs`\n**Variants in set:** 2\n\n## Description\n\nBreadcrumb Item is a single node in the breadcrumb trail navigation component. Multiple Breadcrumb Items are composed in sequence to show the user's location within the app hierarchy and provide a way to navigate back to parent levels. The last item in the trail represents the current page and is rendered without a navigation link.\n\n## Variants / Properties\n\n### LastChild axis\n| Value | Description |\n|---|---|\n| `False` | Item is an ancestor page — renders as a link with a separator after it. |\n| `True` | Item is the current page — renders as plain text without a link, no separator. |\n\n## Usage rules\n\n- Always set `LastChild=True` on the final breadcrumb item representing the current page.\n- Keep breadcrumb labels short — match the page or section title exactly.\n- Do not show breadcrumbs on top-level pages that have no parent.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=129-12914","thumb":"thumbs/129-12914.png","needsAttention":true},{"kind":"component","name":"Breadcrumbs","description":"","nodeId":"129:12955","page":"⚛️ Breadcrumbs","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=129-12955","thumb":"thumbs/129-12955.png","needsAttention":true}]},{"page":"⚛️ Option Cards","items":[{"kind":"set","name":"Option Card","description":"","nodeId":"6324:59033","page":"⚛️ Option Cards","variants":4,"variantNames":["Selected=False, Disabled=True","Selected=True, Disabled=True","Selected=True, Disabled=False","Selected=False, Disabled=False"],"properties":[{"axis":"Selected","values":["False","True"]},{"axis":"Disabled","values":["True","False"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/option-card.md","docContent":"# Option Card\n\n**Component set key:** `198beea9971db2d3fbedb1c54efb0311ac338d0a`\n**Figma page:** `⚛️ Option Cards`\n**Variants in set:** 4\n\n## Description\n\nOption Card is a large-surface selection control used when presenting a small number of mutually exclusive or multi-select choices that benefit from visual prominence — for example, choosing a transport mode (road, rail, sea, air) or a service level. It is wider and more visually distinctive than a radio button or checkbox row.\n\n## Variants / Properties\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | Card is not selected — renders in a neutral, unactivated style. |\n| `True` | Card is selected — renders with a highlighted border or fill. |\n\n### Disabled axis\n| Value | Description |\n|---|---|\n| `False` | Interactive — user can select this option. |\n| `True` | Option is not available — visually dimmed and non-interactive. |\n\n## Related components\n\n- `Check, Radio, Switch Item` (Card variants) — lighter-weight card selection for denser layouts.\n\n## Usage rules\n\n- Use Option Card for 2–5 choices; for longer option lists use `List Entry` or `Dropdown Item`.\n- Place Option Cards in a horizontal row or a responsive grid — never stack them vertically in a single column without strong reason.\n- Provide an icon or illustration inside each card to reinforce the option meaning.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6324-59033","thumb":"thumbs/6324-59033.png","needsAttention":true},{"kind":"component","name":"Option Cards","description":"","nodeId":"6324:59165","page":"⚛️ Option Cards","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6324-59165","thumb":"thumbs/6324-59165.png","needsAttention":true}]},{"page":"📦 Page","items":[{"kind":"component","name":"Page","description":"","nodeId":"6987:87353","page":"📦 Page","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6987-87353","thumb":"thumbs/6987-87353.png","needsAttention":true},{"kind":"component","name":"Page/Main Content Container","description":"","nodeId":"6987:65811","page":"📦 Page","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6987-65811","thumb":"thumbs/6987-65811.png","needsAttention":true}]},{"page":"⚛️ Separator","items":[{"kind":"set","name":"Separator","description":"","nodeId":"6985:1269630","page":"⚛️ Separator","variants":8,"variantNames":["Orientation=Horizontal, Spacing=MD","Orientation=Vertical, Spacing=MD","Orientation=Vertical, Spacing=SM","Orientation=Vertical, Spacing=LG","Orientation=Vertical, Spacing=0","Orientation=Horizontal, Spacing=SM","Orientation=Horizontal, Spacing=LG","Orientation=Horizontal, Spacing=0"],"properties":[{"axis":"Orientation","values":["Horizontal","Vertical"]},{"axis":"Spacing","values":["MD","SM","LG","0"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/separator.md","docContent":"# Separator\n\n**Component set key:** `a3fb12818666b571f7258308e28c363caac57ee1`\n**Figma page:** `⚛️ Separator`\n**Variants in set:** 8\n\n## Description\n\nSeparator is a visual dividing line used to group related content and create clear section boundaries within a layout. It supports both horizontal and vertical orientations and four spacing sizes to accommodate different layout densities.\n\n## Variants / Properties\n\n### Orientation axis\n| Orientation | Description |\n|---|---|\n| `Horizontal` | Horizontal rule — divides stacked content vertically on the page. |\n| `Vertical` | Vertical rule — divides side-by-side content within a row. |\n\n### Spacing axis\n| Spacing | Description |\n|---|---|\n| `0` | No margin around the separator — flush against adjacent content. |\n| `SM` | Small margin. |\n| `MD` | Default/medium margin. |\n| `LG` | Large margin — use when more breathing room is needed between sections. |\n\n## Usage rules\n\n- Use `MD` spacing as the default unless the layout has explicit density requirements.\n- Do not use a Separator purely for decoration — it should mark a meaningful logical boundary.\n- Prefer `Vertical` separators inside horizontal flex rows (e.g., toolbar button groups).\n- Prefer `Horizontal` separators between stacked card sections or form groups.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6985-1269630","thumb":"thumbs/6985-1269630.png","needsAttention":true}]},{"page":"⚛️ Pagination","items":[{"kind":"set","name":"Pagination","description":"","nodeId":"6803:72493","page":"⚛️ Pagination","variants":2,"variantNames":["Variant=Middle","Variant=First"],"properties":[{"axis":"Variant","values":["Middle","First"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/pagination.md","docContent":"# Pagination\n\n**Component set key:** `5030aa01c62a20539f842271f707c4c1cb0e05c6`\n**Figma page:** `⚛️ Pagination`\n**Variants in set:** 2\n\n## Description\n\nPagination provides the navigation controls for moving through multi-page datasets such as tender lists, transport tables, and contract records. It renders page number buttons, previous/next arrows, and optionally an ellipsis for large page counts. Place it at the bottom of any table or list that may produce more results than fit on a single screen.\n\n## Variants / Properties\n\n### Variant axis\n| Variant | Description |\n|---|---|\n| `First` | The pagination bar as it appears on the first page — previous arrow is inactive. |\n| `Middle` | The pagination bar on any page that is neither first nor last — both arrows active. |\n\n## Usage rules\n\n- Always pair Pagination with a page-size selector if the dataset is large.\n- Do not use Pagination for content that should load continuously — use infinite scroll instead.\n- The `First` variant is used to initialise the pagination state; switch to `Middle` as soon as page 2 or beyond is active.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6803-72493","thumb":"thumbs/6803-72493.png","needsAttention":true}]},{"page":"⚛️ Location Pointer","items":[{"kind":"set","name":"Location Pointer","description":"","nodeId":"36:2903","page":"⚛️ Location Pointer","variants":2,"variantNames":["Property 1=Default","Property 1=Variant2"],"properties":[{"axis":"Property 1","values":["Default","Variant2"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/location-pointer.md","docContent":"# Location Pointer\n\n**Component set key:** `930af1ca0440b03a904cc6ea7d486d615f5e4477`\n**Figma page:** `⚛️ Location Pointer`\n**Variants in set:** 2\n\n## Description\n\nLocation Pointer is a map-pin marker component used on embedded map views to indicate a specific geographic location — for example, a pickup point, delivery address, or warehouse. Use it wherever a map surface is rendered to mark waypoints, depots, or positions of interest.\n\n## Variants / Properties\n\n### Property 1 axis\n| Variant | Description |\n|---|---|\n| `Default` | Standard pin marker — single location, no additional state. |\n| `Variant2` | Alternative pin style — check Figma for the specific treatment (e.g., selected or active state). |\n\n## Usage rules\n\n- Use Location Pointer only on map surfaces, not in list or card contexts.\n- For route sequences, pair multiple Location Pointer instances with connecting lines to form a complete route visualisation.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=36-2903","thumb":"thumbs/36-2903.png","needsAttention":true}]},{"page":"Stepper","items":[{"kind":"set","name":"Stepper","description":"","nodeId":"8808:80287","page":"Stepper","variants":4,"variantNames":["Step=1","Step=3","Step=2","Step=4"],"properties":[{"axis":"Step","values":["1","3","2","4"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/stepper.md","docContent":"# Stepper\n\n**Component set key:** `6ee31571c705f9b4da0520dfef197b341c7c7b7b`\n**Figma page:** `Tenders - Shipper`\n**Variants in set:** 4\n\n## Description\n\nStepper is the multi-step progress indicator used in wizard-style flows, most prominently in the New Tender creation form. It renders a numbered sequence of steps and visually communicates which step is currently active. Use it at the top of any multi-page form or guided workflow to orient the user within the process.\n\n## Variants / Properties\n\n### Step axis\n| Step | Description |\n|---|---|\n| `1` | First step is active; all subsequent steps are upcoming. |\n| `2` | Second step is active; step 1 is completed. |\n| `3` | Third step is active; steps 1–2 are completed. |\n| `4` | Fourth step is active; steps 1–3 are completed. |\n\n## Related components\n\n- `Step Progress Tabs` — tab-based variant of step navigation used on the tender detail page.\n\n## Usage rules\n\n- Always show all steps in the sequence upfront so the user understands the full scope of the form.\n- Completed steps should be visually distinct from the active step and upcoming steps.\n- Do not allow the user to jump to a future step that has unsatisfied prerequisites.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8808-80287","thumb":"thumbs/8808-80287.png","needsAttention":true}]},{"page":"⚛️ Button","items":[{"kind":"set","name":"Button","description":"Button triggers user actions — submit, confirm, navigate, or delete. Use Primary for the single most important action on a surface; Secondary or Ghost for supporting actions; Danger / Danger Subtle for destructive or hard-to-reverse actions; Inverted on dark backgrounds.\n\nRules: never place two Primary buttons side by side. Always pair Danger with an Alert Dialog before executing.\n\nSee the 📖 Docs / Button page for the full property + variant + size showcase.","nodeId":"15:105","page":"⚛️ Button","variants":27,"variantNames":["Variant=Body, State=Default","Variant=Link, State=Default","Variant=Secondary, State=Default","Variant=Danger Subtle, State=Hover","Variant=Danger, State=Hover","Variant=Danger, State=Disabled","Variant=Danger Subtle, State=Disabled","Variant=Danger, State=Default","Variant=Ghost, State=Default","Variant=Secondary, State=Disabled","Variant=Inverted, State=Hover","Variant=Link, State=Disabled","Variant=Ghost, State=Disabled","Variant=Danger Subtle, State=Default","Variant=Link, State=Hover","Variant=Primary, State=Disabled","Variant=Primary Subtle, State=Default","Variant=Primary Subtle, State=Disabled","Variant=Body, State=Hover","Variant=Inverted, State=Disabled","Variant=Body, State=Disabled","Variant=Ghost, State=Hover","Variant=Primary Subtle, State=Hover","Variant=Secondary, State=Hover","Variant=Inverted, State=Default","Variant=Primary, State=Default","Variant=Primary, State=Hover"],"properties":[{"axis":"Variant","values":["Body","Link","Secondary","Danger Subtle","Danger","Ghost","Inverted","Primary","Primary Subtle"]},{"axis":"State","values":["Default","Hover","Disabled"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":true,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/button.md","docContent":"# Button\n\n**Component set key:** `20ca3f58e52ca60646e8a283cd2b3218285c1d4a` (node `15:105`)\n**Figma page:** `⚛️ Button`\n**Variants in set:** 27\n\n## Description\n\nButton is the primary interactive trigger for actions in the 4Shipper / Transportly UI. Use it whenever the user needs to submit a form, confirm a dialog, navigate to a next step, or trigger any immediate action. Choose the variant that conveys the appropriate weight and intent of the action.\n\n## Variants / Properties\n\n### Variant axis\n| Variant | When to use |\n|---|---|\n| `Primary` | The single most important action on a surface — confirm, submit, proceed. |\n| `Primary Subtle` | A softer alternative to Primary; use when a full-weight Primary would compete with other elements. |\n| `Secondary` | Supporting or alternative actions alongside a Primary button. |\n| `Ghost` | Low-emphasis actions or toolbar-style controls that should not draw attention. |\n| `Body` | Neutral, body-weight action that sits inline with content. |\n| `Link` | In-context hyperlink-style action; lowest visual weight. |\n| `Danger` | Destructive actions (delete, cancel, reject). Filled, high attention. |\n| `Danger Subtle` | Destructive actions where a softer treatment is preferred (e.g., inline removes). |\n| `Inverted` | Use on dark or coloured backgrounds where the standard palette would not contrast. |\n\n### State axis\n| State | Description |\n|---|---|\n| `Default` | Resting, ready for interaction. |\n| `Hover` | Cursor is over the button. |\n| `Disabled` | Action is not currently available; non-interactive. |\n\n### Component properties (non-variant)\n| Property | Type | Default | Effect |\n|---|---|---|---|\n| `hasLeftIcon` | boolean | `true` | Leading (left) icon slot. |\n| `hasRightIcon` | boolean | `false` | Trailing (right) icon slot. |\n| `hasText` | boolean | `true` | Shows the label; set `false` for an icon-only button. |\n| `hasBadge` | boolean | `false` | Trailing count badge. |\n| `isDropdown` | boolean | `false` | Adds a chevron for menu / dropdown triggers. |\n| `text` | text | `\"Button\"` | The button label. |\n\n### Size (not a property)\nSize is **not** a variant or component property — it is driven by the **`input-sizes` variable mode** on the\nenclosing frame: `xs 28 / sm 34 / md 42 / lg 48` px (variable `button/size`). The collection's default mode is\n`xs`; the component bakes `md` onto each instance. To render another size, set the frame's `input-sizes` mode\nand clear the instance's baked override (see `design-system-manager` → *Writing to Figma* for the pattern).\n\nA live in-Figma showcase of all of the above (properties, variant×state in light/dark, sizes) lives on the\n**`📖 Docs / Button`** page in the UI Kit file.\n\n## Usage rules\n\n- Never place two `Primary` buttons side by side on the same surface.\n- Use `Danger` / `Danger Subtle` for any action that is destructive or hard to reverse.\n- `Link` buttons should only appear inline with text or in dense toolbars — do not use them as standalone page-level CTAs.\n- Always pair a `Danger` confirmation with an `Alert Dialog` before executing.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=15-105","thumb":"thumbs/15-105.png","needsAttention":false}]},{"page":"⚛️ Badge","items":[{"kind":"set","name":"Badge","description":"","nodeId":"18:968","page":"⚛️ Badge","variants":7,"variantNames":["Variant=Body","Variant=Danger","Variant=Variant7","Variant=Secondary","Variant=Body Inverted","Variant=Warning","Variant=Primary"],"properties":[{"axis":"Variant","values":["Body","Danger","Variant7","Secondary","Body Inverted","Warning","Primary"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":true,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/badge.md","docContent":"# Badge\n\n**Component set key:** `22ac6b48fd8d58b488643fa29de41607956ec4dc` (node `18:968`)\n**Figma page:** `⚛️ Badge`\n**Variants in set:** 7\n\n## Description\n\nBadge is a compact inline label used to classify, tag, or count items. It appears alongside text, inside table cells, or on top of other elements to communicate a categorical attribute or a numeric count. Badges do not trigger actions — they are purely informational.\n\n## Variants / Properties\n\n### Variant axis\n\nDefault variant: `Body Inverted`.\n\n| Variant | When to use |\n|---|---|\n| `Body Inverted` | Default. Neutral badge for dark surfaces / high-contrast contexts. |\n| `Body` | Minimal badge that blends with body text on light surfaces. |\n| `Primary` | Highlighted or featured classification using the brand primary colour. |\n| `Secondary` | Neutral classification — common default for general tags. |\n| `Danger` | Critical or failed classification (e.g., rejected, overdue). |\n| `Warning` | Needs attention but not critical (e.g., pending, near expiry). |\n| `Success` | Positive / completed classification (e.g., delivered, approved). |\n\n### Component properties (non-variant)\n\n| Property | Type | Default | Effect |\n|---|---|---|---|\n| `dismissible` | boolean | `false` | Adds a trailing `×` remove control (e.g. removable filter chips). |\n| `hasIcon` | boolean | `true` | Leading icon slot; set `false` for a text-only badge. |\n| `text` | text | `\"Badge\"` | The badge label. Keep it to one or two words. |\n\n### Size (not a property)\n\nSize is **not** a variant or component property — it is driven by the **`badge` variable mode** on the\nenclosing frame: `sm 20 / md 24` px (variable `badge/size`). To render another size, set the frame's `badge`\nmode and clear the instance's baked override (see `design-system-manager` → *Writing to Figma*).\n\nA live in-Figma showcase of all of the above (properties, variants in light/dark, sizes) lives on the\n**`📖 Docs / Badge`** page in the UI Kit file.\n\n## Usage rules\n\n- Use `Warning`, `Danger`, and `Success` variants only for genuinely meaningful status information, not for decoration.\n- Do not use a Badge as a button or to trigger navigation.\n- For lifecycle statuses (tender, transport, contract) use the dedicated `Status/*` components instead of Badge.\n- Keep badge text short — one or two words maximum.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=18-968","thumb":"thumbs/18-968.png","needsAttention":true}]},{"page":"⚛️ Dialog","items":[{"kind":"set","name":"Dialog","description":"","nodeId":"5250:197334","page":"⚛️ Dialog","variants":1,"variantNames":["Headline=True"],"properties":[{"axis":"Headline","values":["True"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/dialog.md","docContent":"# Dialog\n\n**Component set key:** `177928463ea079f89dd74ed1a32fb705303401c7`\n**Figma page:** `⚛️ Dialog`\n**Variants in set:** 1\n\n## Description\n\nDialog is the modal overlay used for focused interactions that require the user's full attention before returning to the main workflow. It blocks the background content and forces a decision or input before it can be dismissed. Use Dialog for multi-field forms, confirmations with context, or any interaction where navigating away would lose important state.\n\nFor simple yes/no destructive confirmations use `Alert Dialog` instead.\n\n## Variants / Properties\n\n### Headline property\n| Value | Meaning |\n|---|---|\n| `True` | Dialog renders with a title headline at the top of the panel. |\n\n## Related components\n\n- **Alert Dialog** — lightweight confirmation overlay for destructive or irreversible actions.\n- **Button** — always used inside Dialog for primary and secondary actions.\n- **Input / Textarea** — placed inside Dialog for inline form interactions.\n\n## Usage rules\n\n- Always provide a clear, action-oriented headline (e.g., \"Edit shipment details\", not \"Dialog\").\n- Every Dialog must have at least one explicit close action (a cancel button or a close icon).\n- Do not nest dialogs — open a new Dialog only after the previous one has been dismissed.\n- Keep Dialog content focused; if content requires scrolling, consider a dedicated page or panel instead.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5250-197334","thumb":"thumbs/5250-197334.png","needsAttention":true}]},{"page":"⚛️ Tabs","items":[{"kind":"set","name":"Tabs","description":"","nodeId":"36:1862","page":"⚛️ Tabs","variants":2,"variantNames":["Orientation=Vertical","Orientation=Horizontal"],"properties":[{"axis":"Orientation","values":["Vertical","Horizontal"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/tabs.md","docContent":"# Tabs\n\n**Component set key:** `050ff2281cbe78462fd4e7a8ae63524c66e1c457`\n**Figma page:** `⚛️ Tabs`\n**Variants in set:** 2\n\n## Description\n\nTabs is the general-purpose tab navigation component for switching between related content panels within the same page context. It does not imply a workflow order — use it for flat content grouping such as \"Details / Documents / History\" views. For ordered multi-step flows, use `Stepper` or `Step Progress Tabs` instead.\n\n## Variants / Properties\n\n### Orientation axis\n| Orientation | Description |\n|---|---|\n| `Horizontal` | Tab bar runs left-to-right across the top of the content area — the standard layout. |\n| `Vertical` | Tab bar runs top-to-bottom on the left side of the content area — use in sidebar-style layouts with many tabs. |\n\n## Usage rules\n\n- Keep tab labels short (1–3 words); do not use sentences.\n- Highlight the active tab clearly so it is distinguishable at a glance.\n- Use `Horizontal` orientation by default; switch to `Vertical` only when more than ~6 tabs are needed or when a sidebar panel calls for it.\n- Do not use Tabs for primary app navigation — use the sidebar or page header for that.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=36-1862","thumb":"thumbs/36-1862.png","needsAttention":true}]},{"page":"⚛️ Notification (Alert)","items":[{"kind":"set","name":"Notification (Alert)","description":"","nodeId":"32:1770","page":"⚛️ Notification (Alert)","variants":5,"variantNames":["Property 1=Success Subtle","Property 1=Danger Subtle","Property 1=Default","Property 1=Warning","Property 1=Primary"],"properties":[{"axis":"Property 1","values":["Success Subtle","Danger Subtle","Default","Warning","Primary"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/notification-alert.md","docConten
