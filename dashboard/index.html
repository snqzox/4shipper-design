<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>4Shipper · Design System</title>
<style>
  :root {
    --bg:#0b0e14; --panel:#121722; --panel2:#0f141d; --line:#222a38; --line2:#2c3647;
    --fg:#e8ecf3; --muted:#8a95a8; --faint:#5d6678; --accent:#6ea8fe; --accent2:#caa9ff;
    --ok:#54d18c; --warn:#f0b860; --radius:12px;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--fg); font:14px/1.55 var(--sans); display:flex; min-height:100vh; }
  a { color:var(--accent); }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background:var(--line2); border-radius:8px; }

  /* Sidebar */
  aside { width:248px; flex:0 0 248px; background:var(--panel2); border-right:1px solid var(--line);
    position:sticky; top:0; height:100vh; padding:22px 16px; display:flex; flex-direction:column; gap:4px; }
  .brand { display:flex; align-items:center; gap:10px; padding:0 8px 18px; }
  .brand .dot { width:26px; height:26px; border-radius:7px; background:linear-gradient(135deg,var(--accent),var(--accent2)); }
  .brand b { font-size:14px; letter-spacing:.2px; }
  .brand span { display:block; color:var(--faint); font-size:11px; font-weight:400; }
  nav.side { display:flex; flex-direction:column; gap:2px; }
  nav.side button { all:unset; cursor:pointer; display:flex; align-items:center; justify-content:space-between;
    padding:9px 12px; border-radius:9px; color:var(--muted); font-size:13px; }
  nav.side button:hover { background:#161c28; color:var(--fg); }
  nav.side button.active { background:#18202e; color:var(--fg); box-shadow:inset 2px 0 0 var(--accent); }
  nav.side .cnt { font:11px/1 var(--mono); color:var(--faint); background:#1a2230; padding:3px 7px; border-radius:20px; }
  nav.side button.active .cnt { color:var(--accent); }
  .side-foot { margin-top:auto; padding:12px 10px 0; color:var(--faint); font-size:11px; border-top:1px solid var(--line); }

  /* Main */
  main { flex:1; min-width:0; padding:28px 34px 60px; max-width:1680px; }
  .topline { color:var(--faint); font:12px/1.4 var(--mono); margin-bottom:6px; }
  h1.view-title { font-size:22px; margin:0 0 2px; letter-spacing:-.2px; }
  .sub { color:var(--muted); margin:0 0 22px; font-size:13px; }

  /* Stat cards */
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:26px; }
  .stat { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; }
  .stat .n { font:600 28px/1 var(--sans); letter-spacing:-.5px; }
  .stat .l { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.06em; margin-top:7px; }
  .stat .hint { color:var(--faint); font-size:11px; margin-top:3px; }

  .card { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:18px 20px; margin-bottom:14px; }
  .card h3 { margin:0 0 12px; font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }

  /* Search */
  .search { width:100%; padding:11px 14px; background:var(--panel); border:1px solid var(--line2); border-radius:10px;
    color:var(--fg); margin-bottom:16px; font-size:13px; }
  .search:focus { outline:none; border-color:var(--accent); }

  /* Collapsible groups */
  .group { border:1px solid var(--line); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; background:var(--panel); }
  .group > .ghead { all:unset; cursor:pointer; display:flex; align-items:center; gap:10px; width:100%;
    padding:13px 16px; box-sizing:border-box; }
  .group > .ghead:hover { background:#161c28; }
  .group .chev { color:var(--faint); transition:transform .15s; font-size:11px; }
  .group.open .chev { transform:rotate(90deg); }
  .group .gname { font-weight:600; font-size:13px; }
  .group .gcount { margin-left:auto; font:11px/1 var(--mono); color:var(--faint); }
  .group .gbody { display:none; border-top:1px solid var(--line); padding:6px; }
  .group.open .gbody { display:block; }

  .row { display:flex; align-items:center; gap:12px; padding:9px 11px; border-radius:8px; }
  .row:hover { background:#141b27; }
  .row .nm { font-size:13px; }
  .row .ds { color:var(--faint); font-size:12px; margin-left:6px; }
  .row .tag { font:10px/1 var(--mono); padding:3px 7px; border-radius:6px; margin-left:auto; white-space:nowrap; }
  .tag.set { background:#1c2740; color:var(--accent); }
  .tag.comp { background:#1d2530; color:var(--muted); }
  .tag.scr { background:#16241c; color:var(--ok); }

  /* Typography tokens */
  .typ { display:flex; align-items:baseline; justify-content:space-between; gap:20px; padding:16px 4px; border-bottom:1px solid var(--line); }
  .typ:last-child { border-bottom:none; }
  .typ .prev { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--fg); }
  .typ .meta { flex:0 0 auto; text-align:right; }
  .typ .meta .tn { font:12px/1.3 var(--mono); color:var(--accent); }
  .typ .meta .tv { font:11px/1.4 var(--mono); color:var(--faint); }

  /* Shadow tokens */
  .shadows { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
  .shadow-card { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:20px; }
  .shadow-swatch { height:88px; border-radius:10px; background:#1a2230; margin-bottom:14px; }
  .shadow-card .tn { font:12px/1.3 var(--mono); color:var(--accent); }
  .shadow-card .tv { font:10px/1.4 var(--mono); color:var(--faint); margin-top:6px; word-break:break-all; }

  /* Colors */
  .colors { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; }
  .swatch { border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .swatch .fill { height:64px; }
  .swatch .info { padding:9px 11px; }
  .swatch .tn { font:12px/1.3 var(--sans); word-break:break-all; }
  .swatch .tv { font:11px/1.3 var(--mono); color:var(--faint); }

  /* Variable rows */
  .vchip { width:16px; height:16px; border-radius:4px; border:1px solid var(--line2); flex:0 0 auto; }
  .vval { margin-left:auto; font-size:12px; color:var(--muted); white-space:nowrap; }
  .vval.mono { font-family:var(--mono); font-size:11px; }

  /* Variables / empty states */
  .empty { background:var(--panel); border:1px dashed var(--line2); border-radius:var(--radius); padding:26px; color:var(--muted); }
  .empty h4 { margin:0 0 8px; color:var(--fg); font-size:15px; }
  .empty ol { margin:12px 0 0; padding-left:20px; }
  .empty code { font:12px/1.5 var(--mono); background:#0c1019; padding:2px 6px; border-radius:5px; color:var(--accent2); }
  .badge-soft { display:inline-block; font:10px/1 var(--mono); color:var(--warn); background:#241d10; padding:4px 8px; border-radius:6px; margin-bottom:14px; }

  /* Changelog */
  .changelog h2 { font-size:15px; margin:22px 0 8px; }
  .changelog strong { color:var(--fg); }
  .changelog ul { margin:6px 0 14px; padding-left:18px; color:var(--muted); }
  .changelog li { margin:2px 0; }

  /* Actions */
  .actstatus { display:flex; flex-direction:column; gap:8px; }
  .srow { display:flex; justify-content:space-between; gap:16px; font-size:13px; }
  .srow span { color:var(--muted); }
  .srow b.ok { color:var(--ok); } .srow b.warn { color:var(--warn); }
  .actgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin-bottom:14px; }
  .actbtn { all:unset; cursor:pointer; display:flex; flex-direction:column; gap:3px; background:var(--panel);
    border:1px solid var(--line2); border-radius:var(--radius); padding:15px 17px; transition:border-color .15s, background .15s; }
  .actbtn:hover { border-color:var(--accent); background:#161d2a; }
  .actbtn.primary { border-color:#2b3d63; background:#13203a; }
  .actbtn.primary:hover { border-color:var(--accent); }
  .actbtn[disabled] { opacity:.45; cursor:not-allowed; }
  .actbtn.running { border-color:var(--accent); animation:pulse 1s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity:.6; } }
  .actbtn .al { font-weight:600; font-size:14px; }
  .actbtn .ad { color:var(--muted); font-size:12px; }
  .actlog { max-height:340px; overflow:auto; margin:0; font:11px/1.5 var(--mono); color:var(--muted); }
  .links { display:flex; flex-wrap:wrap; gap:16px; }
  .links a { font-size:13px; }
  .pill { display:inline-block; background:var(--line); border-radius:6px; padding:2px 8px; font:11px/1.4 var(--mono); color:var(--muted); }
  .muted { color:var(--muted); } .faint { color:var(--faint); }

  /* Component cards (health view) */
  .attn-toggle { display:inline-flex; align-items:center; gap:7px; color:var(--muted); font-size:12px; margin:-6px 0 14px; cursor:pointer; }
  .attn-toggle input { accent-color:var(--accent); }
  .cgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:10px; }
  .ccard { display:flex; gap:12px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:11px; }
  .ccard:hover { border-color:var(--line2); }
  .cthumb { flex:0 0 88px; height:60px; border-radius:7px; background:#fff; border:1px solid var(--line2);
    display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .cthumb img { max-width:100%; max-height:100%; object-fit:contain; }
  .cthumb .cph { color:#9aa; font:600 20px/1 var(--sans); }
  .cmeta { min-width:0; flex:1; display:flex; flex-direction:column; gap:6px; }
  .ctop { display:flex; align-items:baseline; gap:8px; }
  .cnm { font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cvar { color:var(--faint); font:10px/1 var(--mono); flex:0 0 auto; }
  .cpills { display:flex; flex-wrap:wrap; gap:4px; }
  .hp { font:10px/1.4 var(--mono); padding:2px 6px; border-radius:5px; }
  .hp.on { color:var(--ok); background:#16241c; }
  .hp.off { color:var(--faint); background:#171c26; }
  .hp.warn { color:var(--warn); background:#241d10; }
  .clinks { display:flex; gap:14px; margin-top:auto; }
  .clinks a { font-size:11px; }

  /* Components toolbar (search + filters + view toggle) */
  .ctoolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px; }
  .ctoolbar .search { flex:1; min-width:200px; margin-bottom:0; }
  .seg { display:inline-flex; border:1px solid var(--line2); border-radius:9px; overflow:hidden; flex:0 0 auto; }
  .seg button { all:unset; cursor:pointer; padding:9px 14px; font-size:13px; color:var(--muted); }
  .seg button:hover { color:var(--fg); background:#161c28; }
  .seg button.active { background:#18202e; color:var(--fg); }
  .fsel { padding:10px 12px; background:var(--panel); border:1px solid var(--line2); border-radius:9px;
    color:var(--fg); font-size:13px; cursor:pointer; }
  .fsel:focus { outline:none; border-color:var(--accent); }
  .ctoolbar .attn-toggle { margin:0; }
  .ccount { margin-left:auto; font:11px/1 var(--mono); color:var(--faint); }

  /* Components table */
  .twrap { border:1px solid var(--line); border-radius:var(--radius); overflow:auto; background:var(--panel); }
  .ctable { width:100%; border-collapse:collapse; font-size:13px; }
  .ctable th { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line2); color:var(--muted);
    font-size:11px; text-transform:uppercase; letter-spacing:.05em; white-space:nowrap; cursor:pointer;
    user-select:none; position:sticky; top:0; background:var(--panel2); z-index:1; }
  .ctable th.nosort { cursor:default; }
  .ctable th:not(.nosort):hover { color:var(--fg); }
  .ctable th .sar { color:var(--accent); font-size:9px; margin-left:4px; }
  .ctable td { padding:8px 12px; border-bottom:1px solid var(--line); vertical-align:middle; white-space:nowrap; }
  .ctable tr:last-child td { border-bottom:none; }
  .ctable tbody tr:hover td { background:#141b27; }
  .ctable .tthumb { width:54px; height:36px; border-radius:5px; background:#fff; border:1px solid var(--line2);
    display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .ctable .tthumb img { max-width:100%; max-height:100%; object-fit:contain; }
  .ctable .tthumb .cph { color:#9aa; font:600 14px/1 var(--sans); }
  .ctable .tnm { font-weight:600; }
  .ctable .tdesc { color:var(--faint); font-size:11px; max-width:320px; overflow:hidden; text-overflow:ellipsis; }
  .ctable .tlinks a { font-size:11px; margin-right:10px; }
  .tick { color:var(--ok); font-weight:600; } .cross { color:var(--faint); }
  .ctable tbody tr { cursor:pointer; }
  .ctable tbody tr.sel td { background:#17243b; }
  .ccard { cursor:pointer; }

  /* Assets gallery */
  .agrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(116px,1fr)); gap:10px; }
  .atile { all:unset; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:9px;
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 10px; text-align:center; }
  .atile:hover { border-color:var(--accent); background:#161d2a; }
  .athumb { width:52px; height:52px; border-radius:8px; background:#fff; border:1px solid var(--line2);
    display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .athumb img { max-width:100%; max-height:100%; object-fit:contain; }
  .athumb .cph { color:#9aa; font:600 18px/1 var(--sans); }
  .aname { font-size:11px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100%; }

  /* Detail drawer */
  .drawer { position:fixed; inset:0; z-index:50; display:none; }
  .drawer.open { display:block; }
  .drawer-back { position:absolute; inset:0; background:rgba(4,7,12,.55); opacity:0; transition:opacity .18s; }
  .drawer.open .drawer-back { opacity:1; }
  .drawer-panel { position:absolute; top:0; right:0; height:100%; width:min(520px,92vw); background:var(--panel2);
    border-left:1px solid var(--line2); box-shadow:-18px 0 48px rgba(0,0,0,.4); overflow-y:auto;
    transform:translateX(100%); transition:transform .2s cubic-bezier(.4,0,.2,1); padding:0; }
  .drawer.open .drawer-panel { transform:translateX(0); }
  .dhead { position:sticky; top:0; background:var(--panel2); border-bottom:1px solid var(--line); padding:20px 24px 16px; z-index:1; }
  .dhead .dclose { all:unset; cursor:pointer; position:absolute; top:16px; right:18px; color:var(--muted);
    font-size:20px; line-height:1; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:8px; }
  .dhead .dclose:hover { background:#1a2230; color:var(--fg); }
  .dhead .dpage { color:var(--faint); font:11px/1.4 var(--mono); margin-bottom:6px; }
  .dhead h2 { margin:0 0 10px; font-size:19px; letter-spacing:-.2px; padding-right:36px; }
  .dhead .cpills { gap:5px; }
  .dbody { padding:18px 24px 40px; display:flex; flex-direction:column; gap:22px; }
  .dsec h4 { margin:0 0 9px; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
  .ddesc { color:var(--fg); font-size:13px; line-height:1.6; }
  .ddesc.none { color:var(--faint); font-style:italic; }
  .axes { display:flex; flex-direction:column; gap:11px; }
  .axis .an { font:11px/1.4 var(--mono); color:var(--accent); margin-bottom:5px; }
  .axis .av { display:flex; flex-wrap:wrap; gap:5px; }
  .achip { font:11px/1.4 var(--sans); background:#1a2230; border:1px solid var(--line2); color:var(--fg);
    padding:3px 9px; border-radius:6px; }
  .achip.empty { color:var(--faint); font-style:italic; }
  .vnames { display:flex; flex-wrap:wrap; gap:5px; max-height:168px; overflow:auto; }
  .vname { font:10px/1.4 var(--mono); background:#141a25; border:1px solid var(--line); color:var(--muted); padding:3px 7px; border-radius:5px; }
  .dlinks { display:flex; flex-wrap:wrap; gap:14px; }
  .dlinks a { font-size:13px; }

  /* Nested components */
  .nlist { display:flex; flex-direction:column; gap:6px; }
  .nrow { display:flex; align-items:center; gap:8px; background:#141a25; border:1px solid var(--line); border-radius:7px; padding:6px 10px; }
  .nrow .nname { font-size:13px; color:var(--fg); }
  .nrow a.nname { cursor:pointer; color:var(--accent2); text-decoration:none; }
  .nrow a.nname:hover { text-decoration:underline; }
  .nrow .ncount { font:10px/1 var(--mono); color:var(--muted); background:#0c1019; border:1px solid var(--line); padding:2px 6px; border-radius:5px; }
  .nrow .nvia { font:10px/1.4 var(--mono); color:var(--faint); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .nrow .next { font:9px/1.4 var(--sans); text-transform:uppercase; letter-spacing:.05em; color:var(--faint); border:1px solid var(--line2); padding:2px 5px; border-radius:4px; }
  .nrow .nfig { margin-left:auto; font-size:12px; flex:none; }

  /* Rendered doc markdown */
  .doc { font-size:13px; line-height:1.65; color:var(--fg); }
  .doc h3 { font-size:14px; margin:18px 0 8px; color:var(--fg); }
  .doc h4 { font-size:12px; margin:14px 0 6px; color:var(--muted); text-transform:none; letter-spacing:0; }
  .doc p { margin:8px 0; color:var(--muted); }
  .doc ul { margin:8px 0; padding-left:18px; color:var(--muted); }
  .doc li { margin:3px 0; }
  .doc code { font:11px/1.5 var(--mono); background:#0c1019; padding:1px 5px; border-radius:4px; color:var(--accent2); }
  .doc strong { color:var(--fg); }
  .doc table.dtable { width:100%; border-collapse:collapse; margin:10px 0; font-size:12px; }
  .doc .dtable th, .doc .dtable td { text-align:left; padding:6px 9px; border:1px solid var(--line); vertical-align:top; }
  .doc .dtable th { background:var(--panel); color:var(--muted); font-weight:600; }
  .doc .dtable td { color:var(--muted); }
  .doc .docnote { color:var(--faint); font-style:italic; }

  /* Pages detail: screen/structure list */
  .dfilter { margin-bottom:10px; }
  .flist { display:flex; flex-direction:column; gap:8px; }
  .frame { border:1px solid var(--line); border-radius:9px; overflow:hidden; background:var(--panel); }
  .frame:hover { border-color:var(--line2); }
  .fhead { display:flex; align-items:center; gap:11px; padding:9px 11px; cursor:pointer; }
  .fthumb { flex:0 0 64px; height:42px; border-radius:6px; background:#fff; border:1px solid var(--line2);
    display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .fthumb img { max-width:100%; max-height:100%; object-fit:contain; }
  .fthumb .cph { color:#9aa; font:600 16px/1 var(--sans); }
  .fmeta { min-width:0; flex:1; display:flex; flex-direction:column; gap:4px; }
  .ftop { display:flex; align-items:center; gap:7px; }
  .fname { font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .fsub { display:flex; align-items:center; gap:10px; font:11px/1 var(--mono); color:var(--faint); }
  .fdim { color:var(--muted); }
  .ffig { font-size:11px; }
  .fexp { all:unset; cursor:pointer; color:var(--faint); font-size:10px; padding:6px; transition:transform .15s; flex:0 0 auto; }
  .frame.open .fexp { transform:rotate(90deg); }
  .fkids { display:none; flex-wrap:wrap; gap:5px; padding:10px 12px 12px; border-top:1px solid var(--line); background:#10151e; }
  .frame.open .fkids { display:flex; }
  .fkids.empty { color:var(--faint); font-style:italic; font-size:12px; }
  .kchip { display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--fg);
    background:#141a25; border:1px solid var(--line); border-radius:6px; padding:3px 8px; max-width:100%; }
  .kchip .kn { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px; }
  .kchip.more { color:var(--faint); }
  .ntag { font:9px/1.4 var(--mono); text-transform:uppercase; letter-spacing:.04em; padding:2px 5px;
    border-radius:4px; background:#1d2530; color:var(--muted); flex:0 0 auto; }
  .ntag.nt-frame { background:#1c2740; color:var(--accent); }
  .ntag.nt-section { background:#16241c; color:var(--ok); }
  .ntag.nt-component, .ntag.nt-componentset { background:#241c2f; color:var(--accent2); }
  .ntag.nt-instance { background:#202634; color:var(--muted); }
  .ntag.nt-text, .ntag.nt-vector, .ntag.nt-rectangle { background:#181d27; color:var(--faint); }

  @media (max-width:760px){ body{flex-direction:column} aside{width:auto;flex:none;height:auto;position:static;flex-direction:row;flex-wrap:wrap} main{padding:20px} }
</style>

nt":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=9010-1966","thumb":null,"nested":[{"name":"Price/Basic","nodeId":"8784:67597","resolved":true,"viaVariant":"Property 1=MD","count":4},{"name":"Price/Per Kilometer","nodeId":"8784:67542","resolved":true,"viaVariant":null,"count":4}],"usedBy":[],"needsAttention":true}]},{"page":"⚛️ Status","items":[{"kind":"set","name":"Status","description":"What it is: A colour-coded chip displaying the current state of an entity (shipment, contract, tender, request).\nWhen to use: Table cells, detail panels, and list rows to surface entity lifecycle status at a glance.\nVariants: Neutral, primary, success, warning, danger, purple; solid and subtle fills; with/without dot or icon; multiple sizes. Sub-families: Status/Contract, Status/Requests, Status/Tender, Status/Transports.\nAvoid: Don't create ad-hoc coloured labels — always pick the closest semantic Status variant.","nodeId":"3555:106557","page":"⚛️ Status","variants":8,"variantNames":["Status=Canceled","Status=Collecting offers","Status=Active","Status=Status8","Status=Expired","Status=Draft","Status=Evaluation","Status=Finished"],"properties":[{"axis":"Status","values":["Canceled","Collecting offers","Active","Status8","Expired","Draft","Evaluation","Finished"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/status.md","docContent":"# Status\n\n**Component set key:** `9b4e31abdd930c8f349ecc2b409663d79a468ddb`\n**Figma page:** `⚛️ Status`\n**Variants in set:** 8\n\n## Description\n\nStatus is the generic status badge for entities that do not have a dedicated domain-specific status component. Use it for states that cut across domains or for new entity types before a domain-specific set is established. Where a domain-specific set exists (`Status/Tender`, `Status/Transports`, `Status/Requests`, `Status/Contract`), prefer that component instead.\n\n## Variants / Properties\n\n### Status axis\n| Status | Meaning |\n|---|---|\n| `Active` | Entity is currently active and valid. |\n| `Draft` | Entity has been created but not yet published or submitted. |\n| `Collecting offers` | Open for submissions or bids. |\n| `Evaluation` | Submissions received; under review. |\n| `Expired` | Passed its validity period. |\n| `Finished` | Process completed successfully. |\n| `Canceled` | Process terminated before completion. |\n| `Status8` | Placeholder — check Figma for the intended value before using. |\n\n## Usage rules\n\n- Prefer domain-specific `Status/*` components over this generic set when the entity domain is known.\n- Do not use `Status8` in production screens until it carries a defined meaning.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=3555-106557","thumb":"thumbs/3555-106557.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":8}],"usedBy":[],"needsAttention":false},{"kind":"set","name":"Status/Contract","description":"What it is: Status chip pre-configured with the contract lifecycle vocabulary (Draft, Active, Expired, Terminated).\nWhen to use: Contract list tables and contract detail pages.\nVariants: One variant per contract state; solid and subtle fills.\nAvoid: Don't apply contract states to non-contract entities — use the base Status set.","nodeId":"8754:49262","page":"⚛️ Status","variants":4,"variantNames":["Status=Status8","Status=Expired","Status=Canceled","Status=Active"],"properties":[{"axis":"Status","values":["Status8","Expired","Canceled","Active"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/status-contract.md","docContent":"# Status/Contract\n\n**Component set key:** `a5e9a696b4b111dd1ffe19398e4e69fad893c995`\n**Figma page:** `⚛️ Status`\n**Variants in set:** 4\n\n## Description\n\nStatus/Contract is the status badge for contract lifecycle states. Use it in contract list rows, contract detail headers, and any view that surfaces the current standing of a freight contract.\n\n## Variants / Properties\n\n### Status axis\n| Status | Meaning |\n|---|---|\n| `Active` | Contract is in force and valid. |\n| `Expired` | Contract end date has passed. |\n| `Canceled` | Contract was terminated before its end date. |\n| `Status8` | Placeholder variant — check Figma for the intended status value before using in designs. |\n\n## Related components\n\n- `Shipper/Contract/List Entry` — list row component that embeds this status.\n- `Status/Tender`, `Status/Requests`, `Status/Transports` — parallel status sets for other domains.\n\n## Usage rules\n\n- Do not use `Status8` in production designs until it has a defined semantic meaning.\n- Always use the domain-specific `Status/Contract` component rather than generic `Badge` for contract states.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8754-49262","thumb":"thumbs/8754-49262.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":4}],"usedBy":[],"needsAttention":false},{"kind":"set","name":"Status/Requests","description":"What it is: Status chip pre-configured with the request lifecycle vocabulary (Pending, Accepted, Rejected, Cancelled).\nWhen to use: Quote request and booking request list views.\nVariants: One variant per request state.\nAvoid: Don't use for transport statuses — use Status/Transports.","nodeId":"8754:49327","page":"⚛️ Status","variants":6,"variantNames":["Status=Active","Status=Confirmed","Status=Canceled","Status=Bidding completed","Status=Merged","Status=Draft"],"properties":[{"axis":"Status","values":["Active","Confirmed","Canceled","Bidding completed","Merged","Draft"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/status-requests.md","docContent":"# Status/Requests\n\n**Component set key:** `4b790686479e200cc09bc9c4b3295e70e576246b`\n**Figma page:** `⚛️ Status`\n**Variants in set:** 4\n\n## Description\n\nStatus/Requests is a specialised status badge for transport request lifecycle states. Use it in any view that lists or details transport requests to communicate the current processing stage at a glance.\n\n## Variants / Properties\n\n### Status axis\n| Status | Meaning |\n|---|---|\n| `Active` | Request is open and being processed. |\n| `Bidding completed` | The bidding window has closed; a winner may be selected. |\n| `Expired` | Request passed its deadline without completion. |\n| `Rejected by carrier` | The carrier declined the request. Note: variant name contains a typo (`carrrier`) in Figma — use the component as-is. |\n\n## Related components\n\n- `Status/Transports` — status labels for transport executions.\n- `Status/Tender` — status labels for tender lifecycle.\n- `Status/Contract` — status labels for contract states.\n- `Status` (generic) — broader status set used when a domain-specific set does not apply.\n\n## Usage rules\n\n- Do not substitute a `Badge` for a `Status/Requests` chip — status components carry domain-specific colour semantics.\n- Always use the exact status value that maps to the backend state; do not invent intermediate states.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8754-49327","thumb":"thumbs/8754-49327.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":6}],"usedBy":[],"needsAttention":false},{"kind":"set","name":"Status/Tender","description":"What it is: Status chip pre-configured with the tender lifecycle vocabulary (Open, Closed, Awarded, Expired).\nWhen to use: Tender list and tender detail pages.\nVariants: One variant per tender state.\nAvoid: Don't use for contract or transport statuses.","nodeId":"8754:49197","page":"⚛️ Status","variants":5,"variantNames":["Status=Canceled","Status=Finished","Status=Evaluation","Status=Draft","Status=Collecting offers"],"properties":[{"axis":"Status","values":["Canceled","Finished","Evaluation","Draft","Collecting offers"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/status-tender.md","docContent":"# Status/Tender\n\n**Component set key:** `78fa65f4c6a21fc2b1d4005f485c1758e6c65295`\n**Figma page:** `⚛️ Status`\n**Variants in set:** 5\n\n## Description\n\nStatus/Tender is the status badge for tender lifecycle states. Use it in tender list rows, tender detail headers, and anywhere the stage of a tender process needs to be communicated visually.\n\n## Variants / Properties\n\n### Status axis\n| Status | Meaning |\n|---|---|\n| `Draft` | Tender has been created but not yet published. |\n| `Collecting offers` | Tender is live — carriers can submit price offers. |\n| `Evaluation` | Offer collection has ended; shipper is reviewing submissions. |\n| `Finished` | Tender completed — a carrier was selected. |\n| `Canceled` | Tender was cancelled and is no longer active. |\n\n## Related components\n\n- `Status/Requests` — request-level status.\n- `Status/Transports` — transport execution status.\n- `Status/Contract` — contract status.\n- `Shipper/Tender/List Entry` — list row that embeds this status.\n\n## Usage rules\n\n- Mirror the exact backend tender state in the status component — do not approximate or merge states.\n- The `Draft` status should only be visible to the shipper who created the tender, not to carriers.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8754-49197","thumb":"thumbs/8754-49197.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":5}],"usedBy":[],"needsAttention":false},{"kind":"set","name":"Status/Transports","description":"What it is: Status chip pre-configured with the transport execution vocabulary (Planned, In Transit, Delivered, Delayed, Cancelled).\nWhen to use: Shipment tracking tables, transport management views.\nVariants: One variant per transport state; solid and subtle fills.\nAvoid: Don't use for tender or contract statuses.","nodeId":"8754:49370","page":"⚛️ Status","variants":5,"variantNames":["Status=Canceled by support","Status=Canceled by carrier","Status=Canceled","Status=Bidding completed","Status=Processing"],"properties":[{"axis":"Status","values":["Canceled by support","Canceled by carrier","Canceled","Bidding completed","Processing"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/status-transports.md","docContent":"# Status/Transports\n\n**Component set key:** `5c14a532c94f1d0a37b4b51d0d7a8124efaab4d6`\n**Figma page:** `⚛️ Status`\n**Variants in set:** 4\n\n## Description\n\nStatus/Transports is the status badge for transport execution lifecycle states. Place it in transport list rows, transport detail headers, and any summary view where the execution status of a transport needs to be visible at a glance.\n\n## Variants / Properties\n\n### Status axis\n| Status | Meaning |\n|---|---|\n| `In progress` | Transport is currently being executed (en route). |\n| `Processing` | Transport has been confirmed and is being prepared. |\n| `Bidding completed` | Bidding phase is over; transport is awaiting assignment. |\n| `Canceled` | Transport was cancelled before or during execution. |\n\n## Related components\n\n- `Status/Requests` — for transport request states.\n- `Status/Tender` — for tender lifecycle states.\n- `Status/Contract` — for contract states.\n\n## Usage rules\n\n- Use this component exclusively for transport execution states — not for tender or contract states.\n- Do not substitute a generic `Badge` or `Status` component when a domain-specific `Status/Transports` variant exists.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8754-49370","thumb":"thumbs/8754-49370.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":5}],"usedBy":[],"needsAttention":false}]},{"page":"⚛️ Route Entry","items":[{"kind":"set","name":"Route Entry","description":"What it is: A structured input for a single route leg, capturing origin, destination, dates, and cargo type.\nWhen to use: Shipment creation and tender request forms where users define a transport leg.\nVariants: Collapsed (summary) and expanded (full input); with/without return leg; loading state.\nAvoid: Don't use for address search only — use Input with location autocomplete instead.","nodeId":"131:12752","page":"⚛️ Route Entry","variants":11,"variantNames":["Order=Middle","Order=First","Selected=False, Expanded=False, Selectable=True","Selected=True, Expanded=True, Selectable=False","Selected=True, Expanded=False, Selectable=False","Selected=True, Expanded=False, Selectable=True","Selected=True, Expanded=True, Selectable=True","Selected=False, Expanded=True, Selectable=True","Order=Last","Selected=False, Expanded=False, Selectable=False","Selected=False, Expanded=True, Selectable=False"],"properties":[{"axis":"Order","values":["Middle","First","Last"]},{"axis":"Selected","values":["False","True"]},{"axis":"Expanded","values":["False","True"]},{"axis":"Selectable","values":["True","False"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/route-entry.md","docContent":"# Route Entry\n\n**Component set key:** `0435debb38ad77e167b74da63766b0fe81d0e45f`\n**Figma page:** `⚛️ Route Entry`\n**Variants in set:** 11\n\n## Description\n\nRoute Entry is a single waypoint row in a read-only or interactive route display. It renders stop information (location, date/time) with a visual connector indicating its position in the sequence (First, Middle, Last). It supports both selectable (for carrier route browsing) and non-selectable (for shipper summary display) modes.\n\n## Variants / Properties\n\n### Order axis\n| Order | Description |\n|---|---|\n| `First` | First stop in the route — renders the start node of the route connector. |\n| `Middle` | An intermediate stop — renders a mid-connector node. |\n| `Last` | Final stop in the route — renders the end node. |\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | Stop is not highlighted. |\n| `True` | Stop is selected/active — highlighted state. |\n\n### Expanded axis\n| Value | Description |\n|---|---|\n| `False` | Compact view — shows location and date only. |\n| `True` | Expanded view — reveals additional stop details. |\n\n### Selectable axis\n| Value | Description |\n|---|---|\n| `False` | Row is display-only — no selection interaction. |\n| `True` | Row can be selected by the user. |\n\n## Related components\n\n- `Route Entry 2` — alternative/supplementary route entry style.\n- `Waypoint Entry` — the editable counterpart used in form creation flows.\n\n## Usage rules\n\n- Use `First` and `Last` only once per route; all intermediate stops use `Middle`.\n- Use `Selectable=False` in read-only tender/transport detail views.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=131-12752","thumb":"thumbs/131-12752.png","nested":[{"name":"Flag","nodeId":"102:19056","resolved":true,"viaVariant":"Property 1=de","count":6},{"name":"_Route Entry/Waypoint","nodeId":null,"resolved":false,"viaVariant":null,"count":3}],"usedBy":[],"needsAttention":false},{"kind":"set","name":"Route Entry","description":"Sample component description","nodeId":"707:368801","page":"⚛️ Route Entry","variants":11,"variantNames":["Order=Middle","Order=First","Selected=False, Expanded=False, Selectable=True","Selected=True, Expanded=True, Selectable=False","Selected=True, Expanded=False, Selectable=False","Selected=True, Expanded=False, Selectable=True","Selected=True, Expanded=True, Selectable=True","Selected=False, Expanded=True, Selectable=True","Order=Last","Selected=False, Expanded=False, Selectable=False","Selected=False, Expanded=True, Selectable=False"],"properties":[{"axis":"Order","values":["Middle","First","Last"]},{"axis":"Selected","values":["False","True"]},{"axis":"Expanded","values":["False","True"]},{"axis":"Selectable","values":["True","False"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/route-entry.md","docContent":"# Route Entry\n\n**Component set key:** `0435debb38ad77e167b74da63766b0fe81d0e45f`\n**Figma page:** `⚛️ Route Entry`\n**Variants in set:** 11\n\n## Description\n\nRoute Entry is a single waypoint row in a read-only or interactive route display. It renders stop information (location, date/time) with a visual connector indicating its position in the sequence (First, Middle, Last). It supports both selectable (for carrier route browsing) and non-selectable (for shipper summary display) modes.\n\n## Variants / Properties\n\n### Order axis\n| Order | Description |\n|---|---|\n| `First` | First stop in the route — renders the start node of the route connector. |\n| `Middle` | An intermediate stop — renders a mid-connector node. |\n| `Last` | Final stop in the route — renders the end node. |\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | Stop is not highlighted. |\n| `True` | Stop is selected/active — highlighted state. |\n\n### Expanded axis\n| Value | Description |\n|---|---|\n| `False` | Compact view — shows location and date only. |\n| `True` | Expanded view — reveals additional stop details. |\n\n### Selectable axis\n| Value | Description |\n|---|---|\n| `False` | Row is display-only — no selection interaction. |\n| `True` | Row can be selected by the user. |\n\n## Related components\n\n- `Route Entry 2` — alternative/supplementary route entry style.\n- `Waypoint Entry` — the editable counterpart used in form creation flows.\n\n## Usage rules\n\n- Use `First` and `Last` only once per route; all intermediate stops use `Middle`.\n- Use `Selectable=False` in read-only tender/transport detail views.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=707-368801","thumb":"thumbs/707-368801.png","nested":[{"name":"Button","nodeId":"15:105","resolved":true,"viaVariant":"Variant=Body, State=Default","count":24},{"name":"_Checkbox-Radio-Switch","nodeId":null,"resolved":false,"viaVariant":null,"count":8},{"name":"Countries","nodeId":null,"resolved":false,"viaVariant":null,"count":8}],"usedBy":[],"needsAttention":false},{"kind":"set","name":"Route Entry 2","description":"What it is: An updated layout variant of Route Entry with revised field ordering and multi-stop support.\nWhen to use: New shipment forms and tender wizards — prefer this over Route Entry for new designs.\nVariants: Single leg, multi-stop; collapsed and expanded; with waypoint add/remove controls.\nAvoid: Don't mix Route Entry and Route Entry 2 in the same form.","nodeId":"8617:6114","page":"⚛️ Route Entry","variants":4,"variantNames":["Order=Small Dot","Order=Default","Order=Smaller","Order=Order4"],"properties":[{"axis":"Order","values":["Small Dot","Default","Smaller","Order4"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/route-entry-2.md","docContent":"# Route Entry 2\n\n**Component set key:** `aacbd9b391644aefb73977cb333cb600e9d4fd4f`\n**Figma page:** `⚛️ Route Entry`\n**Variants in set:** 4\n\n## Description\n\nRoute Entry 2 is a supplementary route waypoint component that provides additional size/density variants not covered by the primary `Route Entry`. It is used in contexts where the route visualisation requires a more compact node indicator, such as nested route summaries or auxiliary route displays.\n\n## Variants / Properties\n\n### Order axis\n| Order | Description |\n|---|---|\n| `Default` | Standard node size. |\n| `Smaller` | Reduced node size for denser layouts. |\n| `Small Dot` | Minimal dot indicator — used for very compact route lines. |\n| `Order4` | Additional variant — verify in Figma for the current visual treatment. |\n\n## Related components\n\n- `Route Entry` — primary route entry component with full interaction support.\n\n## Usage rules\n\n- Use `Route Entry 2` only when `Route Entry` does not fit the required density or node style.\n- Maintain visual consistency within a single route display — do not mix `Route Entry` and `Route Entry 2` node styles arbitrarily.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8617-6114","thumb":"thumbs/8617-6114.png","nested":[{"name":"_Route Entry/Waypoint Line","nodeId":null,"resolved":false,"viaVariant":null,"count":8},{"name":"Button","nodeId":"15:105","resolved":true,"viaVariant":"Variant=Link, State=Default","count":8},{"name":"_Route Entry/Address Contact","nodeId":null,"resolved":false,"viaVariant":null,"count":4},{"name":"Flag","nodeId":"102:19056","resolved":true,"viaVariant":"Property 1=cz","count":4},{"name":"_Route Entry/Date and Time","nodeId":null,"resolved":false,"viaVariant":null,"count":3},{"name":"_Route Entry/Date and Time 2","nodeId":null,"resolved":false,"viaVariant":null,"count":1}],"usedBy":[],"needsAttention":false},{"kind":"component","name":"Waypoint","description":"","nodeId":"8622:85326","page":"⚛️ Route Entry","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8622-85326","thumb":"thumbs/8622-85326.png","nested":[{"name":"_Route Entry/Waypoint","nodeId":null,"resolved":false,"viaVariant":null,"count":1}],"usedBy":[],"needsAttention":true}]},{"page":"⚛️ Checkbox, Radio, Switch (Toggle)","items":[{"kind":"set","name":"Check, Radio, Switch Item","description":"What it is: Atomic selection control — checkbox, radio button, or toggle switch — with an optional label and hint.\nWhen to use: Forms requiring binary (switch/checkbox) or single-of-many (radio) input.\nVariants: Checkbox, Radio, Switch; checked/unchecked/indeterminate; default, hover, focus, disabled, error states.\nAvoid: Don't use radio when multiple selections are valid — use checkboxes.","nodeId":"31:1784","page":"⚛️ Checkbox, Radio, Switch (Toggle)","variants":12,"variantNames":["Checked=True, Variant=Card Left, Disabled=True","Checked=False, Variant=Default, Disabled=False","Checked=True, Variant=Card Left, Disabled=False","Checked=False, Variant=Card Left, Disabled=False","Checked=True, Variant=Card Right, Disabled=True","Checked=False, Variant=Card Right, Disabled=True","Checked=False, Variant=Default, Disabled=True","Checked=True, Variant=Default, Disabled=False","Checked=False, Variant=Card Left, Disabled=True","Checked=True, Variant=Default, Disabled=True","Checked=False, Variant=Card Right, Disabled=False","Checked=True, Variant=Card Right, Disabled=False"],"properties":[{"axis":"Checked","values":["True","False"]},{"axis":"Variant","values":["Card Left","Default","Card Right"]},{"axis":"Disabled","values":["True","False"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/check-radio-switch-item.md","docContent":"# Check, Radio, Switch Item\n\n**Component set key:** `69832ee12634e155386b695a6529f1b4e89456ac`\n**Figma page:** `⚛️ Checkbox, Radio, Switch (Toggle)`\n**Variants in set:** 12\n\n## Description\n\nCheck, Radio, Switch Item is the atomic selection control — a single checkbox, radio button, or toggle used directly on a form field. It supports a default inline layout as well as card-based variants that present the control inside a visual card container, suitable for option selection with more visual weight.\n\n## Variants / Properties\n\n### Variant axis\n| Variant | Description |\n|---|---|\n| `Default` | Standard inline control — checkbox or radio with a label beside it. |\n| `Card Left` | Control rendered inside a card; indicator on the left side of the card. |\n| `Card Right` | Control rendered inside a card; indicator on the right side of the card. |\n\n### Checked axis\n| Value | Description |\n|---|---|\n| `False` | Control is unchecked / not selected. |\n| `True` | Control is checked / selected. |\n\n### Disabled axis\n| Value | Description |\n|---|---|\n| `False` | Interactive — user can toggle. |\n| `True` | Non-interactive — visually dimmed. |\n\n## Related components\n\n- `Switch Item` — dedicated toggle switch control (on/off, not check/radio).\n- `List Entry` — selectable list row that embeds a selection control.\n- `List Entry Group` — collapsible group of `List Entry` rows.\n\n## Usage rules\n\n- Use `Default` variant for standard form fields.\n- Use `Card` variants when options need visual separation and more surface area (e.g., service type selection).\n- Radio controls must always be presented in groups — never use a single radio button.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=31-1784","thumb":"thumbs/31-1784.png","nested":[{"name":"_Checkbox-Radio-Switch","nodeId":null,"resolved":false,"viaVariant":null,"count":12}],"usedBy":[{"name":"Content/Section Title","nodeId":"6986:12807","count":1}],"needsAttention":false},{"kind":"set","name":"Selectable Group Entry","description":"What it is: A labelled group wrapper that stacks List Entry rows under a section header.\nWhen to use: Grouping related settings or options (e.g. \"Notification preferences\", \"Access levels\").\nVariants: With group label, with/without group-level select-all control.\nAvoid: Don't use for single ungrouped lists — use List Entry rows directly.","nodeId":"5978:71425","page":"⚛️ Checkbox, Radio, Switch (Toggle)","variants":8,"variantNames":["Expanded=True, State=Selected, Selectable=True","Expanded=False, State=Default, Selectable=True","Expanded=True, State=Default, Selectable=True","Expanded=False, State=Selected, Selectable=True","Expanded=True, State=Default, Selectable=False","Expanded=True, State=Partialy Selected, Selectable=True","Expanded=False, State=Partialy Selected, Selectable=True","Expanded=False, State=Default, Selectable=False"],"properties":[{"axis":"Expanded","values":["True","False"]},{"axis":"State","values":["Selected","Default","Partialy Selected"]},{"axis":"Selectable","values":["True","False"]}],"hasDoc":false,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5978-71425","thumb":"thumbs/5978-71425.png","nested":[{"name":"_Checkbox-Radio-Switch","nodeId":null,"resolved":false,"viaVariant":null,"count":8},{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":8}],"usedBy":[],"needsAttention":true},{"kind":"set","name":"Selectable List Entry","description":"What it is: A selectable list row combining a Check/Radio/Switch item with a label, optional description, and supporting metadata.\nWhen to use: Settings lists, option selection menus, permission toggles.\nVariants: Checkbox, radio, switch variants; with and without description or secondary text; hover, focus, selected, disabled.\nAvoid: Don't use for non-interactive display rows — use Item instead.","nodeId":"5978:70626","page":"⚛️ Checkbox, Radio, Switch (Toggle)","variants":4,"variantNames":["Selected=True, Disabled=False","Selected=False, Disabled=True","Selected=False, Disabled=False","Selected=True, Disabled=True"],"properties":[{"axis":"Selected","values":["True","False"]},{"axis":"Disabled","values":["False","True"]}],"hasDoc":false,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5978-70626","thumb":"thumbs/5978-70626.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":20},{"name":"_Checkbox-Radio-Switch","nodeId":null,"resolved":false,"viaVariant":null,"count":4}],"usedBy":[],"needsAttention":true}]},{"page":"⚛️ Input & Form Control","items":[{"kind":"component","name":"Form Control","description":"","nodeId":"26:1580","page":"⚛️ Input & Form Control","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=26-1580","thumb":"thumbs/26-1580.png","nested":[{"name":"Button","nodeId":"15:105","resolved":true,"viaVariant":"Variant=Link, State=Default","count":1},{"name":"Input","nodeId":"26:1063","resolved":true,"viaVariant":"Empty=True, Type=Text, Disabled=False","count":1},{"name":"Notification (Alert)","nodeId":"32:1770","resolved":true,"viaVariant":"Property 1=Warning","count":1}],"usedBy":[],"needsAttention":true},{"kind":"set","name":"Input","description":"What it is: The core single-line text field with label, optional left/right adornment, hint text, and validation states.\nWhen to use: Any form field collecting freeform text — search, name, address, reference number.\nVariants: Sizes xs–xl; default, hover, focus, filled, error, disabled, read-only; with/without left icon, right icon, prefix, suffix, clear button.\nAvoid: Don't use Input for multi-line text — use Textarea.","nodeId":"26:1063","page":"⚛️ Input & Form Control","variants":24,"variantNames":["Empty=True, Type=Combo, Disabled=False","Empty=False, Type=Tags, Disabled=True","Empty=False, Type=Combo, Disabled=True","Empty=False, Type=Select, Disabled=True","Empty=True, Type=Text, Disabled=True","Empty=False, Type=Combo, Disabled=False","Empty=True, Type=Tags, Disabled=False","Empty=True, Type=Text, Disabled=False","Empty=True, Type=Location, Disabled=False","Empty=False, Type=Date, Disabled=True","Empty=False, Type=Select, Disabled=False","Empty=False, Type=Date, Disabled=False","Empty=True, Type=Tags, Disabled=True","Empty=True, Type=Location, Disabled=True","Empty=False, Type=Location, Disabled=True","Empty=False, Type=Tags, Disabled=False","Empty=True, Type=Date, Disabled=True","Empty=True, Type=Date, Disabled=False","Empty=False, Type=Text, Disabled=False","Empty=False, Type=Location, Disabled=False","Empty=True, Type=Combo, Disabled=True","Empty=True, Type=Select, Disabled=False","Empty=True, Type=Select, Disabled=True","Empty=False, Type=Text, Disabled=True"],"properties":[{"axis":"Empty","values":["True","False"]},{"axis":"Type","values":["Combo","Tags","Select","Text","Location","Date"]},{"axis":"Disabled","values":["False","True"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/input.md","docContent":"# Input\n\n**Component set key:** `099f28920bd6afafaf67b52308c4e72e89d6d351`\n**Figma page:** `⚛️ Input & Form Control`\n**Variants in set:** 24\n\n## Description\n\nInput is the single-line data-entry field used across all forms in the 4Shipper / Transportly product. It handles free text, structured date values, location lookups, combo-box selections, multi-value tag entry, and dropdown-style select controls. Each type presents an appropriately specialised affordance while sharing the same visual shell.\n\n## Variants / Properties\n\n### Type axis\n| Type | When to use |\n|---|---|\n| `Text` | Free-form single-line text (names, notes, references). |\n| `Date` | Date entry; renders a calendar picker affordance. |\n| `Location` | Address or place lookup with geographic autocomplete. |\n| `Combo` | Combobox — searchable dropdown with free-text fallback. |\n| `Select` | Dropdown-only selection; user cannot type a custom value. |\n| `Tags` | Multi-value input; each confirmed value becomes a removable tag chip. |\n\n### Empty axis\n| Value | Meaning |\n|---|---|\n| `True` | Field has no value — shows placeholder text. |\n| `False` | Field is populated — shows entered value. |\n\n### Disabled axis\n| Value | Meaning |\n|---|---|\n| `False` | Interactive — user can focus and edit. |\n| `True` | Non-interactive — value is read-only; field is visually dimmed. |\n\n## Usage rules\n\n- Always pair an Input with a `Form Control` wrapper to get the label, helper text, and error state.\n- Use `Location` type for any address or waypoint field so the geographic autocomplete is available.\n- Use `Tags` when the user may supply multiple values for a single field (e.g., commodity types).\n- Never disable an Input that the user has not seen in an enabled state first — prefer hiding the field or providing context about why it is locked.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=26-1063","thumb":"thumbs/26-1063.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":67},{"name":"Badge","nodeId":"18:968","resolved":true,"viaVariant":"Variant=Primary","count":4},{"name":"Flag","nodeId":"102:19056","resolved":true,"viaVariant":"Property 1=de","count":4}],"usedBy":[{"name":"Content Header","nodeId":"6984:1254074","count":2},{"name":"Form Control","nodeId":"26:1580","count":1}],"needsAttention":false},{"kind":"set","name":"Textarea","description":"What it is: A multi-line text input for collecting longer freeform content with auto-resize or fixed height.\nWhen to use: Notes, descriptions, message composition, address fields requiring multiple lines.\nVariants: Sizes md and lg; default, hover, focus, filled, error, disabled, read-only; with character count.\nAvoid: Don't use Textarea for single-line inputs — use Input.","nodeId":"6905:1228093","page":"⚛️ Input & Form Control","variants":4,"variantNames":["Empty=True, Disabled=False","Empty=False, Disabled=True","Empty=True, Disabled=True","Empty=False, Disabled=False"],"properties":[{"axis":"Empty","values":["True","False"]},{"axis":"Disabled","values":["False","True"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/textarea.md","docContent":"# Textarea\n\n**Component set key:** `070099fb216768417ef71472d9c1089d92df8516`\n**Figma page:** `⚛️ Input & Form Control`\n**Variants in set:** 4\n\n## Description\n\nTextarea is the multi-line text-entry field. Use it in place of `Input` (Text type) whenever the expected content is longer than a single line — for example, shipment notes, Q&A answers, rejection reasons, or any free-form remarks field. It shares the same visual language as the Input component.\n\n## Variants / Properties\n\n### Empty axis\n| Value | Meaning |\n|---|---|\n| `True` | No value entered — placeholder text is visible. |\n| `False` | Content has been entered. |\n\n### Disabled axis\n| Value | Meaning |\n|---|---|\n| `False` | Editable — user can type into the field. |\n| `True` | Read-only — field is visually dimmed and non-interactive. |\n\n## Usage rules\n\n- Pair with a `Form Control` wrapper for the label, helper text, and error state — the same as `Input`.\n- Use when the expected input is more than ~80 characters or when line breaks are meaningful.\n- Do not use Textarea for structured data that has a dedicated input type (dates, addresses, tags).\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6905-1228093","thumb":"thumbs/6905-1228093.png","nested":[{"name":"_Textarea/Toolbar","nodeId":null,"resolved":false,"viaVariant":null,"count":2}],"usedBy":[],"needsAttention":false}]},{"page":"⚛️ Table","items":[{"kind":"component","name":"Table","description":"","nodeId":"7191:94525","page":"⚛️ Table","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7191-94525","thumb":"thumbs/7191-94525.png","nested":[{"name":"Table Column","nodeId":"7191:92194","resolved":true,"viaVariant":null,"count":5}],"usedBy":[],"needsAttention":true},{"kind":"set","name":"Table Cell","description":"What it is: The atomic cell unit for data tables — handles text, badges, prices, actions, and checkboxes within a consistent row height.\nWhen to use: All data table implementations — compose rows from Table Cell instances rather than bare text.\nVariants: Text, numeric, status badge, price, checkbox, action (icon button), custom; header and body row variants; with/without sorting indicator.\nAvoid: Don't use Table Cell outside a table layout — for key-value display use Item instead.","nodeId":"7191:91598","page":"⚛️ Table","variants":6,"variantNames":["Align=Left, Variant=Cell","Align=Center, Variant=Head","Align=Right, Variant=Cell","Align=Center, Variant=Cell","Align=Left, Variant=Head","Align=Right, Variant=Head"],"properties":[{"axis":"Align","values":["Left","Center","Right"]},{"axis":"Variant","values":["Cell","Head"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/table-cell.md","docContent":"# Table Cell\n\n**Component set key:** `cf0997e6ec79e032395dfa682fbaeff7a93a58a3`\n**Figma page:** `⚛️ Table`\n**Variants in set:** 6\n\n## Description\n\nTable Cell is the atomic building block of data tables in 4Shipper / Transportly. It exists in two roles — `Head` (column header) and `Cell` (data row) — and supports three horizontal alignments. Compose Table Cell instances into rows within the `Table` layout component.\n\n## Variants / Properties\n\n### Variant axis\n| Variant | Description |\n|---|---|\n| `Head` | Column header cell — renders label text with sorting affordance if needed. |\n| `Cell` | Data row cell — renders the row value. |\n\n### Align axis\n| Align | When to use |\n|---|---|\n| `Left` | Default for text content (labels, names, descriptions). |\n| `Center` | Short categorical values (flags, icons, status indicators). |\n| `Right` | Numeric values (prices, quantities, percentages) so decimal points align. |\n\n## Usage rules\n\n- Always right-align numeric columns; always left-align text columns.\n- Use `Head` cells only in the first (header) row of a table.\n- Do not mix alignments within a column — the `Head` and all `Cell` entries for the same column must share the same `Align` value.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7191-91598","thumb":"thumbs/7191-91598.png","nested":[{"name":"_Checkbox-Radio-Switch","nodeId":null,"resolved":false,"viaVariant":null,"count":12},{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":3}],"usedBy":[{"name":"Table Column","nodeId":"7191:92194","count":5}],"needsAttention":false},{"kind":"component","name":"Table Column","description":"","nodeId":"7191:92194","page":"⚛️ Table","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7191-92194","thumb":"thumbs/7191-92194.png","nested":[{"name":"Table Cell","nodeId":"7191:91598","resolved":true,"viaVariant":"Align=Left, Variant=Head","count":5}],"usedBy":[{"name":"Table","nodeId":"7191:94525","count":5}],"needsAttention":true}]},{"page":"⚛️ Progress Bar","items":[{"kind":"set","name":"Progress Bar/Bar","description":"What it is: A horizontal filled track showing completion percentage for a process or quota.\nWhen to use: Upload progress, onboarding step completion, capacity utilisation meters.\nVariants: Sizes xs–lg; filled colours: primary, success, warning, danger; with and without label.\nAvoid: Don't use for discrete multi-step flows — use Stepper or Step Progress Tabs instead.","nodeId":"7215:102951","page":"⚛️ Progress Bar","variants":2,"variantNames":["Size=SM","Size=Default"],"properties":[{"axis":"Size","values":["SM","Default"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/progress-bar.md","docContent":"# Progress Bar/Bar\n\n**Component set key:** `d6b611082102b96edbde92ca153d7b3e4c1d4288`\n**Figma page:** `⚛️ Progress Bar`\n**Variants in set:** 2\n\n## Description\n\nProgress Bar is a horizontal track-and-fill indicator that communicates the completion percentage of a process or the current value within a range. Use it for tasks with a measurable, determinate progress value — for example, upload completion, onboarding step progress, or cargo fill level.\n\n## Variants / Properties\n\n### Size axis\n| Size | Description |\n|---|---|\n| `Default` | Standard height — use in most contexts. |\n| `SM` | Smaller height — use inside compact cards or table cells where vertical space is limited. |\n\n## Usage rules\n\n- Only use Progress Bar for determinate progress (a known percentage). For indeterminate loading states, use a spinner or skeleton instead.\n- Always accompany the bar with a numeric label or descriptive text so the value is accessible.\n- Use `SM` size only in dense layouts where `Default` would dominate too much vertical space.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7215-102951","thumb":"thumbs/7215-102951.png","nested":[],"usedBy":[{"name":"Progress Group","nodeId":"7215:102950","count":1}],"needsAttention":false},{"kind":"component","name":"Progress Bar/Label Description","description":"","nodeId":"7215:102922","page":"⚛️ Progress Bar","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7215-102922","thumb":"thumbs/7215-102922.png","nested":[],"usedBy":[{"name":"Progress Group","nodeId":"7215:102950","count":3}],"needsAttention":true},{"kind":"component","name":"Progress Group","description":"","nodeId":"7215:102950","page":"⚛️ Progress Bar","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7215-102950","thumb":"thumbs/7215-102950.png","nested":[{"name":"Progress Bar/Label Description","nodeId":"7215:102922","resolved":true,"viaVariant":null,"count":3},{"name":"Progress Bar/Bar","nodeId":"7215:102951","resolved":true,"viaVariant":"Size=Default","count":1}],"usedBy":[],"needsAttention":true}]},{"page":"⚛️ Dropdown","items":[{"kind":"set","name":"Dropdown Item","description":"What it is: A single selectable option inside a dropdown menu or select popover.\nWhen to use: Rendered automatically inside Dropdown or Select menus — not placed independently.\nVariants: Default, hover, selected, disabled; with and without leading icon or checkbox.\nAvoid: Don't place Dropdown Items outside a menu container.","nodeId":"707:402598","page":"⚛️ Dropdown","variants":5,"variantNames":["State=Hover, Selected=False","State=Disabled, Selected=False","State=Default, Selected=True","State=Hover, Selected=True","State=Default, Selected=False"],"properties":[{"axis":"State","values":["Hover","Disabled","Default"]},{"axis":"Selected","values":["False","True"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/dropdown-item.md","docContent":"# Dropdown Item\n\n**Component set key:** `009a129716b7d5afcb79fd41409095b5e63b84fe`\n**Figma page:** `⚛️ Dropdown`\n**Variants in set:** 5\n\n## Description\n\nDropdown Item is a single option row inside a dropdown menu or select popover. It renders a label and optionally a leading icon or trailing check mark. Multiple Dropdown Item instances are stacked vertically inside the `Dropdown` container. Use this component whenever the user needs to pick one value from a list of discrete options.\n\n## Variants / Properties\n\n### State axis\n| State | Description |\n|---|---|\n| `Default` | Resting state — item is visible and interactive. |\n| `Hover` | Cursor is over the item — highlighted background. |\n| `Disabled` | Item cannot be selected in the current context — visually dimmed. |\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | Item is not the active selection. |\n| `True` | Item represents the current selection — renders a check mark or similar indicator. |\n\n## Usage rules\n\n- Use `Disabled` only when the option exists but is contextually unavailable — not to hide options.\n- Only one item in a single-select dropdown should have `Selected=True` at any time.\n- In a multi-select context, multiple items may carry `Selected=True` simultaneously.\n- Keep item labels short (ideally under 40 characters) to prevent truncation in narrow dropdowns.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=707-402598","thumb":"thumbs/707-402598.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":10}],"usedBy":[{"name":"Dropdown Menu","nodeId":"5803:40223","count":3}],"needsAttention":false},{"kind":"component","name":"Dropdown Menu","description":"","nodeId":"5803:40223","page":"⚛️ Dropdown","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5803-40223","thumb":"thumbs/5803-40223.png","nested":[{"name":"Dropdown Item","nodeId":"707:402598","resolved":true,"viaVariant":"State=Default, Selected=False","count":3}],"usedBy":[],"needsAttention":true}]},{"page":"⚛️ Option Cards","items":[{"kind":"component","name":"Option Cards","description":"","nodeId":"6324:59165","page":"⚛️ Option Cards","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6324-59165","thumb":"thumbs/6324-59165.png","nested":[{"name":"Option Cards/Card","nodeId":"6324:59033","resolved":true,"viaVariant":"Selected=True, Disabled=False","count":5}],"usedBy":[],"needsAttention":true},{"kind":"set","name":"Option Cards/Card","description":"What it is: A large selectable card that lets users pick one or multiple options, each with a title, optional description, and icon.\nWhen to use: Onboarding plan selection, shipment-type chooser, feature toggle flows where visual weight aids comprehension.\nVariants: Default, hover, selected, disabled; single-select (radio) and multi-select (checkbox) modes.\nAvoid: Don't use when options exceed 5–6 — fall back to a radio/checkbox list for scannability.","nodeId":"6324:59033","page":"⚛️ Option Cards","variants":4,"variantNames":["Selected=False, Disabled=True","Selected=True, Disabled=True","Selected=True, Disabled=False","Selected=False, Disabled=False"],"properties":[{"axis":"Selected","values":["False","True"]},{"axis":"Disabled","values":["True","False"]}],"hasDoc":false,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6324-59033","thumb":"thumbs/6324-59033.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":6}],"usedBy":[{"name":"Option Cards","nodeId":"6324:59165","count":5}],"needsAttention":true}]},{"page":"⚛️ Carrier Selection","items":[{"kind":"set","name":"Carrier Selection","description":"What it is: A composite card for choosing a freight carrier from a list, showing carrier name, logo, price, and transit details.\nWhen to use: Tender or booking flows where users compare and select a carrier offer.\nVariants: Default, selected, disabled; with and without pricing detail.\nAvoid: Don't use for carrier reference display only — use Status or Item instead.","nodeId":"147:67475","page":"⚛️ Carrier Selection","variants":4,"variantNames":["Expanded=True, Selected=False","Expanded=False, Selected=True","Expanded=False, Selected=False","Expanded=True, Selected=True"],"properties":[{"axis":"Expanded","values":["True","False"]},{"axis":"Selected","values":["False","True"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/carrier-selection.md","docContent":"# Carrier Selection\n\n**Component set key:** `4479bdc9b089fadf0bee634a33095f60b535e67e`\n**Figma page:** `⚛️ Carrier Selection`\n**Variants in set:** 4\n\n## Description\n\nCarrier Selection is the card-style selector used when a shipper chooses one or more carriers to invite to a tender. It renders a carrier identity block and supports collapsed and expanded states for showing contact details or additional carrier information. Use it in tender creation flows and in any context where carriers are selected from a list.\n\n## Variants / Properties\n\n### Expanded axis\n| Value | Description |\n|---|---|\n| `False` | Carrier card is collapsed — shows name and primary identifier only. |\n| `True` | Carrier card is expanded — reveals additional details such as contact information. |\n\n### Selected axis\n| Value | Description |\n|---|---|\n| `False` | Carrier is not selected. |\n| `True` | Carrier is selected — visually highlighted with a checked state. |\n\n## Related components\n\n- `Carrier Selection/Entry` — the individual contact or carrier row rendered inside the expanded state.\n\n## Usage rules\n\n- Allow multi-select when inviting multiple carriers to a single tender.\n- The expanded state is typically triggered on hover or tap to preview carrier details before confirming.\n- Always show at least the carrier name and a primary identifier in the collapsed state.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=147-67475","thumb":"thumbs/147-67475.png","nested":[{"name":"Carrier Selection/Entry","nodeId":"147:66956","resolved":true,"viaVariant":"Variant=Carrier","count":20}],"usedBy":[],"needsAttention":false},{"kind":"set","name":"Carrier Selection/Entry","description":"What it is: The inner row component used inside the Carrier Selection card to display a single carrier detail line (e.g. transit days, rate).\nWhen to use: Composed automatically inside Carrier Selection — not placed directly by designers.\nVariants: — \nAvoid: Do not use standalone; always nest inside a Carrier Selection container.","nodeId":"147:66956","page":"⚛️ Carrier Selection","variants":2,"variantNames":["Variant=Carrier","Variant=Contact"],"properties":[{"axis":"Variant","values":["Carrier","Contact"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/carrier-selection-entry.md","docContent":"# Carrier Selection/Entry\n\n**Component set key:** `e8d1dfea80a29c770096bc233953b8ebad396ad2`\n**Figma page:** `⚛️ Carrier Selection`\n**Variants in set:** 2\n\n## Description\n\nCarrier Selection/Entry is the individual row rendered inside an expanded `Carrier Selection` card. It represents either a named carrier company or a specific contact person at that carrier. Two variants cover these two identities.\n\n## Variants / Properties\n\n### Variant axis\n| Variant | Description |\n|---|---|\n| `Carrier` | Row represents a carrier company — shows carrier name and relevant company identifiers. |\n| `Contact` | Row represents a named contact person at the carrier — shows name and role or contact detail. |\n\n## Related components\n\n- `Carrier Selection` — the parent card that contains these entry rows.\n\n## Usage rules\n\n- Use `Carrier` entries to identify the organisation; use `Contact` entries to identify the individual.\n- A single expanded `Carrier Selection` card may contain multiple `Contact` entries under a `Carrier` entry.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=147-66956","thumb":"thumbs/147-66956.png","nested":[{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":7},{"name":"Checkbox Item","nodeId":null,"resolved":false,"viaVariant":null,"count":2}],"usedBy":[{"name":"Carrier Selection","nodeId":"147:67475","count":20}],"needsAttention":false}]},{"page":"📦 Page Header","items":[{"kind":"set","name":"Page/Header/Carrier","description":"What it is: The top navigation header bar for carrier-role pages, including logo, primary nav links, and user menu.\nWhen to use: Every carrier-facing page as the persistent top bar.\nVariants: With/without notification badge; active nav item highlighted.\nAvoid: Don't use in shipper-role pages — use Page/Header/Shipper.","nodeId":"7713:17336","page":"📦 Page Header","variants":3,"variantNames":["Layout=Desktop, Expanded=False","Layout=Mobile, Expanded=False","Layout=Mobile, Expanded=True"],"properties":[{"axis":"Layout","values":["Desktop","Mobile"]},{"axis":"Expanded","values":["False","True"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/page-header-carrier.md","docContent":"# Page/Header/Carrier\n\n**Component set key:** `24b9005e375704fe2e3ce6151c2439fe0a01e2e6`\n**Figma page:** `📦 Page Header`\n**Variants in set:** 3\n\n## Description\n\nPage/Header/Carrier is the global top navigation bar for the carrier-role view of the Transportly / 4Shipper application. It mirrors the structure of `Page/Header/Shipper` but is configured for the carrier context — different navigation links, role-appropriate account controls, and carrier-specific notifications.\n\n## Variants / Properties\n\n### Layout axis\n| Value | Description |\n|---|---|\n| `Desktop` | Full-width desktop layout with navigation links visible. |\n| `Mobile` | Compact mobile layout. |\n\n### Expanded axis\n| Value | Description |\n|---|---|\n| `False` | Default collapsed state. |\n| `True` | Expanded state — mobile drawer or dropdown is open. |\n\n## Related components\n\n- `Page/Header/Shipper` — equivalent header for the shipper role.\n\n## Usage rules\n\n- Use only on carrier-facing screens; use `Page/Header/Shipper` in shipper-facing screens.\n- Do not customise navigation items within this component in the design file — update the library component.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=7713-17336","thumb":"thumbs/7713-17336.png","nested":[{"name":"Button","nodeId":"15:105","resolved":true,"viaVariant":"Variant=Secondary, State=Default","count":10},{"name":"_Page Header/Menu Item","nodeId":null,"resolved":false,"viaVariant":null,"count":5},{"name":"Logo","nodeId":"105:4737","resolved":true,"viaVariant":null,"count":3},{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":2}],"usedBy":[],"needsAttention":false},{"kind":"set","name":"Page/Header/Shipper","description":"What it is: The top navigation header bar for shipper-role pages, including logo, primary nav links, and user menu.\nWhen to use: Every shipper-facing page as the persistent top bar.\nVariants: With/without notification badge; active nav item highlighted.\nAvoid: Don't use in carrier-role pages — use Page/Header/Carrier.","nodeId":"106:7070","page":"📦 Page Header","variants":3,"variantNames":["Layout=Mobile, Expanded=True","Layout=Mobile, Expanded=False","Layout=Desktop, Expanded=False"],"properties":[{"axis":"Layout","values":["Mobile","Desktop"]},{"axis":"Expanded","values":["True","False"]}],"hasDoc":true,"hasDescription":true,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/page-header-shipper.md","docContent":"# Page/Header/Shipper\n\n**Component set key:** `ff99e69b29386c223a3667ba286f6be3f8f9c8d7`\n**Figma page:** `📦 Page Header`\n**Variants in set:** 3\n\n## Description\n\nPage/Header/Shipper is the global top navigation bar for the shipper-role view of the Transportly / 4Shipper application. It contains the logo, primary navigation links, user account controls, and notifications. Use it on every page in the shipper flow.\n\n## Variants / Properties\n\n### Layout axis\n| Value | Description |\n|---|---|\n| `Desktop` | Full-width desktop layout with navigation links visible. |\n| `Mobile` | Compact mobile layout — navigation may be hidden behind a hamburger or drawer. |\n\n### Expanded axis\n| Value | Description |\n|---|---|\n| `False` | Default collapsed state. |\n| `True` | Expanded state — typically a mobile drawer or dropdown is open. |\n\n## Related components\n\n- `Page/Header/Carrier` — equivalent header for the carrier role.\n\n## Usage rules\n\n- Use only the shipper header variant in shipper-facing screens; use `Page/Header/Carrier` in carrier-facing screens.\n- Do not customise navigation items within this component — changes to navigation structure must be made in the Figma library.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=106-7070","thumb":"thumbs/106-7070.png","nested":[{"name":"Button","nodeId":"15:105","resolved":true,"viaVariant":"Variant=Secondary, State=Default","count":10},{"name":"_Page Header/Menu Item","nodeId":null,"resolved":false,"viaVariant":null,"count":7},{"name":"Logo","nodeId":"105:4737","resolved":true,"viaVariant":null,"count":3},{"name":"Icon","nodeId":"15:520","resolved":true,"viaVariant":null,"count":2}],"usedBy":[{"name":"Page","nodeId":"6987:87353","count":1}],"needsAttention":false}]},{"page":"⚛️ Popover","items":[{"kind":"component","name":"Popover","description":"","nodeId":"5803:43124","page":"⚛️ Popover","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5803-43124","thumb":"thumbs/5803-43124.png","nested":[{"name":"Popover Item","nodeId":"5803:43489","resolved":true,"viaVariant":"State=Default, Selected=False","count":6},{"name":"_Popover/Subheadline","nodeId":null,"resolved":false,"viaVariant":null,"coun
