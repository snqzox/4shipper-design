t":"# Notification (Alert)\n\n**Component set key:** `7e4c36aa161d270b0960cd4dbbb89995c2588486`\n**Figma page:** `⚛️ Notification (Alert)`\n**Variants in set:** 5\n\n## Description\n\nNotification (Alert) is an inline banner used to communicate system-level feedback, warnings, or informational messages directly within a page or form context. Unlike a toast, it is persistent and positioned near the relevant content rather than floating at the edge of the viewport.\n\n## Variants / Properties\n\n### Property 1 axis\n| Variant | When to use |\n|---|---|\n| `Default` | Neutral informational message with no urgency. |\n| `Primary` | Branded informational message or tip aligned with a key action. |\n| `Warning` | Cautionary message — action may have consequences or something needs attention. |\n| `Danger Subtle` | Soft error or failure state where the message is important but not alarming. |\n| `Success Subtle` | Confirmation that an action completed successfully. |\n\n## Usage rules\n\n- Place the Notification above or below the content it relates to, not at random positions.\n- Do not stack multiple Notifications of the same type — consolidate messages.\n- Use `Danger Subtle` for form-level validation summaries; use inline error states for field-level errors.\n- Provide a dismiss action unless the message is critical and must persist until resolved.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=32-1770","thumb":"thumbs/32-1770.png","needsAttention":true}]},{"page":"⚛️ Tooltip","items":[{"kind":"set","name":"Tooltip","description":"","nodeId":"6277:69164","page":"⚛️ Tooltip","variants":4,"variantNames":["Position=Top","Position=Right","Position=Left","Position=Bottom"],"properties":[{"axis":"Position","values":["Top","Right","Left","Bottom"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/tooltip.md","docContent":"# Tooltip\n\n**Component set key:** `3dcd8657ba5313b9f1a603a8d61c4418348b8768`\n**Figma page:** `⚛️ Tooltip`\n**Variants in set:** 4\n\n## Description\n\nTooltip is a non-interactive contextual hint that appears on hover (or focus for accessibility) to clarify the purpose of an element — typically an icon button, a truncated label, or a form field that needs extra explanation. It disappears when the user moves focus away.\n\n## Variants / Properties\n\n### Position axis\n| Position | Description |\n|---|---|\n| `Top` | Tooltip appears above the trigger element. Default preference. |\n| `Bottom` | Tooltip appears below the trigger element. |\n| `Left` | Tooltip appears to the left of the trigger element. |\n| `Right` | Tooltip appears to the right of the trigger element. |\n\n## Usage rules\n\n- Use Tooltip only for supplementary information — never for information essential to completing a task.\n- Keep tooltip text concise (one short sentence maximum).\n- Choose the `Position` that keeps the tooltip within the viewport and does not obscure nearby interactive elements.\n- Do not put interactive elements (links, buttons) inside a Tooltip.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6277-69164","thumb":"thumbs/6277-69164.png","needsAttention":true}]},{"page":"⚛️ Attachment","items":[{"kind":"set","name":"Attachment entry","description":"","nodeId":"5239:152707","page":"⚛️ Attachment","variants":2,"variantNames":["State=Hover","State=Default"],"properties":[{"axis":"State","values":["Hover","Default"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/attachment-entry.md","docContent":"# Attachment entry\n\n**Component set key:** `14d219a03dddd8ef66cdaf9d708890d40b99fa92`\n**Figma page:** `⚛️ Attachment`\n**Variants in set:** 2\n\n## Description\n\nAttachment entry is a single file row within the `Attachment` list component. It displays a file name, file type indicator, and action controls (download, delete). Use it to represent an uploaded or attached document — for example, cargo manifests, compliance certificates, or transport confirmation PDFs — in tender and transport detail views.\n\n## Variants / Properties\n\n### State axis\n| State | Description |\n|---|---|\n| `Default` | Standard resting state for the attachment row. |\n| `Hover` | Cursor is over the row — action controls become more prominent. |\n\n## Usage rules\n\n- Always show the file name and a file-type badge or icon so the user can identify the attachment type.\n- Provide a download action on every attachment entry; provide a delete action only when the user has permission to remove the file.\n- Do not use `Attachment entry` for images displayed inline — use it for document-type attachments only.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5239-152707","thumb":"thumbs/5239-152707.png","needsAttention":true}]},{"page":"📦 Content Box","items":[{"kind":"set","name":"Content Box","description":"","nodeId":"6985:1377167","page":"📦 Content Box","variants":4,"variantNames":["Style=Boxed, Size=LG","Style=Simple, Size=MD","Style=Boxed, Size=MD","Style=Simple, Size=LG"],"properties":[{"axis":"Style","values":["Boxed","Simple"]},{"axis":"Size","values":["LG","MD"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/content-box.md","docContent":"# Content Box\n\n**Component set key:** `6ccd09b5a1a4a49c2e203f991100b08b43aaf75f`\n**Figma page:** `📦 Content Box`\n**Variants in set:** 4\n\n## Description\n\nContent Box is a layout container that groups related content into a visually distinct section. It comes in a `Boxed` style (with a border/card treatment) and a `Simple` style (without the card border), and in two sizes to accommodate different amounts of content. Use it to divide a page or panel into clear content regions.\n\n## Variants / Properties\n\n### Style axis\n| Style | Description |\n|---|---|\n| `Boxed` | Renders with a visible card border — creates strong visual separation between sections. |\n| `Simple` | No border — creates softer grouping suitable for sections already within a parent card. |\n\n### Size axis\n| Size | Description |\n|---|---|\n| `LG` | Larger internal padding — use for prominent content areas or primary page sections. |\n| `MD` | Standard padding — use for secondary sections or when vertical space is limited. |\n\n## Usage rules\n\n- Use `Boxed` for top-level page sections; use `Simple` for sub-sections within an already-boxed area.\n- Do not nest `Boxed` Content Boxes — this creates visual noise and confuses the hierarchy.\n- Choose `LG` for sections that contain forms or complex content; choose `MD` for compact display sections.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6985-1377167","thumb":"thumbs/6985-1377167.png","needsAttention":true}]},{"page":"⚛️ Item","items":[{"kind":"set","name":"Item","description":"","nodeId":"6826:331","page":"⚛️ Item","variants":3,"variantNames":["Align=Vertical","Align=Horizontal","Align=Horizontal - Right"],"properties":[{"axis":"Align","values":["Vertical","Horizontal","Horizontal - Right"]}],"hasDoc":true,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/item.md","docContent":"# Item\n\n**Component set key:** `a70fbb845175f1d6672331775b949ae7bfd8fdb7`\n**Figma page:** `⚛️ Item`\n**Variants in set:** 3\n\n## Description\n\nItem is a general-purpose label–value display row used to present a single piece of structured information — for example, a shipment attribute, a tender detail field, or a contract property. It supports horizontal and vertical layout modes to fit different densities and reading directions.\n\n## Variants / Properties\n\n### Align axis\n| Align | Description |\n|---|---|\n| `Horizontal` | Label on the left, value on the right — suitable for compact lists and sidebars. |\n| `Vertical` | Label above, value below — suitable for wider panels with more visual space. |\n| `Horizontal - Right` | Label on the left, value right-aligned — use when numeric values need to align across multiple rows. |\n\n## Usage rules\n\n- Use `Horizontal` for compact attribute lists (4–8 items in a card or panel).\n- Use `Vertical` when each field needs more emphasis or when values are long strings.\n- Use `Horizontal - Right` for price or quantity displays where numeric alignment matters.\n- Do not use `Item` for editable fields — use `Input` + `Form Control` wrapper instead.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6826-331","thumb":"thumbs/6826-331.png","needsAttention":true}]},{"page":"⚛️ Section Title","items":[{"kind":"component","name":"Content/Section Title","description":"","nodeId":"6986:12807","page":"⚛️ Section Title","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6986-12807","thumb":"thumbs/6986-12807.png","needsAttention":true}]},{"page":"⚛️ No Data Placeholder","items":[{"kind":"component","name":"No Data Placeholder","description":"","nodeId":"5899:42082","page":"⚛️ No Data Placeholder","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5899-42082","thumb":"thumbs/5899-42082.png","needsAttention":true}]},{"page":"📦 Content Header","items":[{"kind":"component","name":"Content Header","description":"","nodeId":"6984:1254074","page":"📦 Content Header","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6984-1254 nt key:** `f78504a8d023e7c87220778790205a014ebdf61c`\n**Figma page:** `⚛️ Step Progress Tabs`\n**Variants in set:** 1 (single component, no variant axes)\n\n## Description\n\nStep Progress Tabs is the tab-strip variant of multi-step navigation used on detail pages such as the tender detail view. Unlike `Stepper`, which is used inside creation wizards, Step Progress Tabs is used to navigate between named sections of an already-created entity. Each tab represents a section and may carry a completion or activity indicator to show how far through the workflow the user has progressed.\n\n## Related components\n\n- `Stepper` — linear step indicator for wizard-style creation flows.\n- `Tabs` — generic horizontal or vertical tab navigation without progress semantics.\n\n## Usage rules\n\n- Use Step Progress Tabs only when the sections have a defined order or dependency.\n- For non-sequential content grouping, use the generic `Tabs` component instead.\n- Do not duplicate this component for flat navigation where no progress tracking is needed.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=6955-1232404","thumb":"thumbs/6955-1232404.png","needsAttention":true}]},{"page":"⚛️ Fileupload","items":[{"kind":"component","name":"Fileupload","description":"","nodeId":"5184:85248","page":"⚛️ Fileupload","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=5184-85248","thumb":"thumbs/5184-85248.png","needsAttention":true}]}],"assets":[{"kind":"set","name":"Flag","description":"","nodeId":"102:19056","page":"🧩 Assets","variants":271,"variantNames":["Property 1=ar","Property 1=ai","Property 1=nf","Property 1=la","Property 1=dm","Property 1=eg","Property 1=wf","Property 1=fj","Property 1=sg","Property 1=za","Property 1=gm","Property 1=gu","Property 1=yt","Property 1=cc","Property 1=mu","Property 1=mr","Property 1=cy","Property 1=rw","Prope  small number of regional/supranational flags are included (`eu`, `un`, `arab`, `asean`, `cefta`, `eac`). Use Flag to visually represent nationality, origin/destination country, or carrier country of registration.\n\n## Variants / Properties\n\n### Property 1 axis\n\nThe single property axis holds the ISO 3166-1 alpha-2 country code (lowercase). Examples:\n\n| Value | Country / Region |\n|---|---|\n| `pl` | Poland |\n| `de` | Germany |\n| `fr` | France |\n| `gb` | United Kingdom |\n| `eu` | European Union |\n| `un` | United Nations |\n| `xx` | Unknown / no flag |\n\n271 flag variants are available covering countries worldwide.\n\n## Usage rules\n\n- Always use lowercase ISO codes to select the correct flag variant.\n- Use `xx` for cases where the country is unknown or not applicable.\n- Pair Flag with the country name in text when used in tables or lists — do not rely on the flag alone for identification (accessibility).\n- Do not scale Flag icons to sizes larger than the intended icon size — they are not illustrations.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=102-19056","thumb":"thumbs/102-19056.png","needsAttention":true},{"kind":"component","name":"Icon","description":"","nodeId":"15:520","page":"🧩 Assets","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=15-520","thumb":"thumbs/15-520.png","needsAttention":true},{"kind":"component","name":"icon/anchor","description":"","nodeId":"147:66921","page":"🧩 Assets","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=147-66921","thumb":"thumbs/147-66921.png","needsAttention":true},{"kind":"component","name":"icon/arrow-left","description":"","nodeId":"103:4562","page":"🧩 Assets","hasDoc":false,"hasDescription":false,"hasShowcase":false,"st e,"stale":false,"docUrl":"https://github.com/snqzox/4shipper-design/blob/main/docs/design-system/components/illustration.md","docContent":"# Illustration\n\n**Component set key:** `b18e683e75ba27742d3c7996b58a80e72a34b244`\n**Figma page:** `🧩 Assets`\n**Variants in set:** 12\n\n## Description\n\nIllustration is a set of branded decorative images used for empty states, onboarding moments, confirmation screens, and other situations where a visual metaphor adds warmth and context. Illustrations are larger and more expressive than icons; they should not be used as inline body content.\n\n## Variants / Properties\n\n### Property 1 axis\n| Variant | Suggested context |\n|---|---|\n| `Cargo` | Cargo-related empty states (no shipments, no items). |\n| `Container` | Container/logistics empty states. |\n| `Truck` | Transport or carrier-related screens. |\n| `Rocket` | Launch, onboarding, or success moments. |\n| `Time` | Waiting, processing, or deadline-related states. |\n| `Warning` | Caution or error screens. |\n| `No Entry` | Access denied or restricted screens. |\n| `Rabbit` | Speed or express service contexts. |\n| `Zebra` | Distinctive decorative use — verify context in Figma. |\n| `Arrows` | Bidirectional flow or exchange concepts. |\n| `Left Top Arrow Sign` | Navigation or direction metaphors. |\n| `Medail` | Achievement, rating, or award moments. |\n\n## Usage rules\n\n- Use Illustration for empty states and key moments only — not as generic decoration on every screen.\n- Each screen should use at most one Illustration.\n- Do not crop, recolour, or modify Illustration components — use them as provided in the library.\n","figmaUrl":"https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO/?node-id=8779-66010","thumb":"thumbs/8779-66010.png","needsAttention":true},{"kind":"component","name":"Logo","description":"","nodeId":"105:4737","page":"🧩 Assets","hasDoc":false,"hasDescription":false,"hasShowcase":false,"stale":false,"docUrl":null,"docContent":null,"figmaUrl":"https:// <script>
const M = JSON.parse(document.getElementById('model').textContent);
const esc = (s) => String(s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// Flat component list + derived facets for the Components table/cards views.
const COMP_MAIN = (M.components.groups||[]).flatMap(g => g.items);
const COMP_ASSETS = M.components.assets || [];
// COMP_ALL indexes both so the detail drawer (keyed by _i) works for components and assets alike.
const COMP_ALL = COMP_MAIN.concat(COMP_ASSETS);
COMP_ALL.forEach((it,i)=>{ it._i=i; });
const COMP_PAGES = [...new Set(COMP_MAIN.map(it => it.page || 'Other'))].sort((a,b)=>a.localeCompare(b));
const compState = { view:'table', q:'', page:'all', kind:'all', attn:false, sort:'name', dir:1 };
const assetState = { q:'' };

document.getElementById('brandsub').textContent = (M.uiKit.name || 'design system');
document.getElementById('topline').textContent =
  (M.uiKit.name || 'UI Kit') + '  ·  v' + (M.uiKit.version || '?');
document.getElementById('foot').innerHTML =
  'Synced ' + new Date(M.generatedAt).toLocaleString() + '<br>via Figma REST API';

// ---- Sections ----
const SECTIONS = [
  { id:'overview',   title:'Overview',   sub:'Current state of the 4Shipper design system.', count:null, render:overview },
  { id:'actions',    title:'Actions',    sub:'Refresh data and publish — no terminal needed.', count:null, render:actions },
  { id:'components', title:'Components',  sub:M.components.meaningful+' components ('+M.components.sets+' sets · '+M.components.standalone+' standalone), grouped by Figma page.', count:M.counts.meaningful, render:components },
  { id:'assets',     title:'Assets',      sub:M.counts.assets+' icons, logos, flags & illustrations from the '+(M.components.assetsPage||'Assets')+' page.', count:M.counts.assets, render:assetsView },
  { id:'typography', title:'Typography',  sub:M.counts.typography+' text styles with live previews.', count:M.counts.typography, render:typography },
  { id:'shadows',    title:'Shadows',     sub:M.counts.shadows+' effect styles.', count:M.counts.shadows, render:shadows },
  { id:'colors',     title:'Colors',      sub:M.counts.colors+' color tokens.', count:M.counts.colors, render:colors },
  { id:'variables',  title:'Variables',   sub:M.counts.variables+' design tokens (color, spacing, sizing, typography).', count:M.counts.variables, render:variables },
  { id:'pages',      title:'Pages',       sub:M.counts.pages+' pages · '+M.counts.screens+' screens in the design file.', count:M.counts.pages, render:pages },
  { id:'changelog',  title:'Changelog',   sub:'Recorded library changes over time.', count:null, render:changelog },
];

document.getElementById('nav').innerHTML = SECTIONS.map((s,i) =>
  '<button data-i="'+i+'" class="'+(i===0?'active':'')+'">'+esc(s.title)+
  (s.count!=null?'<span class="cnt">'+s.count+'</span>':'')+'</button>').join('');
document.querySelectorAll('#nav button').forEach(b => b.onclick = () => show(+b.dataset.i));

function show(i){
  document.querySelectorAll('#nav button').forEach((b,j)=>b.classList.toggle('active',i===j));
  const s = SECTIONS[i];
  document.getElementById('vtitle').textContent = s.title;
  document.getElementById('vsub').textContent = s.sub;
  document.getElementById('view').innerHTML = s.render();
  bindGroups();
  if (s.id==='components') initComponents();
  if (s.id==='assets') initAssets();
  if (s.id==='actions') initActions();
  if (location.hash !== '#'+s.id) history.replaceState(null,'','#'+s.id);
}

function statCards(list){
  return '<div class="stats">'+list.map(([n,l,h])=>
    '<div class="stat"><div class="n">'+n+'</div><div class="l">'+esc(l)+'</div>'+
    (h?'<div class="hint">'+esc(h)+'</div>':'')+'</div>').join('')+'</div>';
}

function overview(){
  const c=M.counts;
  let html = statCards([
    [c.meaningful,'Components', c.sets+' sets · '+c.standalone+' standalone'],
    [c.assets,'Assets','icons · logos · illustrations'],
    [c.variants,'Total variants','published in library'],
    [c.typography+c.shadows+c.colors,'Style tokens', c.typography+' type · '+c.shadows+' shadow'],
    [c.variables||'—','Variables', c.variables?'':'Enterprise-gated'],
    [c.pages,'Design pages', c.screens+' screens'],
  ]);
  // latest changelog entry preview
  const m = M.changelog.match(/##\s.+?(?=\n##\s|$)/s);
  html += '<div class="card"><h3>Latest change</h3>'+(m?mdToHtml(m[0]):'<span class="muted">No changes recorded yet.</span>')+'</div>';
  return html;
}

const LINKS = {
  uiKit:'https://www.figma.com/design/XVou4XJ4rWbt4oXoSxO7hO',
  design:'https://www.figma.com/design/Xol48qmGXL8hIqA42jbHno',
  repo:'https://github.com/snqzox/4shipper-design',
  live:'https://snqzox.github.io/4shipper-design/'
};
function isLocal(){ return ['localhost','127.0.0.1'].includes(location.hostname); }

function actions(){
  const links='<div class="card"><h3>Links</h3><div class="links">'+
    '<a href="'+LINKS.uiKit+'" target="_blank">UI Kit ↗</a>'+
    '<a href="'+LINKS.design+'" target="_blank">4Shipper Design ↗</a>'+
    '<a href="'+LINKS.repo+'" target="_blank">GitHub repo ↗</a>'+
    '<a href="'+LINKS.live+'" target="_blank">Live dashboard ↗</a></div></div>';
  if(!isLocal()){
    return '<div class="empty"><h4>Open the control panel locally to use actions</h4>'+
      '<p class="muted">This is the published, read-only dashboard. To refresh data and publish with buttons:</p>'+
      '<ol><li>Double-click <code>4shipper-design.command</code> in the project folder (or run <code>npm run serve</code>).</li>'+
      '<li>Your browser opens <code>http://localhost:4178</code> with these actions enabled.</li></ol></div>'+links;
  }
  const btn=(a,l,d,c)=>'<button class="actbtn '+(c||'')+'" onclick="runAction(\''+a+'\',this)"><span class="al">'+l+'</span><span class="ad">'+d+'</span></button>';
  return '<div id="actstatus" class="card actstatus">Loading status…</div>'+
    '<div class="actgrid">'+
      btn('sync','↻ Refresh all','Pull components, styles & pages, then rebuild')+
      btn('variables','🎨 Refresh variables','From Figma desktop (Dev Mode MCP must be on)')+
      btn('dashboard','⟳ Rebuild dashboard','Regenerate from current data')+
      btn('publish','▲ Publish to GitHub','Commit & push → updates the live site','primary')+
    '</div>'+
    '<div class="card"><h3>Output</h3><pre id="actlog" class="actlog">Idle. Pick an action above.</pre></div>'+
    links;
}

async function initActions(){
  const el=document.getElementById('actstatus'); if(!el) return;
  try{
    const s=await (await fetch('/api/status',{headers:{'x-ds-control':'1'}})).json();
    const when=s.generatedAt?new Date(s.generatedAt).toLocaleString():'—';
    const dirty=s.git&&s.git.dirty;
    el.innerHTML=
      '<div class="srow"><span>Last data sync</span><b>'+esc(when)+'</b></div>'+
      '<div class="srow"><span>Components · Variables · Colors</span><b>'+s.components+' · '+s.variables+' · '+s.colors+'</b></div>'+
      '<div class="srow"><span>Uncommitted changes</span><b class="'+(dirty?'warn':'ok')+'">'+(dirty?(s.git.changes+' files — Publish to deploy'):'none — up to date')+'</b></div>';
  }catch(e){ el.textContent='Status unavailable ('+e.message+'). Is the control panel running (npm run serve)?'; }
}

async function runAction(action,btn){
  const log=document.getElementById('actlog');
  document.querySelectorAll('.actbtn').forEach(b=>{ b.disabled=true; });
  btn.classList.add('running');
  log.textContent='▶ '+action+' — running…\n';
  try{
    const r=await fetch('/api/run',{method:'POST',headers:{'content-type':'application/json','x-ds-control':'1'},body:JSON.stringify({action})});
    const j=await r.json();
    log.textContent=(j.output||'(no output)').trim();
    if(j.ok){
      log.textContent+='\n\n✓ Done.';
      if(action!=='publish'){ log.textContent+=' Reloading with fresh data…'; setTimeout(()=>location.reload(),1400); return; }
    } else { log.textContent+='\n\n✗ Failed — see output above.'; }
  }catch(e){ log.textContent='✗ '+e.message; }
  document.querySelectorAll('.actbtn').forEach(b=>{ b.disabled=false; });
  btn.classList.remove('running');
  initActions();
}

// ---- Components table/cards: filtering, sorting, rendering ----
function filteredComponents(){
  const s=compState, q=s.q.toLowerCase();
  return COMP_MAIN.filter(it=>{
    if(q && !((it.name+' '+(it.description||'')).toLowerCase().includes(q))) return false;
    if(s.page!=='all' && (it.page||'Other')!==s.page) return false;
    if(s.kind!=='all' && it.kind!==s.kind) return false;
    if(s.attn && !it.needsAttention) return false;
    return true;
  });
}
const COMP_SORT={
  name:it=>it.name.toLowerCase(),
  page:it=>(it.page||'').toLowerCase(),
  kind:it=>it.kind,
  variants:it=>it.kind==='set'?(it.variants||0):-1,
  desc:it=>it.hasDescription?1:0,
  doc:it=>it.hasDoc?1:0,
  showcase:it=>it.hasShowcase?1:0,
  stale:it=>it.stale?1:0,
};
function sortComponents(items){
  const f=COMP_SORT[compState.sort]||COMP_SORT.name, d=compState.dir;
  return items.slice().sort((a,b)=>{
    const va=f(a),vb=f(b);
    if(va<vb)return -d; if(va>vb)return d;
    return a.name.localeCompare(b.name);
  });
}
const COMP_COLS=[
  {k:'name',label:'Component',tip:'Component or component-set name. Click a row for full detail'},
  {k:'page',label:'Page',tip:'Figma page the component lives on'},
  {k:'kind',label:'Kind',tip:'Set = has variants · comp = standalone component'},
  {k:'variants',label:'Variants',tip:'Number of variants in the set'},
  {k:'desc',label:'Desc',tip:'Has a component description written in Figma'},
  {k:'doc',label:'Doc',tip:'Has a Markdown doc in the repo (docs/design-system/components)'},
  {k:'showcase',label:'Showcase',tip:'Has a 📖 Docs showcase page in the Figma UI Kit'},

];

  ).join('')+'<th class="nosort" title="Open in Figma · Doc on GitHub">Links</th></tr>';

    const thumb=it.thumb
      ? '<div class="tthumb"><img loading="lazy" src="'+esc(it.thumb)+'" alt=""></div>'
      : '<div class="tthumb"><span class="cph">'+esc((it.name[0]||'?').toUpperCase())+'</span></div>';
    const links=(it.figmaUrl?'<a href="'+esc(it.figmaUrl)+'" target="_blank">Figma ↗</a>':'')+
      (it.docUrl?'<a href="'+esc(it.docUrl)+'" target="_blank">Doc ↗</a>':'');
    return '<tr data-id="'+it._i+'">'+
      '<td>'+thumb+'</td>'+
      '<td><div class="tnm">'+esc(it.name)+'</div>'+(it.description?'<div class="tdesc">'+esc(it.description)+'</div>':'')+'</td>'+
      '<td class="muted">'+esc(it.page||'—')+'</td>'+
      '<td>'+(it.kind==='set'?'<span class="tag set">set</span>':'<span class="tag comp">comp</span>')+'</td>'+
      '<td class="muted">'+(it.kind==='set'?it.variants:'—')+'</td>'+
      '<td>'+(it.hasDescription?yes:no)+'</td>'+
      '<td>'+(it.hasDoc?yes:no)+'</td>'+
      '<td>'+(it.hasShowcase?yes:no)+'</td>'+
      '<td>'+(it.stale?'<span class="hp warn">stale</span>':no)+'</td>'+
      '<td class="tlinks">'+(links||'<span class="faint">—</span>')+'</td>'+

function compCards(items){
  if(!items.length) return '<div class="empty">No components match.</div>';
  const groups={};
  for(const it of items){ (groups[it.page||'Other'] ||= []).push(it); }
  const list=Object.entries(groups).map(([page,its])=>({page,its})).sort((a,b)=>b.its.length-a.its.length);
  const openAll=items.length<=40;
  return list.map((g,gi)=>groupBlock(g.page, g.its.length, openAll||gi<2,
    '<div class="cgrid">'+g.its.map(ccard).join('')+'</div>'
  )).join('');

// Minimal Markdown → HTML for the doc preview (headings, lists, tables, bold, inline code).
function dsplitRow(ln){ return ln.trim().replace(/^\||\|$/g,'').split('|').map(s=>s.trim()); }
function dinline(s){ return esc(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }
function mdDoc(md){
  const lines=String(md).split('\n'); const out=[]; let i=0; let inList=false;
  const closeList=()=>{ if(inList){ out.push('</ul>'); inList=false; } };
  while(i<lines.length){
    const ln=lines[i];
    if(/^\s*\|/.test(ln) && i+1<lines.length && /^[\s|:-]*-[\s|:-]*$/.test(lines[i+1])){
      closeList();
      const header=dsplitRow(ln); i+=2; const rows=[];
      while(i<lines.length && /^\s*\|/.test(lines[i])){ rows.push(dsplitRow(lines[i])); i++; }
      out.push('<table class="dtable"><thead><tr>'+header.map(h=>'<th>'+dinline(h)+'</th>').join('')+
        '</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+dinline(c)+'</td>').join('')+'</tr>').join('')+'</tbody></table>');
      continue;
    }
    if(/^###\s/.test(ln)){ closeList(); out.push('<h4>'+dinline(ln.replace(/^###\s/,''))+'</h4>'); i++; continue; }
    if(/^##\s/.test(ln)){ closeList(); out.push('<h3>'+dinline(ln.replace(/^##\s/,''))+'</h3>'); i++; continue; }
    if(/^#\s/.test(ln)){ i++; continue; }
    if(/^[-*]\s/.test(ln)){ if(!inList){ out.push('<ul>'); inList=true; } out.push('<li>'+dinline(ln.replace(/^[-*]\s/,''))+'</li>'); i++; continue; }
    if(!ln.trim()){ closeList(); i++; continue; }
    closeList(); out.push('<p>'+dinline(ln)+'</p>'); i++;
  }
  closeList();
  return out.join('');
}

function groupBlock(name, count, open, bodyHtml){

    '<span class="gname">'+esc(name)+'</span><span class="gcount">'+count+'</span></button>'+

}
function bindGroups(){
  document.querySelectorAll('.group .ghead').forEach(h=> h.onclick=()=>h.parentElement.classList.toggle('open'));
  const cs=document.getElementById('csearch'); if(cs) cs.oninput=()=>filter(cs,'.citem');
  const ps=document.getElementById('psearch'); if(ps) ps.oninput=()=>filter(ps,'.sitem');
  const vs=document.getElementById('vsearch'); if(vs) vs.oninput=()=>filter(vs,'.vitem');
  const attn=document.getElementById('attnonly'); if(attn&&cs) attn.onchange=()=>filter(cs,'.citem');
}
function filter(input, sel){
  const q=(input?input.value:'').toLowerCase();
  const attnOnly=!!(document.getElementById('attnonly')&&document.getElementById('attnonly').checked);
  document.querySelectorAll('.group').forEach(g=>{
    let any=false;
    g.querySelectorAll(sel).forEach(r=>{
      const hit=r.dataset.n.includes(q) && (!attnOnly || r.dataset.attn==='1');
      r.style.display=hit?'':'none'; if(hit)any=true;
    });
    if(g.querySelector(sel)){ g.style.display=any?'':'none'; if((q||attnOnly)&&any) g.classList.add('open'); }
  });
}
function mdToHtml(md){
  const lines=md.split('\n'); let out=[]; let inList=false;
  for(let ln of lines){
    if(/^##\s/.test(ln)){ if(inList){out.push('</ul>');inList=false;} out.push('<h2>'+esc(ln.replace(/^##\s/,''))+'</h2>'); }
    else if(/^#\s/.test(ln)){ /* skip top title */ }
    else if(/^[-*]\s/.test(ln)){ if(!inList){out.push('<ul>');inList=true;} out.push('<li>'+inline(ln.replace(/^[-*]\s/,''))+'</li>'); }
    else { if(inList){out.push('</ul>');inList=false;} if(ln.trim()) out.push('<p class="muted">'+inline(ln)+'</p>'); }
  }
  if(inList)out.push('</ul>');
  return out.join('');
}
function inline(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }

// init from hash
const start = SECTIONS.findIndex(s=>'#'+s.id===location.hash);
show(start>=0?start:0);
</script>
